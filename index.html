<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Protocol">
<meta name="theme-color" content="#0a0c0f">
<title>Protocol</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
--bg:#0a0c0f;--surf:#111318;--surf2:#181c22;--surf3:#1e2530;
--border:#1e2530;--border2:#2a3340;
--text:#e8eaf0;--text2:#8892a4;--text3:#4a5568;
--blue:#3b82f6;--blue-l:#1e3a5f;--blue-ll:#0d1f35;
--green:#10b981;--green-l:#0d3d2e;
--amber:#f59e0b;--amber-l:#3d2a08;
--purple:#a855f7;--purple-l:#2d1a4a;
--red:#ef4444;--red-l:#3d1414;
--teal:#14b8a6;--teal-l:#0d332f;
--pink:#ec4899;--pink-l:#3d1229;
--orange:#f97316;--orange-l:#3d1f08;
--radius:10px;--radius-sm:6px;
--safe-top:env(safe-area-inset-top,0px);
--safe-bot:env(safe-area-inset-bottom,0px);
}
body.light{
--bg:#F5F4F0;--surf:#FFFFFF;--surf2:#F1EFE8;--surf3:#E8E6DF;
--border:#E2DFD6;--border2:#D3D0C7;
--text:#1A1A18;--text2:#5F5E5A;--text3:#9CA39A;
--blue:#185FA5;--blue-l:#E6F1FB;--blue-ll:#B5D4F4;
--green:#3B6D11;--green-l:#EAF3DE;
--amber:#854F0B;--amber-l:#FAEEDA;
--purple:#534AB7;--purple-l:#EEEDFE;
--red:#A32D2D;--red-l:#FCEBEB;
--teal:#0F6E56;--teal-l:#E1F5EE;
--pink:#993556;--pink-l:#FBEAF0;
--orange:#c2520a;--orange-l:#FEF0E6;
}
/* ── Cycles ── */
.cycles-toolbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.cycles-add-btn{background:var(--blue);color:#fff;border:none;border-radius:var(--radius-sm);padding:6px 14px;font-size:12px;font-weight:700;cursor:pointer}
.cycles-scroll-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;margin:0 -14px;padding:0 14px 4px}
.cycles-grid{min-width:580px}
.cycles-header-row{display:flex;margin-bottom:2px}
.cycles-label-col{width:105px;flex-shrink:0}
.cycles-days-row{flex:1;display:flex;position:relative}
.cycles-day-cell{flex:1;text-align:center;font-size:9px;color:var(--text3);font-weight:600;min-width:0}
.cycles-day-cell.today-col{color:var(--blue);font-weight:800}
.cycles-compound-row{display:flex;align-items:center;margin-bottom:3px;min-height:26px}
.cycles-compound-name{width:105px;flex-shrink:0;font-size:11px;font-weight:600;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;padding-right:6px}
.cycles-bars{flex:1;display:flex;position:relative;height:18px}
.cycles-bar-seg{height:18px;border-radius:4px;position:absolute;cursor:pointer;display:flex;align-items:center;overflow:hidden;transition:opacity .15s}
.cycles-bar-seg:hover{opacity:0.8}
.cycles-bar-label{font-size:9px;font-weight:700;color:#fff;white-space:nowrap;padding:0 5px;overflow:hidden;text-overflow:ellipsis}
.cycles-today-line{position:absolute;top:-2px;bottom:-2px;width:2px;background:var(--blue);opacity:0.7;pointer-events:none;z-index:2;border-radius:1px}
.cycles-track{position:absolute;inset:4px 0;background:var(--surf2);border-radius:3px}
.cycles-section-label{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:0.8px;margin:14px 0 6px}
.cycles-modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:200;display:flex;align-items:flex-end;justify-content:center}
.cycles-modal{background:var(--surf);border-radius:var(--radius) var(--radius) 0 0;padding:20px 18px 36px;width:100%;max-width:520px;max-height:88vh;overflow-y:auto}
.cycles-modal-title{font-size:15px;font-weight:700;margin-bottom:16px}
.cycles-field{margin-bottom:13px}
.cycles-field label{display:block;font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:5px}
.cycles-field input,.cycles-field select,.cycles-field textarea{width:100%;padding:8px 10px;border-radius:var(--radius-sm);border:1px solid var(--border2);background:var(--surf2);color:var(--text);font-size:13px;font-family:inherit}
.cycles-field textarea{min-height:56px;resize:vertical}
.cycles-color-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:2px}
.cycles-color-swatch{width:26px;height:26px;border-radius:6px;border:2px solid transparent;cursor:pointer;flex-shrink:0;transition:transform .1s}
.cycles-color-swatch.selected{border-color:var(--text);transform:scale(1.15)}
.cycles-modal-btns{display:flex;gap:8px;margin-top:18px}
.cycles-modal-btns button{flex:1;padding:10px;border-radius:var(--radius-sm);border:none;font-size:13px;font-weight:700;cursor:pointer}
.cycles-btn-save{background:var(--blue);color:#fff}
.cycles-btn-delete{background:var(--red-l);color:var(--red)}
.cycles-btn-cancel{background:var(--surf2);color:var(--text2)}
.cycles-active-card{background:var(--surf);border:1px solid var(--border);border-radius:var(--radius);padding:10px 14px;margin-bottom:8px}
.cycles-active-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:5px}
.cycles-active-name{font-size:13px;font-weight:600}
.cycles-active-meta{font-size:11px;color:var(--text2);line-height:1.6}
.cycles-active-dot{width:10px;height:10px;border-radius:3px;flex-shrink:0;margin-right:8px}
.cycles-edit-btn{font-size:11px;color:var(--blue);font-weight:600;background:none;border:none;cursor:pointer;padding:2px 0}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text',sans-serif;font-size:14px;overflow:hidden}
#app{display:flex;flex-direction:column;height:100%;padding-top:var(--safe-top)}
#header{flex-shrink:0;padding:6px 14px 5px;background:var(--surf);border-bottom:1px solid var(--border)}
#content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:8px 14px 8px}
#nav{flex-shrink:0;display:flex;background:var(--surf);border-top:1px solid var(--border);padding-bottom:var(--safe-bot)}
.hdr-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:5px}
.hdr-title{font-size:16px;font-weight:700;letter-spacing:-0.3px}
.hdr-time{font-family:'SF Mono',monospace;font-size:12px;color:var(--text2);text-align:right}
.mode-row{display:flex;gap:4px;margin-top:5px;flex-wrap:wrap}
.mode-btn{flex:1;min-width:0;padding:5px 2px;border-radius:var(--radius-sm);border:1px solid var(--border2);background:var(--surf2);color:var(--text2);font-size:10px;font-weight:600;cursor:pointer;text-align:center;transition:all .15s;white-space:nowrap}
.mode-btn.active{background:var(--blue-ll);border-color:var(--blue);color:var(--blue)}
.mode-btn.post-trip-active{background:var(--orange-l);border-color:var(--orange);color:var(--orange)}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:6px 4px;border:none;background:none;color:var(--text3);font-size:9px;font-weight:600;cursor:pointer;gap:3px;letter-spacing:0.3px;text-transform:uppercase}
.nav-btn svg{width:18px;height:18px}
.nav-btn.active{color:var(--blue)}
.card{background:var(--surf);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:8px;overflow:hidden}
.card-hdr{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-bottom:1px solid var(--border)}
.card-dot{width:8px;height:8px;border-radius:2px;flex-shrink:0}
.card-title{font-size:13px;font-weight:600}
.task{display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid var(--border)}
.task:last-child{border-bottom:none}
.task-check{width:20px;height:20px;border-radius:5px;border:1.5px solid var(--border2);flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s}
.task-check.done{background:var(--green);border-color:var(--green)}
.task-check.done svg{display:block}
.task-check svg{display:none;width:12px;height:12px}
.task-body{flex:1;min-width:0}
.task-label{font-size:13px;font-weight:500;line-height:1.3}
.task-label.done{opacity:.4;text-decoration:line-through}
.task-sub{font-size:11px;color:var(--text2);margin-top:2px;line-height:1.4}
.task-badge{font-size:10px;font-weight:700;padding:2px 7px;border-radius:4px;flex-shrink:0;white-space:nowrap}
.progress-wrap{padding:10px 14px 12px;background:var(--surf2)}
.progress-row{display:flex;justify-content:space-between;margin-bottom:6px}
.progress-label{font-size:11px;color:var(--text2)}
.progress-val{font-size:11px;font-weight:600;color:var(--green)}
.progress-bar{height:4px;background:var(--border2);border-radius:2px;overflow:hidden}
.progress-fill{height:100%;background:var(--green);border-radius:2px;transition:width .3s}
.ex-group{margin-bottom:6px}
.ex-group-hdr{font-size:10px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:0.8px;padding:8px 14px 4px}
.ex-row{display:flex;align-items:center;gap:10px;padding:9px 14px;border-bottom:1px solid var(--border)}
.ex-name{flex:1;font-size:15px;font-weight:500}
.ex-sets{font-size:13px;color:var(--blue);font-weight:600;font-family:'SF Mono',monospace;white-space:nowrap}
.ex-cue{font-size:12px;color:var(--text2);padding:4px 14px 8px;line-height:1.4}
.set-row{display:flex;align-items:center;gap:8px;padding:5px 14px;border-top:1px solid var(--border)}
.set-num{font-size:11px;font-weight:700;color:var(--text3);width:28px;flex-shrink:0}
.set-label{font-size:11px;color:var(--text2);flex:1}
.set-input{width:52px;padding:4px 6px;border-radius:4px;border:1px solid var(--border2);background:var(--surf2);color:var(--text);font-size:13px;text-align:center;font-family:'SF Mono',monospace}
.set-x{font-size:11px;color:var(--text3)}
.set-btn{padding:5px 10px;border-radius:5px;border:none;color:#fff;font-size:13px;font-weight:700;cursor:pointer;flex-shrink:0;min-width:36px}
/* Rest timer — fixed top banner */
#rest-timer{position:fixed;top:0;left:0;right:0;z-index:999;display:none;background:var(--surf);border-bottom:3px solid var(--green);padding:10px 14px}
#rest-timer.overtime{border-bottom-color:var(--amber)}
.rt-inner{display:flex;align-items:center;gap:12px}
.rt-time{font-family:'SF Mono',monospace;font-size:44px;font-weight:800;line-height:1;flex-shrink:0;min-width:96px}
.rt-time.green{color:var(--green)}
.rt-time.amber{color:var(--amber)}
.rt-info{flex:1;min-width:0}
.rt-phase{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:2px}
.rt-phase.green{color:var(--green)}
.rt-phase.amber{color:var(--amber)}
.rt-ex{font-size:12px;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rt-bar{height:5px;background:var(--border2);border-radius:3px;overflow:hidden;margin-top:5px}
.rt-fill{height:100%;border-radius:3px;transition:width 1s linear}
.rt-stop{background:var(--surf2);border:1px solid var(--border2);border-radius:6px;padding:6px 10px;color:var(--text2);font-size:12px;cursor:pointer;flex-shrink:0}
/* Mobility timer bar */
#mob-timer-bar{background:var(--surf);border-top:2px solid var(--blue);padding:8px 14px;display:none;flex-shrink:0}
.mtb-inner{display:flex;align-items:center;gap:10px}
.mtb-time{font-family:'SF Mono',monospace;font-size:22px;font-weight:700;color:var(--green);flex-shrink:0;min-width:52px}
.mtb-time.amber{color:var(--amber)}
.mtb-info{flex:1}
.mtb-label{font-size:11px;font-weight:700;color:var(--green);margin-bottom:2px}
.mtb-label.amber{color:var(--amber)}
.mtb-bar{height:4px;background:var(--border2);border-radius:2px;overflow:hidden}
.mtb-fill{height:100%;border-radius:2px;transition:width 1s linear}
/* Section label */
.section-label{font-size:10px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:0.8px;margin:14px 0 6px}
/* Macro grid */
.macro-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:8px}
.macro-cell{background:var(--surf2);border-radius:var(--radius-sm);padding:8px 10px;text-align:center}
.macro-val{font-size:16px;font-weight:700;font-family:'SF Mono',monospace}
.macro-label{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:0.5px;margin-top:2px}
/* Post-trip banners */
.post-trip-banner{background:var(--orange-l);border:1px solid var(--orange);border-radius:var(--radius);padding:12px 14px;margin-bottom:8px}
.post-trip-banner .bt{font-size:13px;font-weight:700;color:var(--orange);margin-bottom:4px}
.post-trip-banner .bs{font-size:11px;color:var(--text2);line-height:1.5}
.day2-banner{background:var(--amber-l);border:1px solid var(--amber);border-radius:var(--radius);padding:10px 14px;margin-bottom:8px}
.day2-banner .bt{font-size:12px;font-weight:700;color:var(--amber);margin-bottom:3px}
.day2-banner .bs{font-size:11px;color:var(--text2);line-height:1.4}
/* Choice cards */
.choice-card{border-radius:var(--radius);border:2px solid var(--border2);padding:14px;cursor:pointer;background:var(--surf);margin-bottom:8px}
.choice-title{font-size:14px;font-weight:700;margin-bottom:4px}
.choice-sub{font-size:11px;color:var(--text2);line-height:1.4}
.choice-badge{display:inline-block;font-size:9px;font-weight:700;padding:2px 6px;border-radius:3px;margin-bottom:6px}
/* Layover workout toggle */
.lwt{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:var(--surf2);border-radius:var(--radius);margin-bottom:8px;cursor:pointer;border:1px solid var(--border2)}
.toggle-pill{width:44px;height:24px;border-radius:12px;border:none;cursor:pointer;position:relative;flex-shrink:0;transition:background .2s}
.toggle-pill.on{background:var(--green)}
.toggle-pill.off{background:var(--border2)}
.toggle-pill::after{content:'';position:absolute;width:20px;height:20px;border-radius:50%;background:#fff;top:2px;transition:left .2s;box-shadow:0 1px 3px rgba(0,0,0,.3)}
.toggle-pill.on::after{left:22px}
.toggle-pill.off::after{left:2px}
</style>
<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(e => console.log('SW:', e));
}
</script>
</head>
<body>
<div id="app">
<div id="offline-bar" style="display:none;background:var(--amber-l);border-bottom:1px solid var(--amber);padding:6px 16px;font-size:11px;color:var(--amber);font-weight:600;text-align:center">OFFLINE MODE — all data saved locally</div>
<div id="rest-timer" onclick="stopRestTimer()"><div class="rt-inner">
  <div class="rt-time green" id="rt-time">2:00</div>
  <div class="rt-info">
    <div class="rt-phase green" id="rt-phase">REST</div>
    <div class="rt-ex" id="rt-ex"></div>
    <div class="rt-bar"><div class="rt-fill" id="rt-fill" style="width:100%;background:var(--green)"></div></div>
  </div>
  <button class="rt-stop" onclick="event.stopPropagation();stopRestTimer()">✕</button>
</div></div>
<div id="header">
  <div class="hdr-top">
    <div>
      <div class="hdr-title">Protocol</div>
      <div id="date-display" style="font-size:11px;color:var(--text2);margin-top:1px"></div>
    </div>
    <div style="display:flex;align-items:center;gap:8px">
      <button id="today-jump" onclick="goToToday()" style="display:none;background:var(--blue);border:none;border-radius:20px;padding:4px 12px;font-size:11px;font-weight:700;color:#fff;cursor:pointer">Today</button>
      <button id="theme-toggle" onclick="toggleTheme()" style="background:var(--surf2);border:1px solid var(--border2);border-radius:20px;padding:4px 10px;font-size:11px;font-weight:600;color:var(--text2);cursor:pointer">Light</button>
      <div class="hdr-time">
        <div id="clock-local" style="font-size:16px;font-weight:700;font-family:'SF Mono',monospace"></div>
      </div>
    </div>
  </div>
  <div class="mode-row" id="mode-row">
    <div class="mode-btn active" onclick="setMode('home')" id="btn-home">At Home</div>
    <div class="mode-btn" onclick="setMode('duty')" id="btn-duty">Duty Day</div>
    <div class="mode-btn" onclick="setMode('layover')" id="btn-layover">Layover</div>
    <div class="mode-btn" onclick="arrivedHome()" id="btn-arrived" style="display:none">&#9992; Landed</div>
    <div class="mode-btn" onclick="setMode('post-trip')" id="btn-post-trip" style="display:none">Post-Trip</div>
  </div>
  <div id="duty-sub-row" style="display:none;gap:4px;margin-top:4px;flex-wrap:wrap">
    <div style="font-size:10px;font-weight:600;color:var(--text3);padding:5px 2px;white-space:nowrap">Report time:</div>
    <div class="mode-btn active" onclick="setDutyReport('early')" id="btn-duty-early" style="flex:none;padding:4px 10px">Early</div>
    <div class="mode-btn" onclick="setDutyReport('late')" id="btn-duty-late" style="flex:none;padding:4px 10px">Late</div>
  </div>
</div>
<div id="content"></div>
<div id="mob-timer-bar">
  <div class="mtb-inner">
    <div class="mtb-time" id="mtb-time">0:00</div>
    <div class="mtb-info">
      <div class="mtb-label" id="mtb-label">TIMER</div>
      <div class="mtb-bar"><div class="mtb-fill" id="mtb-fill" style="width:100%;background:var(--green)"></div></div>
    </div>
    <button class="rt-stop" onclick="stopMobTimer()">✕</button>
  </div>
</div>
<div id="nav">
  <button class="nav-btn active" id="nav-today" onclick="setTab('today')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
    Today
  </button>
  <button class="nav-btn" id="nav-workout" onclick="setTab('workout')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 4v16M18 4v16M6 12h12M2 8h4M18 8h4M2 16h4M18 16h4"/></svg>
    Workout
  </button>
  <button class="nav-btn" id="nav-mobility" onclick="setTab('mobility')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="5" r="2"/><path d="M12 7v5"/><path d="M9 12l3 3 3-3"/><path d="M7 19c0-2.8 2.2-5 5-5s5 2.2 5 5"/></svg>
    Mobility
  </button>
  <button class="nav-btn" id="nav-cycles" onclick="setTab('cycles')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 3v18h18"/><path d="M7 16l4-4 4 4 4-6"/></svg>
    Cycles
  </button>
</div>
</div>
<script>
const DAYS = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

// ── Global state ────────────────────────────────────────────────────────────
let mode = 'home';
let tab = 'today';
let state = {};
let mobCategory = null;
let mobExerciseMap = {};

// ── Rest timer state ────────────────────────────────────────────────────────
let restTimer = { active:false, interval:null, elapsed:0, duration:120, exName:'', exSets:'' };

// ── Mobility timer state ────────────────────────────────────────────────────
let mobTimer = { active:false, interval:null, elapsed:0, duration:0, totalSets:0, currentSet:0, side:null, exId:null, exName:'', ex:null };

// ── State management ────────────────────────────────────────────────────────
function loadState() {
  try { state = JSON.parse(localStorage.getItem('protocol_state') || '{}'); } catch(e) { state = {}; }
  if (!state.checks)      state.checks = {};
  if (!state.dutyReport)  state.dutyReport = 'late';
  if (!state.bloodwork)   state.bloodwork = {};
  // Pre-populate Jan 14 2026 baseline bloodwork if not yet entered
  const JAN_BASELINE = {
    'IGF-1':                         { date:'2026-01-14', result:'Baseline pre-protocol' },
    'LH / FSH / Total Testosterone': { date:'2026-01-14', result:'Total T 852 ng/dL · Free T 91.2 pg/mL · LH 3.3 · FSH 5.9 · SHBG 85 nmol/L (HIGH)' },
    'HDL / LDL / Triglycerides':     { date:'2026-01-14', result:'LDL 132 · HDL 60 · TG 69 · ApoB 119 · Lp(a) 161 nmol/L (HIGH RISK) · LDL-P 1814 · Small LDL-P 636' },
    'ALT / AST':                      { date:'2026-01-14', result:'AST 17 · ALT 14 · GGT 19 — all low-normal, clean headroom' },
    'Fasting glucose / HbA1c':        { date:'2026-01-14', result:'Glucose 86 · HbA1c 5.5% · Insulin 3.6 (exceptional sensitivity)' },
    'Homocysteine':                    { date:'2026-01-14', result:'10.0 µmol/L — within range, watch with methylation stack' },
    'CBC (full blood count)':          { date:'2026-01-14', result:'Hematocrit 47.4% — well clear of 52% RAD140 threshold' },

// ── REST TIMER ──────────────────────────────────────────────────────────────
function startRestTimer(exName, exSets) {
  if (restTimer.interval) clearInterval(restTimer.interval);
  restTimer = { active:true, interval:null, elapsed:0, duration:120, exName:exName, exSets:exSets };
  if (navigator.vibrate) navigator.vibrate(50);
  restTimer.interval = setInterval(tickRest, 1000);
  updateRestTimer();
}

function tickRest() {
  restTimer.elapsed++;
  if (restTimer.elapsed === restTimer.duration && navigator.vibrate) navigator.vibrate([200,100,200,100,200]);
  updateRestTimer();
}

function stopRestTimer() {
  if (restTimer.interval) clearInterval(restTimer.interval);
  restTimer.active = false;
  const el = document.getElementById('rest-timer');
  if (el) el.style.display = 'none';
}

function updateRestTimer() {
  const el = document.getElementById('rest-timer');
  if (!el || !restTimer.active) { if(el) el.style.display='none'; return; }
  el.style.display = 'block';
  const countdown = restTimer.duration - restTimer.elapsed;
  const isDown = countdown > 0;
  const dispSecs = isDown ? countdown : restTimer.elapsed - restTimer.duration;
  const mins = Math.floor(dispSecs/60);
  const secs = String(dispSecs%60).padStart(2,'0');
  const pct = isDown ? Math.round((countdown/restTimer.duration)*100) : Math.min(100, Math.round(((restTimer.elapsed-restTimer.duration)/restTimer.duration)*100));
  const color = isDown ? 'var(--green)' : 'var(--amber)';
  const cls = isDown ? 'green' : 'amber';
  el.className = isDown ? '' : 'overtime';
  const timeEl = document.getElementById('rt-time');
  const phaseEl = document.getElementById('rt-phase');
  const exEl = document.getElementById('rt-ex');
  const fillEl = document.getElementById('rt-fill');
  if (timeEl) { timeEl.textContent = mins+':'+secs; timeEl.className='rt-time '+cls; }
  if (phaseEl) { phaseEl.textContent = isDown ? 'REST — next set in '+mins+':'+secs : 'OVERTIME +'+mins+':'+secs; phaseEl.className='rt-phase '+cls; }
  if (exEl) exEl.textContent = restTimer.exName + ' · ' + restTimer.exSets;
  if (fillEl) { fillEl.style.width=pct+'%'; fillEl.style.background=color; }
}

// ── SET LOGGING ─────────────────────────────────────────────────────────────
function parseSetCount(s) {
  if (!s) return 1;
  if (/^\d+\/\d+/.test(s)) return s.split('/').length;
  const m = s.match(/^(\d+)/); return m ? parseInt(m[1]) : 1;
}
function getSetLabel(s, i) {
  if (/^\d+\/\d+/.test(s)) { const p=s.split('/'); return p[i] ? p[i]+' reps' : ''; }
  const m = s.match(/[×x]\s*(.+)/i); return m ? m[1].trim() : '';
}
function saveSetLog(exId, setIdx, field, val) {
  const d = new Date().toDateString();
  if (!state.setLogs[d]) state.setLogs[d] = {};
  if (!state.setLogs[d][exId]) state.setLogs[d][exId] = {};
  if (!state.setLogs[d][exId][setIdx]) state.setLogs[d][exId][setIdx] = {};
  state.setLogs[d][exId][setIdx][field] = val;
  saveState();
}
function logSetDone(exId, setIdx, exName, exSets) {
  const d = new Date().toDateString();
  if (!state.setLogs[d]) state.setLogs[d] = {};
  if (!state.setLogs[d][exId]) state.setLogs[d][exId] = {};
  if (!state.setLogs[d][exId][setIdx]) state.setLogs[d][exId][setIdx] = {};
  state.setLogs[d][exId][setIdx].done = true;
  saveState();
  startRestTimer(exName, exSets);
  render();
}

// ── EXERCISE RENDERER ───────────────────────────────────────────────────────
function renderExercises(workout) {
  let html = '';
  const d = new Date().toDateString();
  workout.groups.forEach(group => {
    html += '<div class="ex-group"><div class="ex-group-hdr">'+group.name+'</div><div class="card">';
    group.exercises.forEach(ex => {
      const numSets = parseSetCount(ex.sets);
      const logs = (state.setLogs[d] && state.setLogs[d][ex.id]) || {};
      // Find last used weight across previous sessions for this exercise
      const lastWeight = (() => {
        const dates = Object.keys(state.setLogs).sort().reverse();
        for (const date of dates) {
          if (date === d) continue;
          const dayLog = state.setLogs[date] && state.setLogs[date][ex.id];
          if (dayLog) {
            const keys = Object.keys(dayLog).sort((a,b) => parseInt(a)-parseInt(b));
            for (const k of keys) {
              if (dayLog[k] && dayLog[k].w) return dayLog[k].w;
            }
          }
        }
        return '';
      })();
      const safeName = ex.name.replace(/'/g,"&#39;").replace(/"/g,'&quot;');
      const safeSets = ex.sets.replace(/'/g,"&#39;");
      html += '<div>';
      html += '<div class="ex-row"><div class="ex-name">'+ex.name+'</div><div class="ex-sets">'+ex.sets+'</div></div>';
      for (let i = 0; i < numSets; i++) {
        const lbl = getSetLabel(ex.sets, i);
        const w = (logs[i] && logs[i].w) || lastWeight || '';
        const r = (logs[i] && logs[i].r) || '';
        const done = !!(logs[i] && logs[i].done);
        const bg = done ? 'background:var(--green-l);' : '';
        const btnBg = done ? 'var(--green)' : 'var(--blue)';
        html += '<div class="set-row" style="'+bg+'">'
          + '<div class="set-num">S'+(i+1)+'</div>'
          + '<div class="set-label">'+lbl+'</div>'
          + '<input class="set-input" type="number" inputmode="decimal" placeholder="lbs" value="'+w+'" onchange="saveSetLog(\''+ex.id+'\','+i+',\'w\',this.value)" />'
          + '<span class="set-x">×</span>'
          + '<input class="set-input" type="number" inputmode="numeric" placeholder="reps" value="'+r+'" onchange="saveSetLog(\''+ex.id+'\','+i+',\'r\',this.value)" />'
          + '<button class="set-btn" style="background:'+btnBg+'" onclick="logSetDone(\''+ex.id+'\','+i+',\''+safeName+'\',\''+safeSets+'\')">'+( done ? '✓' : '▶')+'</button>'
          + '</div>';
      }
      html += '<div class="ex-cue">'+ex.cue+'</div></div>';
    });
    html += '</div></div>';
  });
  return html;
}

// ── MOBILITY TIMER ──────────────────────────────────────────────────────────
function startMobTimer(exId, side) {
  const ex = mobExerciseMap[exId];
  if (!ex || !ex.duration) return;
  if (mobTimer.interval) clearInterval(mobTimer.interval);
  mobTimer = {
    active: true, interval: null, elapsed: 0,
    duration: ex.duration, totalSets: ex.sets, currentSet: 1,
    side: ex.side ? (side || 'left') : null,
    exId: exId, exName: ex.name, ex: ex
  };
  if (navigator.vibrate) navigator.vibrate(50);
  mobTimer.interval = setInterval(tickMob, 1000);
  const mtb = document.getElementById('mob-timer-bar');
  if (mtb) mtb.style.display = 'block';
  updateMobTimer();
}

function tickMob() {
  mobTimer.elapsed++;
  if (mobTimer.elapsed >= mobTimer.duration) {
    // Phase done
    if (mobTimer.ex.side && mobTimer.side === 'left') {
      // Switch to right
      mobTimer.side = 'right';
      mobTimer.elapsed = 0;
      if (navigator.vibrate) navigator.vibrate([100,50,100]);
    } else if (mobTimer.currentSet < mobTimer.totalSets) {
      // Rest 15s then next set
      mobTimer.currentSet++;
      mobTimer.side = mobTimer.ex.side ? 'left' : null;
      mobTimer.elapsed = -15; // negative = rest countdown
      if (navigator.vibrate) navigator.vibrate([100,50,100]);
    } else {
      // Done
      stopMobTimer(true);
      return;
    }
  }
  updateMobTimer();
}

function stopMobTimer(completed) {
  if (mobTimer.interval) clearInterval(mobTimer.interval);
  mobTimer.active = false;
  if (completed && mobTimer.exId) {
    markMobDone(mobTimer.exId);
  }
  const mtb = document.getElementById('mob-timer-bar');
  if (mtb) mtb.style.display = 'none';
}

function updateMobTimer() {
  const mtb = document.getElementById('mob-timer-bar');
  if (!mtb || !mobTimer.active) return;
  const isRest = mobTimer.elapsed < 0;
  const dispSecs = isRest ? -mobTimer.elapsed : mobTimer.duration - mobTimer.elapsed;
  const mins = Math.floor(Math.max(0,dispSecs)/60);
  const secs = String(Math.max(0,dispSecs)%60).padStart(2,'0');
  const pct = isRest ? Math.round((-mobTimer.elapsed/15)*100) : Math.round((Math.max(0,dispSecs)/mobTimer.duration)*100);
  const color = isRest ? 'var(--amber)' : 'var(--green)';
  const cls = isRest ? 'amber' : '';
  const sideLabel = mobTimer.side ? ' · '+mobTimer.side.toUpperCase() : '';
  const phaseLabel = isRest ? 'REST' : ('Set '+mobTimer.currentSet+'/'+mobTimer.totalSets+sideLabel+' — '+mobTimer.exName);
  const tEl = document.getElementById('mtb-time');
  const lEl = document.getElementById('mtb-label');
  const fEl = document.getElementById('mtb-fill');
  if (tEl) { tEl.textContent=mins+':'+secs; tEl.className='mtb-time'+(cls?' '+cls:''); }
  if (lEl) { lEl.textContent=phaseLabel; lEl.className='mtb-label'+(cls?' '+cls:''); }
  if (fEl) { fEl.style.width=pct+'%'; fEl.style.background=color; }
}

function markMobDone(id) {

function toggleCheck(dayKey, taskId) {

// Synced toggle — resolves duty task IDs to their underlying home IDs
// so all three modes (home, duty, layover) share the same check state
function toggleId(dayKey, taskId) {

  const DUTY_MAP = {

    duty_ostarine:[pfx+'_ostarine'],
    duty_bpc:     [pfx+'_bpc_am', pfx+'_bpc1'],
    duty_creatine:[pfx+'_coffee'],
    duty_protein: [],
    duty_hydrate: [],
    duty_hydrate_air: [],
    duty_sleep:   [],
    duty_mag:     [pfx+'_sleep_stack'],
  };
  if (DUTY_MAP[taskId] && DUTY_MAP[taskId].length > 0) {
    // Duty task — toggle first mapped home ID
    const target = DUTY_MAP[taskId][0];
    state.checks[dayKey][target] = !state.checks[dayKey][target];
  } else {
    state.checks[dayKey][taskId] = !state.checks[dayKey][taskId];
  }
  saveState();
  render();
}
function setPostTripChoice(choice) {
  state.postTripChoice[new Date().toDateString()] = choice;
  saveState(); render();
}
function toggleLayoverWorkout() {
  state.layoverWorkout = !state.layoverWorkout;
  saveState(); render();
}

// ── PROGRAM SELECTOR ────────────────────────────────────────────────────────
// program: 'A' = Shoulder/Back (original), 'B' = Chest, 'C' = Legs
function getActiveProgram() {
  return state.activeProgram || 'A';
}

function setActiveProgram(p) {
  state.activeProgram = p;
  saveState();
  render();
}

function getWorkoutsForProgram(p) {
  if (p === 'B') return WORKOUTS_B;
  if (p === 'C') return WORKOUTS_C;
  return WORKOUTS;
}

function programSelectorHTML() {
  const p = getActiveProgram();
  const programs = [
    { id:'A', label:'Shoulder & Back', color:'#3b82f6' },
    { id:'B', label:'Chest', color:'#ec4899' },
    { id:'C', label:'Legs', color:'#f97316' },
  ];
  let html = '<div style="display:flex;gap:6px;margin-bottom:8px">';
  programs.forEach(prog => {
    const active = p === prog.id;
    html += '<button onclick="setActiveProgram(\'' + prog.id + '\')" style="'
      + 'flex:1;padding:8px 4px;border-radius:var(--radius-sm);border:2px solid '
      + (active ? prog.color : 'var(--border2)') + ';'
      + 'background:' + (active ? prog.color + '22' : 'var(--surf2)') + ';'
      + 'color:' + (active ? prog.color : 'var(--text2)') + ';'
      + 'font-size:11px;font-weight:700;cursor:pointer;transition:all .15s;line-height:1.3'
      + '">' + prog.label + '</button>';
  });
  html += '</div>';
  return html;
}

<script>
// ── RENDER TODAY ─────────────────────────────────────────────────────────────
function render() {
  const c = document.getElementById('content');
  const btn = document.getElementById('today-jump');
  if (btn) btn.style.display = isOffToday() ? 'block' : 'none';
  updateModeButtons();
  if (tab === 'today') renderToday(c);
  else if (tab === 'workout') renderWorkout(c);
  else if (tab === 'mobility') renderMobility(c);
  else if (tab === 'cycles') renderCycles(c);
}

function renderToday(c) {
  const now = new Date();
  const realIdx = now.getDay();
  if (state.todayDayIdx === undefined || state.todayDayIdx === null) state.todayDayIdx = realIdx;
  const dayIdx = state.todayDayIdx;
  const dayName = DAYS[dayIdx];
  const isRealToday = dayIdx === realIdx;
  const kd = new Date(now); kd.setDate(kd.getDate() - ((realIdx-dayIdx+7)%7));
  const todayKey = dayName+'_'+kd.toDateString();
  if (!state.checks[todayKey]) state.checks[todayKey] = {};
  const checks = state.checks[todayKey];
  const pfx = dayName.slice(0,3).toLowerCase();

  // Duty tasks map to their underlying home task IDs so all modes share the same checks
  const DUTY_MAP = {
    duty_nmn:    [pfx+'_nmn'],
    duty_ss31:   [pfx+'_ss31'],
    duty_ostarine:[pfx+'_ostarine'],
    duty_bpc:    [pfx+'_bpc_am', pfx+'_bpc1'],
    duty_creatine:[pfx+'_coffee'],
    duty_protein: [],
    duty_hydrate: [],
    duty_hydrate_air: [],
    duty_sleep:  [],
    duty_mag:    [pfx+'_sleep_stack'],
  };

  // Reverse map: home ID -> duty ID, for layover sync
  const HOME_TO_DUTY = {};
  Object.entries(DUTY_MAP).forEach(([dutyId, homeIds]) => {
    homeIds.forEach(hid => { HOME_TO_DUTY[hid] = dutyId; });
  });

  // Single source of truth: always read/write the home task ID
  // For duty tasks, resolve to the mapped home ID (first one) for storage
  const resolveId = id => {
    if (DUTY_MAP[id] && DUTY_MAP[id].length > 0) return DUTY_MAP[id][0];
    return id;
  };

  const isDoneFor = id => {
    const resolved = resolveId(id);
    if (resolved !== id) {
      // Duty task — check any of its mapped home IDs
      return DUTY_MAP[id].some(x => !!checks[x]);
    }
    return !!checks[id];
  };

  const toggleId = id => {
    const resolved = resolveId(id);
    if (resolved !== id) {
      // Duty task — toggle the first mapped home ID
      const target = DUTY_MAP[id][0];
      if (target) {
        checks[target] = !checks[target];
        state.checks[todayKey] = checks;
        saveState();
        render();
      }
      return;
    }
    toggleCheck(todayKey, id);
  };

  let tasks;
  if (mode === 'duty') {
    const dr = state.dutyReport || 'late';
    const ALWAYS_EXCLUDE = ['_sauna','_redlight_eve'];
    const EARLY_EXCLUDE  = ['_casein','_supps_eve','_collagen','_hmb_pre','_creatine_pt'];
    const klowDays = ['Monday','Wednesday','Friday'];
    const motscDays = ['Monday','Wednesday','Friday'];
    const hasKlow = klowDays.includes(dayName);
    const hasMots = motscDays.includes(dayName);
    tasks = (DAILY_TASKS[dayName]||[]).filter(t => {
      if (ALWAYS_EXCLUDE.some(x => t.id.includes(x))) return false;
      if (dr === 'early' && EARLY_EXCLUDE.some(x => t.id.includes(x))) return false;
      if (dr === 'early' && t.id.includes('_whey')) return false;
      if (dr === 'early' && hasKlow && t.id.includes('_bpc_am')) return false;
      if (dr === 'early' && !hasKlow && t.id.includes('_klow')) return false;
      if (dr === 'late') return true;
      return true;
    }).map(t => {
      if (t.id.includes('_supps_ow')) return Object.assign({}, t, { sub: t.sub + ' · take with first available food' });
      if (dr === 'early') {
        // Move KLOW to Morning card
        if (t.id.includes('_klow')) return Object.assign({}, t, { time:'Morning', sub:'15 units U-100 · GHK-Cu 2.5mg · BPC-157 500mcg · TB-500 500mcg · KPV 500mcg · no fasting' });
        // Move MOTS-c to Morning on programmed days
        if (t.id.includes('_motsc') && hasMots) return Object.assign({}, t, { time:'Morning', sub:'AMPK activation · take fasted or with morning stack' });
        // Non-KLOW days: relabel BPC as standalone
        if (!hasKlow && t.id.includes('_bpc_am')) return Object.assign({}, t, { label:'BPC-157 500mcg subQ', sub:'local to elbow/forearm · standalone', badge:'' });
      }
      return t;
    });

    // On early report: sort Morning peptides to be consecutive after SS-31
    if (dr === 'early') {
      const PEPTIDE_IDS = ['_ss31','_bpc','_klow','_motsc'];
      const isPeptide = t => PEPTIDE_IDS.some(x => t.id.includes(x));
      const morningPeptides = tasks.filter(t => t.time === 'Morning' && isPeptide(t));
      const rest = tasks.filter(t => !(t.time === 'Morning' && isPeptide(t)));
      // Insert peptides after red light in Morning block
      const insertIdx = rest.findIndex(t => t.time === 'Morning');
      if (insertIdx >= 0) {
        tasks = [...rest.slice(0, insertIdx), ...morningPeptides, ...rest.slice(insertIdx)];
      }
    }
    // Append aircraft-only items
    // Remove Mid-Evening card and reorder: On Aircraft before Bed
    tasks = tasks.filter(t => t.time !== 'Mid-Evening');
    // Separate Bed items and append after On Aircraft
    const bedTasks = tasks.filter(t => t.time === 'Bed');
    tasks = tasks.filter(t => t.time !== 'Bed');
    tasks = tasks.concat([
      { time:'On aircraft', id:'duty_hydrate_air', label:'Hydration — active management', sub:'250ml/hr minimum · avoid caffeine 6hrs before crew rest', color:'#3b82f6', badge:'ongoing' },
      { time:'On aircraft', id:'duty_sleep',       label:'Use crew rest bunk',            sub:'target 2+ hrs · sleep during body-clock night window', color:'#7c3aed', badge:'' },
      { time:'On aircraft', id:'duty_mag',         label:'Sleep stack before bunk',       sub:'Mag glycinate 400mg · Glycine 3g · L-Theanine 200mg · Apigenin 50mg', color:'#7c3aed', badge:'20–30 min prior' },
      ...bedTasks,
    ]);
  } else if (mode === 'layover') {
    tasks = (DAILY_TASKS[dayName]||[])
      .filter(t => !t.id.includes('redlight') && !t.id.includes('sauna') && !t.id.includes('_coffee'))
      .map(t => {
        if (t.label && t.label.startsWith('Casein')) return Object.assign({}, t, { label:'Frog Fuel x2 + evening supps' });
        if (t.id.includes('_whey')) return Object.assign({}, t, { label:'Frog Fuel x2', sub:'immediately post-training · highest MPS priority · travel-friendly' });
        if (t.id.includes('_supps_ow')) return Object.assign({}, t, { sub: t.sub + ' · take all with food on layover' });
        return t;
      });
  } else {
    tasks = DAILY_TASKS[dayName] || [];
  }

  // ── Cycle-aware task filtering (home + layover modes) ─────────────────────
  if (mode !== 'duty') {
    const cs = getCycleStatus();
    const pfx = dayName.slice(0,3).toLowerCase();

    // Helper: is compound active today?
    const on  = name => cs[name] && cs[name].active;
    const off = name => !cs[name] || !cs[name].active;

    tasks = tasks.filter(t => {
      // Ostarine / Cardarine — only show when active
      if (t.id.includes('_ostarine')) return on('Ostarine');
      // SS-31 — only show when active
      if (t.id.includes('_ss31'))    return on('SS-31');
      // MOTS-c — only show when active
      if (t.id.includes('_motsc'))   return on('MOTS-c');
      // KLOW — only show when active
      if (t.id.includes('_klow'))    return on('KLOW');
      // BPC-157 standalone AM (KLOW days) — hide when KLOW is off
      if (t.id.includes('_bpc_am')) return on('BPC-157');
      // BPC-157 standalone (non-KLOW days) — hide when BPC-157 is off
      if (t.id.includes('_bpc1') || t.id.includes('_bpc2')) return on('BPC-157');
      // Retatrutide — only show when active
      if (t.id.includes('_retrat'))  return on('Retatrutide');
      // CJC-1295/Ipamorelin — only show when active (starts June 22)
      if (t.id.includes('_cjc'))     return on('CJC-1295/Ipamorelin');
      return true;
    });

    // Inject PCT tasks when Enclomiphene is active
    if (on('Enclomiphene')) {
      const pctItems = [
        { time:'On waking', id:`${pfx}_enclomiphene`, label:'Enclomiphene 12.5mg', sub:'PCT · daily with food · resume Fadogia + Tongkat Ali', color:'#f97316', badge:'PCT' },
        { time:'Morning',   id:`${pfx}_dim`,           label:'DIM 200mg',          sub:'estrogen modulation during PCT · take with food', color:'#f97316', badge:'PCT' },
        { time:'Mid-Evening', id:`${pfx}_ashwagandha`, label:'Ashwagandha KSM-66 600mg', sub:'cortisol reduction · testosterone recovery support · take PM with food', color:'#f97316', badge:'PCT' },
        { time:'Mid-Evening', id:`${pfx}_milkthistle`, label:'Milk Thistle 400mg', sub:'hepatoprotection post-cycle · take with food', color:'#f97316', badge:'PCT' },
      ];
      // Insert Enclomiphene after On Waking NMN, others at end of their time slots
      const nmnIdx = tasks.findIndex(t => t.id === `${pfx}_nmn`);
      if (nmnIdx >= 0) {
        tasks.splice(nmnIdx + 1, 0, pctItems[0]); // Enclomiphene after NMN
        tasks.push(pctItems[1], pctItems[2], pctItems[3]);
      } else {
        tasks = tasks.concat(pctItems);
      }
    }

    // Inject TUDCA when RAD140 is active
    if (on('RAD140')) {
      tasks.push({ time:'Morning', id:`${pfx}_tudca`, label:'TUDCA 500mg', sub:'hepatoprotection on RAD140 · bile acid mechanism · take with food · separate from other supps', color:'#ef4444', badge:'RAD140' });
      tasks.push({ time:'Morning', id:`${pfx}_milkthistle_rad`, label:'Milk Thistle 400mg', sub:'hepatoprotection on RAD140 · antioxidant mechanism · take with food', color:'#ef4444', badge:'RAD140' });
    }

    // Inject CJC task when active (was removed from static data)
    if (on('CJC-1295/Ipamorelin')) {
      const cjcIdx = tasks.findIndex(t => t.id === `${pfx}_sleep_stack`);
      const cjcTask = { time:'Bed', id:`${pfx}_cjc`, label:'CJC-1295/Ipamorelin 200mcg each subQ', sub:'fasted · min 2hr after eating · amplifies deep sleep GH pulse · primary goal: recovery & body composition', color:'#8b5cf6', badge:'fasted' };
      if (cjcIdx >= 0) tasks.splice(cjcIdx, 0, cjcTask);
      else tasks.push(cjcTask);
    }
  }

  const done = tasks.filter(t=>isDoneFor(t.id)).length;
  const pct = tasks.length ? Math.round(done/tasks.length*100) : 0;
  const prevDay = DAYS[((dayIdx-1)+7)%7], nextDay = DAYS[(dayIdx+1)%7];

  let html = '';

  // Post-trip banner
  if (mode === 'post-trip') {
    const ptd = getPostTripDay();
    if (ptd === 0) {
      html += '<div class="post-trip-banner"><div class="bt">✈️ Post-Trip Day 1</div><div class="bs">Cortisol elevated · Testosterone suppressed · Circadian disrupted<br><strong>Priorities:</strong> Bright light now · Eat protein deliberately · Push to 22:00–23:00 bedtime · No hard training</div></div>';
    } else if (ptd === 1) {
      html += '<div class="day2-banner"><div class="bt">Post-Trip Day 2 — Reload Mode</div><div class="bs">Sleep debt partially cleared · Reload weights only (50%) · Full training resumes tomorrow</div></div>';
    }
  }

  html += '<div class="macro-grid">'
    + '<div class="macro-cell"><div class="macro-val" style="color:#6366f1">160–175g</div><div class="macro-label">Protein</div></div>'
    + '<div class="macro-cell"><div class="macro-val" style="color:#f59e0b">200–250g</div><div class="macro-label">Carbs</div></div>'
    + '<div class="macro-cell"><div class="macro-val" style="color:#10b981">70–90g</div><div class="macro-label">Fat</div></div>'
    + '<div class="macro-cell"><div class="macro-val" style="color:#3b82f6">2,800–3,050</div><div class="macro-label">kcal</div></div>'
    + '</div>';

  html += '<div class="card" style="margin-bottom:8px">'
    + '<div style="display:flex;align-items:center;border-bottom:1px solid var(--border);padding:4px 0">'
    + '<button onclick="shiftToday(-1)" style="background:none;border:none;padding:4px 10px;cursor:pointer;color:var(--text3);font-size:18px">&#8592;</button>'
    + '<div style="flex:1;text-align:center"><span style="font-size:13px;font-weight:600">'
    + dayName+(isRealToday?' <span style="font-size:10px;color:var(--green);font-weight:700">TODAY</span>':'')
    + '</span><div style="font-size:10px;color:var(--text3);margin-top:1px">'+prevDay+' ← → '+nextDay+'</div></div>'
    + '<button onclick="shiftToday(1)" style="background:none;border:none;padding:4px 10px;cursor:pointer;color:var(--text3);font-size:18px">&#8594;</button>'
    + '</div>'
    + '<div class="progress-wrap">'
    + '<div class="progress-row"><span class="progress-label">'+(mode!=='home'?mode.charAt(0).toUpperCase()+mode.slice(1)+' · ':'')+done+'/'+tasks.length+' complete</span><span class="progress-val">'+pct+'%</span></div>'
    + '<div class="progress-bar"><div class="progress-fill" style="width:'+pct+'%"></div></div>'
    + '</div></div>';

  const grouped = groupBy(tasks, 'time');
  for (const [time, items] of Object.entries(grouped)) {
    html += '<div class="section-label">'+time+'</div><div class="card">';
    items.forEach(task => {
      const isDone = isDoneFor(task.id);
      html += '<div class="task" onclick="toggleId(\''+todayKey+'\',\''+task.id+'\')">'        + '<div class="task-check '+(isDone?'done':'')+'">'        + '<svg viewBox="0 0 12 12" fill="none" stroke="white" stroke-width="2"><polyline points="2,6 5,9 10,3"/></svg>'        + '</div>'        + '<div class="task-body">'        + '<div class="task-label'+(isDone?' done':'')+'">'+ task.label+'</div>'        + (task.sub?'<div class="task-sub">'+task.sub+'</div>':'')        + '</div>'        + (task.badge?'<div class="task-badge" style="background:'+task.color+'22;color:'+task.color+'">'+task.badge+'</div>':'')        + '<div style="width:10px;height:10px;border-radius:2px;background:'+task.color+';flex-shrink:0"></div>'        + '</div>';
    });
    html += '</div>';
  }
  if (!tasks.length) html += '<div style="text-align:center;padding:40px 20px;color:var(--text3)">No protocol data for this day.</div>';
  c.innerHTML = html;
}

function renderWorkout(c) {
  if (state.workoutDayIdx === undefined || state.workoutDayIdx === null) state.workoutDayIdx = new Date().getDay();

  const restDay = REST_DAYS[dayName];

  const nextDay = DAYS[(state.workoutDayIdx+1)%7];
  const isToday = dayName === DAYS[new Date().getDay()];
  const ptDay = getPostTripDay();
  const today = new Date().toDateString();

  function navHeader(color, title, tag) {

      + '<div class="card-title" style="color:'+color+'">'+title+(isToday?' <span style="font-size:10px;color:var(--green);font-weight:700">TODAY</span>':'')+'</div>'

      + '</div>'
      + '<button onclick="shiftWorkout(1)" style="background:none;border:none;padding:4px 8px;cursor:pointer;color:var(--text3);font-size:18px">&#8594;</button>'
      + '</div></div>';
  }

  // LAYOVER
  if (mode === 'layover') {
    let html = programSelectorHTML();
    html += navHeader('#14b8a6', '✈️ Layover — '+dayName, null);
    html += '<div class="section-label">Layover Recovery</div><div class="card">';
    const tips = [
      {l:'Light anchoring — get outside within 30 min of waking', s:'outdoor light resets the clock faster than any supplement · 10 min minimum'},
      {l:'Partial time anchoring — split the difference', s:'do not fully flip to local time on a 24-hr layover · aim for midway between home and local bedtime'},
      {l:'Sleep stack before bed', s:'Mag glycinate 400mg · Glycine 3g · L-Theanine 200mg · Apigenin 50mg · 30 min before sleep'},
      {l:'Hydration — 3L target', s:'cabin dehydration persists 12–24 hrs after landing · drink proactively'},
      {l:'Protein — eat deliberately', s:'Retatrutide suppresses appetite · 160g+ even without hunger'},
      {l:'Hip flexor + thoracic mobility — 15 min', s:'highest-priority flexibility work for your posture and squat depth'},
    ];
    tips.forEach((t,i)=>{
      html += '<div class="task" style="'+(i<tips.length-1?'':'border:none')+'">'
        + '<div style="width:8px;height:8px;border-radius:2px;background:#14b8a6;flex-shrink:0;margin-top:3px"></div>'
        + '<div class="task-body"><div class="task-label">'+t.l+'</div><div class="task-sub">'+t.s+'</div></div></div>';
    });
    html += '</div>';
    const lwOn = !!state.layoverWorkout;
    html += '<div class="lwt" onclick="toggleLayoverWorkout()">'
      + '<div><div style="font-size:13px;font-weight:600">Feel good today?</div><div style="font-size:11px;color:var(--text2)">Show hotel workout</div></div>'
      + '<button class="toggle-pill '+(lwOn?'on':'off')+'" onclick="event.stopPropagation();toggleLayoverWorkout()"></button>'
      + '</div>';
    if (lwOn) {
      html += '<div style="background:var(--teal-l);border:1px solid var(--teal);border-radius:var(--radius);padding:10px 14px;margin-bottom:8px">'
        + '<div style="font-size:12px;font-weight:700;color:var(--teal);margin-bottom:3px">Hotel Workout · No Equipment</div>'
        + '<div style="font-size:11px;color:var(--text2);line-height:1.5">Maintenance only · movement, blood flow, joint health · keep intensity low</div></div>';
      html += renderExercises(LAYOVER_WORKOUT);
    }
    c.innerHTML = html; return;
  }

  // POST-TRIP
  if (mode === 'post-trip') {
    let html = programSelectorHTML();
    html += navHeader('var(--orange)', '🛬 Post-Trip '+(ptDay===0?'Day 1':ptDay===1?'Day 2':'Recovery')+' — '+dayName, null);
    if (ptDay === 0) {
      const choice = state.postTripChoice[today];
      if (!choice) {
        html += '<div class="post-trip-banner"><div class="bt">Post-Trip Day 1 — Choose Your Approach</div><div class="bs">Cortisol elevated · Testosterone suppressed · Your perception of readiness is unreliable today.</div></div>';
        html += '<div class="choice-card" onclick="setPostTripChoice(\'rest\')" style="border-color:var(--green)">'
          + '<div class="choice-badge" style="background:var(--green-l);color:var(--green)">RECOMMENDED</div>'
          + '<div class="choice-title" style="color:var(--green)">🚶 Rest &amp; Mobility</div>'
          + '<div class="choice-sub">Walk 20–30 min for light anchoring · Hip flexor + thoracic work · No load · Highest-ROI choice for joint health</div></div>';
        html += '<div class="choice-card" onclick="setPostTripChoice(\'reload\')" style="border-color:var(--amber)">'
          + '<div class="choice-badge" style="background:var(--amber-l);color:var(--amber)">MODERATE</div>'
          + '<div class="choice-title" style="color:var(--amber)">🔄 Reload Session</div>'
          + '<div class="choice-sub">Saturday template at 50% load · Movement without stress · Stay conservative</div></div>';
        html += '<div class="choice-card" onclick="setPostTripChoice(\'full\')" style="border-color:var(--red)">'
          + '<div class="choice-badge" style="background:var(--red-l);color:var(--red)">CAUTION</div>'
          + '<div class="choice-title" style="color:var(--red)">💪 Full Session</div>'
          + '<div class="choice-sub">Reduce weights 15–20% · Stop if form deteriorates · No PRs today</div></div>';
      } else {
        html += '<button onclick="setPostTripChoice(null)" style="background:var(--surf2);border:1px solid var(--border2);border-radius:var(--radius-sm);padding:6px 12px;color:var(--text2);font-size:11px;cursor:pointer;margin-bottom:8px;display:block">← Change choice</button>';
        if (choice === 'rest') {
          html += '<div style="background:var(--green-l);border:1px solid var(--green);border-radius:var(--radius);padding:10px 14px;margin-bottom:8px"><div style="font-size:12px;font-weight:700;color:var(--green)">✅ Rest &amp; Mobility — Good call</div></div>';
          html += renderExercises(POST_TRIP_MOBILITY);
        } else if (choice === 'reload') {
          html += '<div class="day2-banner"><div class="bt">🔄 Reload — 50% weights</div><div class="bs">Do not push load today regardless of how you feel</div></div>';
          if (workouts.Saturday) html += renderExercises(workouts.Saturday);
        } else {
          html += '<div class="post-trip-banner"><div class="bt">⚠️ Full Session — Reduce weights 15–20%</div><div class="bs">Stop any set if form deteriorates · No PRs · No ego loading</div></div>';
          if (workout) html += renderExercises(workout);
        }
      }
    } else if (ptDay === 1) {
      html += '<div class="day2-banner"><div class="bt">Post-Trip Day 2 — Auto Reload</div><div class="bs">50% weights only · Full intensity resumes Day 3</div></div>';
      if (workouts.Saturday) html += renderExercises(workouts.Saturday);
    } else {
      html += '<div style="background:var(--green-l);border:1px solid var(--green);border-radius:var(--radius);padding:12px 14px;margin-bottom:8px">'
        + '<div style="font-size:13px;font-weight:700;color:var(--green);margin-bottom:4px">✅ Fully Recovered</div>'
        + '<div style="font-size:11px;color:var(--text2);margin-bottom:8px">Switch to At Home to resume full training.</div>'
        + '<button onclick="setMode(\'home\')" style="background:var(--green);border:none;border-radius:var(--radius-sm);padding:6px 14px;color:#fff;font-size:12px;font-weight:700;cursor:pointer">Switch to At Home</button></div>';
      if (workout) html += renderExercises(workout);
    }
    c.innerHTML = html; return;
  }

  // REST DAY
  if (!workout) {
    const rd = restDay || { tag:'Rest Day', color:'#6b7280', notes:[] };
    let html = programSelectorHTML();
    html += navHeader(rd.color, dayName, rd.tag);
    (rd.notes||[]).forEach(section => {
      html += '<div class="section-label">'+section.cat+'</div><div class="card">';
      section.items.forEach((tip,i) => {
        html += '<div class="task" style="'+(i<section.items.length-1?'':'border:none')+'">'
          + '<div style="width:8px;height:8px;border-radius:2px;background:'+section.color+';flex-shrink:0;margin-top:3px"></div>'
          + '<div class="task-body"><div class="task-label" style="font-size:12px;font-weight:400">'+tip+'</div></div></div>';
      });
      html += '</div>';
    });
    c.innerHTML = html; return;
  }

  // TRAINING DAY
  let html = programSelectorHTML();
  html += navHeader(workout.color, dayName, workout.tag);
  html += renderExercises(workout);
  c.innerHTML = html;
}

          + (done?' <span style="font-size:10px;color:#10b981;font-weight:700">✓ DONE</span>':'')

          + '<span style="font-size:10px;font-weight:600;padding:2px 6px;border-radius:3px;background:'+iColor+'22;color:'+iColor+'">'+ex.intensity+'</span>'
          + '</div></div>'
          + '<div style="display:flex;flex-direction:column;gap:5px;flex-shrink:0">'
          + (ex.duration

            : '')
          + (ex.videoQuery
            ? '<a href="https://www.youtube.com/results?search_query='+encodeURIComponent(ex.videoQuery)+'" target="_blank" rel="noopener" onclick="event.stopPropagation()" style="display:block;background:var(--red-l);border:1px solid var(--red);border-radius:6px;padding:5px 10px;color:var(--red);font-size:11px;font-weight:700;text-align:center;text-decoration:none;white-space:nowrap">🎬 Watch</a>'

          + '</div>';
      });
    }
    html += '</div>';
  });

  html += '<div style="height:80px"></div>';
  c.innerHTML = html;

  // Update mob timer bar visibility
  const mtb = document.getElementById('mob-timer-bar');
  if (mtb) mtb.style.display = mobTimer.active ? 'block' : 'none';

function saveCycles(c) { state.cycles = c; saveState(); }

// Returns a map of compound -> { active, upcoming, past } based on today
function getCycleStatus() {
  const today = new Date(); today.setHours(0,0,0,0);
  const dayMs = 86400000;
  const status = {};
  getCycles().forEach(cy => {
    const s = new Date(cy.startDate); s.setHours(0,0,0,0);
    const e = cy.endDate ? new Date(cy.endDate) : null;
    if (e) e.setHours(0,0,0,0);
    const active   = s <= today && (!e || e >= today);
    const upcoming = s > today;
    const past     = e && e < today;
    const key = cy.compound;
    if (!status[key] || active) status[key] = { active, upcoming, past, cy };
  });
  return status;
}

  ];

    saveState();
    return;
  }

  // Existing data — sync seed entries to correct values, preserve user-added cycles
  let changed = false;
  const seedMap = {};
  SEEDS.forEach(s => { seedMap[s.id] = s; });

  // Update existing seed entries to correct dates/values
  state.cycles.forEach(cy => {
    const correct = seedMap[cy.id];
    if (correct) {
      if (cy.startDate !== correct.startDate) { cy.startDate = correct.startDate; changed = true; }
      if (correct.endDate && cy.endDate !== correct.endDate) { cy.endDate = correct.endDate; changed = true; }

  SEEDS.forEach(s => {

}
function saveBWResult(marker, result) {

    const bwDate   = typeof bwEntry === 'object' ? (bwEntry.date||'') : (bwEntry||'');
    const bwResult = typeof bwEntry === 'object' ? (bwEntry.result||'') : '';
    html += `<div style="padding:10px 14px;${last?'':'border-bottom:1px solid var(--border)'}">
      <div style="margin-bottom:6px">
        <div style="font-size:12px;font-weight:600;margin-bottom:2px">${m.marker}</div>
        <div style="font-size:11px;color:var(--text2);line-height:1.4">${m.why}</div>
        <div style="font-size:10px;color:var(--text3);margin-top:3px">📅 ${m.freq}</div>
      </div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center">
        <div>
          <div style="font-size:9px;color:var(--text3);margin-bottom:2px">Date tested</div>
          <input type="date" value="${bwDate}" onchange="saveBWDate('${m.marker}', this.value)"
            style="padding:4px 6px;border-radius:4px;border:1px solid var(--border2);background:var(--surf2);color:var(--text);font-size:11px;font-family:inherit">
        </div>
        <div style="flex:1;min-width:140px">
          <div style="font-size:9px;color:var(--text3);margin-bottom:2px">Result</div>
          <input type="text" value="${bwResult}" placeholder="e.g. 650 ng/dL, 45%, normal" onchange="saveBWResult('${m.marker}', this.value)"
            style="width:100%;padding:4px 8px;border-radius:4px;border:1px solid var(--border2);background:var(--surf2);color:var(--text);font-size:11px;font-family:inherit">
        </div>
      </div>
    </div>`;
  });
  html += `</div>`;

  // ── Cycle Protocol Notes ─────────────────────────────────────────────────
  html += `<div class="cycles-section-label">Protocol Notes</div>`;
  html += `<div style="background:var(--surf);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:8px;overflow:hidden">`;

  const NOTES = [
    { icon:'🔄', title:'SARM Cycle — Fadogia & Tongkat', note:'Suspend Fadogia 600mg and Tongkat Ali 400mg during Ostarine and RAD140 cycles. LH stimulation is ineffective while suppressed. Resume during Enclomiphene PCT and off-cycle periods.' },
    { icon:'💉', title:'CJC-1295/Ipamorelin — Desensitisation', note:'Run maximum 16 weeks continuously, then 4 weeks completely off. Daily dosing is evidence-based — the 5-on/2-off protocol has no scientific basis. Monitor sleep quality as the primary response marker.' },
    { icon:'🧬', title:'SS-31 → MOTS-c Sequencing', note:'SS-31 repairs cardiolipin structure (membrane level). MOTS-c improves mitochondrial efficiency and reduces ROS (nuclear/transcription level). Non-overlapping mechanisms — concurrent use is valid. If running sequentially, SS-31 first for 4–8 weeks then add MOTS-c.' },
    { icon:'🩸', title:'Enclomiphene PCT', note:'Start 1–2 days after last Ostarine dose. 12.5mg/day for 4 weeks. Add DIM 200mg/day (estrogen modulation) and Ashwagandha KSM-66 600mg PM (cortisol reduction). Confirms LH/FSH/free T recovery with bloodwork at week 4. RAD140 starts after PCT completes.' },
    { icon:'🫀', title:'Liver Support — On Cycle & PCT', note:'On Ostarine cycle: NAC (already in stack) + Milk Thistle 400mg/day. On RAD140 Cycle 2: add TUDCA 500mg/day — superior to milk thistle for SARM liver stress, different mechanism. Both can be run together. ALT/AST at baseline 17/14 gives excellent headroom.' },
    { icon:'⚡', title:'Lp(a) 161 nmol/L — HIGH RISK', note:'Lp(a) is genetically fixed and does not respond to lifestyle. In the context of LDL-P 1814 and ApoB 119, LDL target shifts to below 70 mg/dL. RAD140 suppresses HDL — mid-cycle lipid panel is essential. Schedule Coronary Artery Calcium score before RAD140 Cycle 2 — this will determine whether the timing is appropriate.' },
    { icon:'🔗', title:'SHBG 85 nmol/L — Elevated', note:'SHBG at 85 (ref 10–50) is significantly above range, driven partly by your very low insulin (3.6). Free testosterone is mid-range despite total T of 852. Tongkat Ali and Boron have modest SHBG-lowering evidence. Monitor free testosterone specifically at each checkpoint — not just total T.' },
    { icon:'⚠️', title:'Retatrutide — Muscle Preservation', note:'Retatrutide suppresses appetite significantly. Muscle loss on this stack is driven by under-eating protein, not the compound. Hit 160–175g protein daily regardless of hunger. Resistance training 4x/week is non-negotiable for lean mass preservation.' },
    { icon:'🔬', title:'NAC Cycling — Intentional', note:'NAC 600mg × 2 doses on Tue/Thu/Sun only. Avoids blunting training oxidative adaptation signal on heavy training days (Mon/Wed/Fri/Sat). Glutathione support and liver protection maintained 3x/week. Consider daily dosing during RAD140 Cycle 2.' },
  ];

  NOTES.forEach((n, i) => {
    const last = i === NOTES.length - 1;
    html += `<div style="padding:12px 14px;${last?'':'border-bottom:1px solid var(--border)'}">
      <div style="font-size:12px;font-weight:700;margin-bottom:4px">${n.icon} ${n.title}</div>
      <div style="font-size:11px;color:var(--text2);line-height:1.5">${n.note}</div>
    </div>`;
  });
  html += `</div>`;

  html += '<div style="height:60px"></div>';
  c.innerHTML = html;
}

function openCycleModal(id) {
  const cycles = getCycles();
  const cy = id ? cycles.find(x=>x.id===id) : null;
  const todayStr = new Date().toISOString().slice(0,10);
  const defColor = cy ? (cy.color||'#3b82f6') : '#3b82f6';
  const compoundOpts = CYCLE_COMPOUNDS.map(n=>`<option value="${n}"${cy&&cy.compound===n?' selected':''}>${n}</option>`).join('');
  const swatches = CYCLE_COLORS.map(col=>{
    const sel=col===defColor;
    return `<div class="cycles-color-swatch${sel?' selected':''}" style="background:${col}" data-color="${col}" onclick="pickCycleColor('${col}')"></div>`;
  }).join('');
  const modal = document.createElement('div');
  modal.className='cycles-modal-bg'; modal.id='cycles-modal-bg';
  modal.innerHTML=`<div class="cycles-modal">
    <div class="cycles-modal-title">${cy?'Edit Cycle':'New Cycle'}</div>
    <div class="cycles-field"><label>Compound</label><select id="cy-compound">${compoundOpts}</select></div>
    <div style="display:flex;gap:10px">
      <div class="cycles-field" style="flex:1"><label>Start Date</label><input type="date" id="cy-start" value="${cy?cy.startDate:todayStr}"></div>
      <div class="cycles-field" style="flex:1"><label>End Date <span style="color:var(--text3);font-weight:400;text-transform:none">(blank=ongoing)</span></label><input type="date" id="cy-end" value="${cy&&cy.endDate?cy.endDate:''}"></div>
    </div>
    <div class="cycles-field"><label>Dose</label><input type="text" id="cy-dose" placeholder="e.g. 200mcg each, 1mg EOD" value="${cy?cy.dose||'':''}"></div>
    <div class="cycles-field"><label>Timing</label><input type="text" id="cy-timing" placeholder="e.g. nightly fasted, pre-training" value="${cy?cy.timing||'':''}"></div>
    <div class="cycles-field"><label>Notes</label><textarea id="cy-notes" placeholder="Optional...">${cy?cy.notes||'':''}</textarea></div>
    <div class="cycles-field"><label>Colour</label><div class="cycles-color-row" id="cy-swatches">${swatches}</div><input type="hidden" id="cy-color" value="${defColor}"></div>
    <div class="cycles-modal-btns">
      ${cy?`<button class="cycles-btn-delete" onclick="deleteCycle('${cy.id}')">Delete</button>`:''}
      <button class="cycles-btn-cancel" onclick="closeCycleModal()">Cancel</button>
      <button class="cycles-btn-save" onclick="saveCycleModal('${cy?cy.id:''}')">Save</button>
    </div></div>`;
  document.body.appendChild(modal);
}

function pickCycleColor(color) {
  document.getElementById('cy-color').value=color;
  document.querySelectorAll('.cycles-color-swatch').forEach(sw=>sw.classList.toggle('selected',sw.dataset.color===color));
}
function closeCycleModal() { const m=document.getElementById('cycles-modal-bg'); if(m)m.remove(); }
function saveCycleModal(existingId) {
  const compound=document.getElementById('cy-compound').value;
  const startDate=document.getElementById('cy-start').value;
  const endDate=document.getElementById('cy-end').value;
  const dose=document.getElementById('cy-dose').value.trim();
  const timing=document.getElementById('cy-timing').value.trim();
  const notes=document.getElementById('cy-notes').value.trim();
  const color=document.getElementById('cy-color').value||(COMPOUND_DEFAULT_COLORS[compound]||'#3b82f6');
  if(!startDate){alert('Please set a start date.');return;}
  const cycles=getCycles();
  if(existingId){const i=cycles.findIndex(x=>x.id===existingId);if(i>=0)cycles[i]={...cycles[i],compound,startDate,endDate,dose,timing,notes,color};}
  else cycles.push({id:Date.now().toString(),compound,startDate,endDate,dose,timing,notes,color});
  saveCycles(cycles); closeCycleModal(); render();
}
function deleteCycle(id) {
  if(!confirm('Delete this cycle?'))return;
  saveCycles(getCycles().filter(x=>x.id!==id)); closeCycleModal(); render();
}

window.addEventListener('DOMContentLoaded', () => {
  loadState();
  // Always open to Today tab showing the current day
  tab = 'today';
  state.todayDayIdx = new Date().getDay();
  const modeRow = document.getElementById('mode-row');
  if (modeRow) modeRow.style.display = 'flex';
  ['today','workout','mobility','cycles'].forEach(x => {
    const el = document.getElementById('nav-'+x);
    if (el) el.classList.toggle('active', x === 'today');
  });
  updateClock();
  setInterval(updateClock, 30000);
  render();
  window.addEventListener('online',  () => { const el=document.getElementById('offline-bar'); if(el) el.style.display='none'; });
  window.addEventListener('offline', () => { const el=document.getElementById('offline-bar'); if(el) el.style.display='block'; });
});
</script>
</body>
