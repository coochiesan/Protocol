function renderCycles(c) {
  const cycles = getCycles();
  const today = new Date(); today.setHours(0,0,0,0);
  const offset = state.cyclesOffset || 0;
  const dayMs = 86400000;

  // Fixed 120-day window. Default: today near left edge (30 days in).
  const WINDOW = 120;
  const winStart = new Date(today.getTime() - 30*dayMs + offset*dayMs);
  const winEnd   = new Date(winStart.getTime() + (WINDOW-1)*dayMs);
  const TOTAL = WINDOW;
  const todayIdx = Math.round((today - winStart) / dayMs);

  // Offset to reach earliest cycle
  let earliestOffset = 0;
  if (cycles.length > 0) {
    const starts = cycles.map(cy => { const d = new Date(cy.startDate); d.setHours(0,0,0,0); return d; });
    const earliest = new Date(Math.min(...starts));
    // Offset needed so earliest is ~7 days from left edge
    earliestOffset = Math.round((earliest.getTime() - 7*dayMs - (today.getTime() - 30*dayMs)) / dayMs);
  }
  const dayLabels = [];
  for (let i = 0; i < TOTAL; i++) {
    const d = new Date(winStart.getTime() + i * dayMs);
    dayLabels.push({ d, isToday: i === todayIdx, isMon: d.getDay() === 1 });
  }
  const byCompound = {};
  CYCLE_COMPOUNDS.forEach(n => { byCompound[n] = []; });
  cycles.forEach(cy => {
    const s = new Date(cy.startDate); s.setHours(0,0,0,0);
    const e = cy.endDate ? new Date(cy.endDate) : null;
    if (e) e.setHours(0,0,0,0);
    if (s > winEnd) return;
    if (e && e < winStart) return;
    if (!byCompound[cy.compound]) byCompound[cy.compound] = [];
    byCompound[cy.compound].push(cy);
  });
  const withCycles    = CYCLE_COMPOUNDS.filter(n => byCompound[n].length > 0);
  const withoutCycles = CYCLE_COMPOUNDS.filter(n => byCompound[n].length === 0);
  const todayPct = (todayIdx / TOTAL) * 100;
  const todayVisible = todayIdx >= 0 && todayIdx <= TOTAL - 1;

  let html = `<div class="cycles-toolbar">
    <div style="display:flex;align-items:center;gap:6px">
      <button onclick="shiftCycles(-30)" style="background:var(--surf2);border:1px solid var(--border2);border-radius:var(--radius-sm);padding:5px 11px;color:var(--text2);font-size:18px;cursor:pointer;line-height:1">‹</button>
      <button onclick="shiftCycles(30)"  style="background:var(--surf2);border:1px solid var(--border2);border-radius:var(--radius-sm);padding:5px 11px;color:var(--text2);font-size:18px;cursor:pointer;line-height:1">›</button>
      ${!todayVisible ? `<button onclick="resetCyclesView()" style="background:var(--blue);border:none;border-radius:var(--radius-sm);padding:5px 10px;color:#fff;font-size:11px;font-weight:700;cursor:pointer">Today</button>` : ''}
      ${state.cyclesOffset !== 0 && state.cyclesOffset !== earliestOffset
        ? `<button onclick="resetCyclesView()" style="background:var(--blue);border:none;border-radius:var(--radius-sm);padding:5px 10px;color:#fff;font-size:11px;font-weight:700;cursor:pointer">Today</button>`
        : state.cyclesOffset === earliestOffset
        ? `<button onclick="resetCyclesView()" style="background:var(--surf2);border:1px solid var(--border2);border-radius:var(--radius-sm);padding:5px 10px;color:var(--text2);font-size:11px;font-weight:600;cursor:pointer">Today</button>`
        : `<button onclick="state.cyclesOffset=${earliestOffset};saveState();render()" style="background:var(--surf2);border:1px solid var(--border2);border-radius:var(--radius-sm);padding:5px 10px;color:var(--text2);font-size:11px;font-weight:600;cursor:pointer">Start</button>`
      }
    </div>
    <div style="font-size:10px;color:var(--text3);font-weight:600">${MONTHS[winStart.getMonth()]} ${winStart.getDate()} – ${MONTHS[winEnd.getMonth()]} ${winEnd.getDate()}</div>
    <button class="cycles-add-btn" onclick="openCycleModal()">+ Add</button>
  </div>
  <div class="cycles-scroll-wrap"><div class="cycles-grid">`;

  // Month labels
  html += `<div class="cycles-header-row" style="margin-bottom:2px"><div class="cycles-label-col"></div><div class="cycles-days-row" style="height:12px;position:relative">`;
  let lastMonth = -1;
  dayLabels.forEach((dl,i) => {
    if (dl.d.getMonth() !== lastMonth) {
      lastMonth = dl.d.getMonth();
      html += `<div style="position:absolute;left:${(i/TOTAL)*100}%;font-size:9px;color:var(--text3);font-weight:700;text-transform:uppercase;white-space:nowrap">${MONTHS[dl.d.getMonth()]}</div>`;
    }
  });
  html += `</div></div>`;

  // Day numbers
  html += `<div class="cycles-header-row" style="margin-bottom:6px"><div class="cycles-label-col"></div><div class="cycles-days-row">`;
  dayLabels.forEach((dl,i) => {
    const show = dl.isToday || dl.isMon || i===0 || i===TOTAL-1;
    html += `<div class="cycles-day-cell${dl.isToday?' today-col':''}">${show?dl.d.getDate():''}</div>`;
  });
  html += `</div></div>`;

  const renderRow = (name, faint) => {
    const cys = byCompound[name]||[];
    html += `<div class="cycles-compound-row"${faint?' style="opacity:0.3"':''}>
      <div class="cycles-compound-name" title="${name}">${name}</div>
      <div class="cycles-bars"><div class="cycles-track"></div>
      ${todayVisible ? `<div class="cycles-today-line" style="left:${todayPct}%"></div>` : ''}`;
    cys.forEach(cy => {
      const s = new Date(cy.startDate); s.setHours(0,0,0,0);
      const e = cy.endDate ? new Date(cy.endDate) : null;
      if (e) e.setHours(0,0,0,0);
      const startOff = Math.max(0, Math.round((s-winStart)/dayMs));
      const endOff   = e ? Math.min(TOTAL-1, Math.round((e-winStart)/dayMs)) : TOTAL-1;
      if (startOff>TOTAL-1||endOff<0) return;
      const left  = (startOff/TOTAL)*100;
      const width = ((endOff-startOff+1)/TOTAL)*100;
      const color = cy.color||COMPOUND_DEFAULT_COLORS[name]||'#3b82f6';
      html += `<div class="cycles-bar-seg" style="left:${left}%;width:${width}%;background:${color};${!cy.endDate?'border-right:3px dashed rgba(255,255,255,0.5)':''}" onclick="openCycleModal('${cy.id}')" title="${name}${cy.dose?' — '+cy.dose:''}">
        <span class="cycles-bar-label">${cy.dose||''}</span></div>`;
    });
    html += `</div></div>`;
  };

  withCycles.forEach(n => renderRow(n,false));
  if (withoutCycles.length) { html+=`<div style="margin-top:6px">`; withoutCycles.forEach(n=>renderRow(n,true)); html+=`</div>`; }
  html += `</div></div>`;

  // Define now and active cycles
  const now = new Date(); now.setHours(0,0,0,0);
  const active = cycles.filter(cy => {
    const s=new Date(cy.startDate);s.setHours(0,0,0,0);
    const e=cy.endDate?new Date(cy.endDate):null;
    if(e){e.setHours(0,0,0,0);return s<=now&&e>=now;}
    return s<=now;
  });

  // ── Determine active/inactive supplement cards ────────────────────────────
  const today3 = new Date(); today3.setHours(0,0,0,0);
  const isSuppActive = card => {
    if (card.alwaysOn) return true;
    const compound = card.cycleCompound;
    if (!compound) return false;
    return (state.cycles||[]).some(cy => {
      if (cy.compound !== compound) return false;
      const s = new Date(cy.startDate); s.setHours(0,0,0,0);
      const e = cy.endDate ? new Date(cy.endDate) : null;
      if (e) e.setHours(0,0,0,0);
      return s <= today3 && (!e || e >= today3);
    });
  };
  const activeSuppCards   = SUPPLEMENT_CARDS.filter(c => isSuppActive(c));
  const inactiveSuppCards = SUPPLEMENT_CARDS.filter(c => !isSuppActive(c));

  // ── Supplement card edit modal ────────────────────────────────────────────
  // openSuppCardModal defined globally below renderCycles

  // ── Render one supplement card ────────────────────────────────────────────
  const renderSuppCard = (card, isActive) => {
    const color = card.color || '#3b82f6';
    // Find matching cycle entry for this card
    const matchCy = (state.cycles||[]).find(cy => cy.compound === card.cycleCompound);
    const matchCyId = matchCy ? matchCy.id : '';
    const statusBg = isActive
      ? (card.alwaysOn ? 'var(--teal-l)' : 'var(--green-l)')
      : 'var(--surf2)';
    const statusColor = isActive
      ? (card.alwaysOn ? 'var(--teal)' : 'var(--green)')
      : 'var(--text3)';
    const statusLabel = isActive
      ? (card.alwaysOn ? '∞ CONTINUOUS' : '● ACTIVE')
      : '○ INACTIVE';
    const timingGroups = [...new Set(card.tasks.map(t => t.timing))].join(' · ');
    // If there's a linked cycle, show day count
    let cycleInfo = '';
    if (!card.alwaysOn && matchCy) {
      const s = new Date(matchCy.startDate); s.setHours(0,0,0,0);
      const e = matchCy.endDate ? new Date(matchCy.endDate) : null;
      if (e) e.setHours(0,0,0,0);
      if (isActive) {
        const dayIn = Math.round((today3 - s) / dayMs) + 1;
        const total = e ? Math.round((e - s) / dayMs) + 1 : null;
        const left  = e ? Math.round((e - today3) / dayMs) : null;
        cycleInfo = `<div style="font-size:10px;color:${color};font-weight:600;margin-top:4px">Day ${dayIn}${total?' of '+total:''} · ${matchCy.dose||''}${left!==null?' · <strong>'+left+' days left</strong>':' · ongoing'}</div>`;
      } else {
        const daysTo = Math.round((s - today3) / dayMs);
        const label = daysTo > 0 ? `Starts in ${daysTo} days · ${matchCy.startDate}` : `${matchCy.startDate}${matchCy.endDate?' → '+matchCy.endDate:''}`;
        cycleInfo = `<div style="font-size:10px;color:var(--text3);margin-top:4px">${label}</div>`;
      }
    }
    return `<div style="background:var(--surf);border:1px solid ${isActive ? color+'66' : 'var(--border)'};border-radius:var(--radius);margin-bottom:8px;overflow:hidden">
      <div style="display:flex;align-items:center;gap:10px;padding:12px 14px;border-bottom:1px solid var(--border)">
        <div style="width:10px;height:10px;border-radius:3px;background:${color};flex-shrink:0"></div>
        <div style="flex:1;min-width:0">
          <div style="font-size:13px;font-weight:700">${card.name}</div>
          ${timingGroups ? `<div style="font-size:10px;color:var(--text3);margin-top:2px">${timingGroups}</div>` : ''}
          ${cycleInfo}
        </div>
        <div style="display:flex;align-items:center;gap:6px;flex-shrink:0">
          <span style="background:${statusBg};color:${statusColor};font-size:9px;font-weight:700;padding:2px 7px;border-radius:4px;white-space:nowrap">${statusLabel}</span>
          <button onclick="openSuppCardModal('${card.id}')" style="font-size:11px;color:var(--blue);font-weight:600;background:none;border:none;cursor:pointer;padding:2px 0;white-space:nowrap">Edit</button>
        </div>
      </div>
      <div style="padding:10px 14px">
        <div style="font-size:11px;color:var(--text2);line-height:1.5;margin-bottom:8px">${card.summary}</div>
        <div style="background:var(--surf2);border-radius:var(--radius-sm);padding:8px 10px">
          <div style="font-size:9px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:4px">Interactions & Notes</div>
          <div style="font-size:11px;color:var(--text2);line-height:1.5">${card.interactions}</div>
        </div>
        ${card.tasks.map(t => `<div style="display:flex;align-items:center;gap:8px;margin-top:8px;padding-top:8px;border-top:1px solid var(--border)">
          <div style="background:${color}22;color:${color};font-size:9px;font-weight:700;padding:2px 6px;border-radius:3px;white-space:nowrap;flex-shrink:0">${t.timing}</div>
          <div style="flex:1;min-width:0">
            <div style="font-size:12px;font-weight:600">${t.label}</div>
            ${t.sub ? `<div style="font-size:10px;color:var(--text3);margin-top:1px">${t.sub}</div>` : ''}
          </div>
          ${t.badge ? `<div style="background:${color}22;color:${color};font-size:9px;font-weight:700;padding:2px 6px;border-radius:3px;flex-shrink:0">${t.badge}</div>` : ''}
        </div>`).join('')}
      </div>
    </div>`;
  };

  // ── Active section: active cycles + active supplement cards merged ────────
  // Build a combined list: active timeline cycles that aren't supplement cards + active supplement cards
  const suppCycleCompounds = new Set(SUPPLEMENT_CARDS.map(c => c.cycleCompound).filter(Boolean));
  // Active timeline cycles that have NO supplement card (pure cycle entries)
  const pureCycleActive = active.filter(cy => !suppCycleCompounds.has(cy.compound));

  if (activeSuppCards.length || pureCycleActive.length) {
    html += `<div class="cycles-section-label">Active</div>`;

    const ACTIVE_CATEGORY_ORDER = [
      { ids: ['supp_ostarine','supp_cardarine','supp_rad140','supp_mk677'] },
      { ids: ['supp_retatrutide','supp_ss31','supp_motsc','supp_klow','supp_bpc157','supp_cjc'] },
      { ids: ['supp_enclomiphene_bridge','supp_full_pct','supp_milkthistle','supp_tudca','supp_tongkat_fadogia'] },
      { ids: ['supp_nmn','supp_d3k2','supp_b_complex','supp_occuvite','supp_turmeric','supp_boron',
              'supp_resveratrol','supp_creatine','supp_fish_oil','supp_hmb','supp_cissus','supp_tmg',
              'supp_collagen','supp_nac','supp_zinc','supp_magnesium','supp_glycine','supp_ltheanine',
              'supp_apigenin','supp_melatonin'] },
    ];

    pureCycleActive.forEach(cy => {
      const color=cy.color||COMPOUND_DEFAULT_COLORS[cy.compound]||'#3b82f6';
      const s=new Date(cy.startDate);s.setHours(0,0,0,0);
      const dayIn=Math.round((now-s)/dayMs)+1;
      const e=cy.endDate?new Date(cy.endDate):null;
      if(e)e.setHours(0,0,0,0);
      const total=e?Math.round((e-s)/dayMs)+1:null;
      const left=e?Math.round((e-now)/dayMs):null;
      html+=`<div class="cycles-active-card">
        <div class="cycles-active-hdr">
          <div style="display:flex;align-items:center"><div class="cycles-active-dot" style="background:${color}"></div><div class="cycles-active-name">${cy.compound}</div></div>
          <button class="cycles-edit-btn" onclick="openCycleModal('${cy.id}')">Edit</button>
        </div>
        <div class="cycles-active-meta">
          ${cy.dose?`<strong>${cy.dose}</strong>${cy.timing?' · '+cy.timing:''}`:cy.timing||''}${cy.dose||cy.timing?'<br>':''}
          Day ${dayIn}${total?' of '+total:''} · started ${cy.startDate}${left!==null?' · <strong>'+left+' days left</strong>':' · <em>ongoing</em>'}
          ${cy.notes?`<br><span style="color:var(--text3)">${cy.notes}</span>`:''}
        </div></div>`;
    });

    const renderedActiveIds = new Set();
    ACTIVE_CATEGORY_ORDER.forEach(group => {
      group.ids.map(id => activeSuppCards.find(c => c.id === id)).filter(Boolean).forEach(card => {
        renderedActiveIds.add(card.id);
        html += renderSuppCard(card, true);
      });
    });
    activeSuppCards.filter(c => !renderedActiveIds.has(c.id)).forEach(card => { html += renderSuppCard(card, true); });
  }

  // ── Inactive — grouped by category ───────────────────────────────────────
  const INACTIVE_GROUPS = [
    {
      label: 'SARMs',
      ids: ['supp_ostarine','supp_cardarine','supp_rad140','supp_mk677'],
      cycleCompounds: ['MK-677'] // also show MK-677 cycle here if no card
    },
    {
      label: 'Peptides',
      ids: ['supp_ss31','supp_motsc','supp_klow','supp_bpc157','supp_cjc','supp_retatrutide']
    },
    {
      label: 'Supplements',
      ids: ['supp_nmn','supp_d3k2','supp_b_complex','supp_occuvite','supp_turmeric','supp_boron',
            'supp_resveratrol','supp_creatine','supp_fish_oil','supp_hmb','supp_cissus','supp_tmg',
            'supp_collagen','supp_nac','supp_zinc','supp_magnesium','supp_glycine','supp_ltheanine',
            'supp_apigenin','supp_melatonin','supp_milkthistle','supp_tudca','supp_tongkat_fadogia']
    },
    {
      label: 'PCT',
      ids: ['supp_enclomiphene_bridge','supp_full_pct']
    }
  ];

  const renderedInactiveIds = new Set();
  let hasAnyInactive = false;

  INACTIVE_GROUPS.forEach(group => {
    const groupCards = group.ids
      .map(id => inactiveSuppCards.find(c => c.id === id))
      .filter(Boolean);
    if (!groupCards.length) return;
    if (!hasAnyInactive) {
      html += `<div class="cycles-section-label">Inactive</div>`;
      hasAnyInactive = true;
    }
    html += `<div style="font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:0.8px;margin:10px 0 6px;padding-left:2px">${group.label}</div>`;
    groupCards.forEach(card => {
      renderedInactiveIds.add(card.id);
      html += renderSuppCard(card, false);
    });
  });

  // Any inactive cards not in a group
  inactiveSuppCards.filter(c => !renderedInactiveIds.has(c.id)).forEach(card => {
    html += renderSuppCard(card, false);
  });

  // ── Bloodwork Notes ──────────────────────────────────────────────────────
  html += `<div class="cycles-section-label">Bloodwork — Key Markers</div>`;
  html += `<div style="background:var(--surf);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:8px;overflow:hidden">`;

  const BW_MARKERS = [
    { marker:'IGF-1',                     why:'CJC-1295/Ipamorelin response · target mid-upper normal range',                                          freq:'Every 8 weeks on CJC cycle' },
    { marker:'LH / FSH / Total Testosterone', why:'SARM suppression during cycle · Free T + SHBG (SHBG 85 at baseline — HIGH) · PCT recovery',       freq:'End of SARM cycle · 4 weeks into Enclomiphene · post-PCT' },
    { marker:'HDL / LDL / Triglycerides', why:'Lp(a) 161 nmol/L HIGH RISK — independent CV risk · ApoB 119 · LDL-P 1814 · RAD140 suppresses HDL',   freq:'Every 8 weeks — more frequent given Lp(a)' },
    { marker:'ALT / AST',                 why:'Liver health · baseline AST 17 / ALT 14 · NAC hepatoprotective · add TUDCA on RAD140',                  freq:'Every 8–12 weeks' },
    { marker:'Fasting glucose / HbA1c',   why:'Retatrutide insulin sensitivity · baseline insulin 3.6 (exceptional) · Glucose 86 / HbA1c 5.5%',       freq:'Every 12 weeks' },
    { marker:'Homocysteine',              why:'TMG + Super B Complex methylation · baseline 10.0 µmol/L — watch trend',                                freq:'Every 6 months' },
    { marker:'CBC (full blood count)',    why:'Hematocrit baseline 47.4% — monitor on RAD140 (stop if >52%) · Cardarine lipid effects',               freq:'Every 8 weeks on SARM cycle' },
    { marker:'Zinc / Copper serum',       why:'Zinc 24mg/day + copper in KLOW · baseline Zinc 77 · confirm balance',                                   freq:'Every 6 months' },
    { marker:'Vitamin D (25-OH)',         why:'Baseline 63 ng/mL optimal · D3 125mcg daily · target 100–150 nmol/L',                                   freq:'Every 6 months' },
    { marker:'Lp(a) / ApoB',             why:'Lp(a) 161 nmol/L — HIGH RISK category · genetically fixed · context for all LDL readings · ApoB 119',  freq:'Annually — does not respond to lifestyle' },
    { marker:'hs-CRP',                   why:'Baseline 2.5 mg/L (average CV risk zone) · should improve with full anti-inflammatory stack running',    freq:'Every 12 weeks' },
    { marker:'Cortisol (AM)',            why:'Baseline 22.1 mcg/dL at 11:40am — borderline high · circadian disruption marker · watch trend',         freq:'Every 6 months' },
    { marker:'Coronary Artery Calcium',  why:'CAC score — direct imaging of plaque given Lp(a) 161 · determines RAD140 Cycle 2 timing decision',     freq:'Once — schedule before RAD140 Cycle 2' },
  ];

  BW_MARKERS.forEach((m, i) => {
    const last = i === BW_MARKERS.length - 1;
    const bwEntry = state.bloodwork && state.bloodwork[m.marker];
    const bwDate   = typeof bwEntry === 'object' ? (bwEntry.date||'') : (bwEntry||'');
    const bwResult = typeof bwEntry === 'object' ? (bwEntry.result||'') : '';
    html += `<div style="padding:10px 14px;${last?'':'border-bottom:1px solid var(--border)'}">
      <div style="margin-bottom:6px">
        <div style="font-size:12px;font-weight:600;margin-bottom:2px">${m.marker}</div>
        <div style="font-size:11px;color:var(--text2);line-height:1.4">${m.why}</div>
        <div style="font-size:10px;color:var(--text3);margin-top:3px">📅 ${m.freq}</div>
      </div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center">
        <div>
          <div style="font-size:9px;color:var(--text3);margin-bottom:2px">Date tested</div>
          <input type="date" value="${bwDate}" onchange="saveBWDate('${m.marker}', this.value)"
            style="padding:4px 6px;border-radius:4px;border:1px solid var(--border2);background:var(--surf2);color:var(--text);font-size:11px;font-family:inherit">
        </div>
        <div style="flex:1;min-width:140px">
          <div style="font-size:9px;color:var(--text3);margin-bottom:2px">Result</div>
          <input type="text" value="${bwResult}" placeholder="e.g. 650 ng/dL, 45%, normal" onchange="saveBWResult('${m.marker}', this.value)"
            style="width:100%;padding:4px 8px;border-radius:4px;border:1px solid var(--border2);background:var(--surf2);color:var(--text);font-size:11px;font-family:inherit">
        </div>
      </div>
    </div>`;
  });
  html += `</div>`;

  // ── Cycle Protocol Notes ─────────────────────────────────────────────────
  html += `<div class="cycles-section-label">Protocol Notes</div>`;
  html += `<div style="background:var(--surf);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:8px;overflow:hidden">`;

  const NOTES = [
    { icon:'🔄', title:'SARM Cycle — Fadogia & Tongkat', note:'Suspend Fadogia 600mg and Tongkat Ali 400mg during Ostarine and RAD140 cycles. LH stimulation is ineffective while suppressed. Resume during Enclomiphene PCT and off-cycle periods.' },
    { icon:'💉', title:'CJC-1295/Ipamorelin — Desensitisation', note:'Run maximum 16 weeks continuously, then 4 weeks completely off. Daily dosing is evidence-based — the 5-on/2-off protocol has no scientific basis. Monitor sleep quality as the primary response marker.' },
    { icon:'🧬', title:'SS-31 → MOTS-c Sequencing', note:'SS-31 repairs cardiolipin structure (membrane level). MOTS-c improves mitochondrial efficiency and reduces ROS (nuclear/transcription level). Non-overlapping mechanisms — concurrent use is valid. If running sequentially, SS-31 first for 4–8 weeks then add MOTS-c.' },
    { icon:'🩸', title:'Enclomiphene PCT', note:'Start 1–2 days after last Ostarine dose. 12.5mg/day for 4 weeks. Add DIM 200mg/day (estrogen modulation) and Ashwagandha KSM-66 600mg PM (cortisol reduction). Confirms LH/FSH/free T recovery with bloodwork at week 4. RAD140 starts after PCT completes.' },
    { icon:'🫀', title:'Liver Support — On Cycle & PCT', note:'On Ostarine cycle: NAC (already in stack) + Milk Thistle 400mg/day. On RAD140 Cycle 2: add TUDCA 500mg/day — superior to milk thistle for SARM liver stress, different mechanism. Both can be run together. ALT/AST at baseline 17/14 gives excellent headroom.' },
    { icon:'⚡', title:'Lp(a) 161 nmol/L — HIGH RISK', note:'Lp(a) is genetically fixed and does not respond to lifestyle. In the context of LDL-P 1814 and ApoB 119, LDL target shifts to below 70 mg/dL. RAD140 suppresses HDL — mid-cycle lipid panel is essential. Schedule Coronary Artery Calcium score before RAD140 Cycle 2 — this will determine whether the timing is appropriate.' },
    { icon:'🔗', title:'SHBG 85 nmol/L — Elevated', note:'SHBG at 85 (ref 10–50) is significantly above range, driven partly by your very low insulin (3.6). Free testosterone is mid-range despite total T of 852. Tongkat Ali and Boron have modest SHBG-lowering evidence. Monitor free testosterone specifically at each checkpoint — not just total T.' },
    { icon:'⚠️', title:'Retatrutide — Muscle Preservation', note:'Retatrutide suppresses appetite significantly. Muscle loss on this stack is driven by under-eating protein, not the compound. Hit 160–175g protein daily regardless of hunger. Resistance training 4x/week is non-negotiable for lean mass preservation.' },
    { icon:'🔬', title:'NAC Cycling — Intentional', note:'NAC 600mg × 2 doses on Tue/Thu/Sun only. Avoids blunting training oxidative adaptation signal on heavy training days (Mon/Wed/Fri/Sat). Glutathione support and liver protection maintained 3x/week. Consider daily dosing during RAD140 Cycle 2.' },
  ];

  NOTES.forEach((n, i) => {
    const last = i === NOTES.length - 1;
    html += `<div style="padding:12px 14px;${last?'':'border-bottom:1px solid var(--border)'}">
      <div style="font-size:12px;font-weight:700;margin-bottom:4px">${n.icon} ${n.title}</div>
      <div style="font-size:11px;color:var(--text2);line-height:1.5">${n.note}</div>
    </div>`;
  });
  html += `</div>`;

  html += '<div style="height:60px"></div>';
  c.innerHTML = html;
}

// ── WORKOUT BUILDER ───────────────────────────────────────────────────────────

function getAllExercises() {
  // Collect all exercises from all programs, deduped by id
  const seen = new Set();
  const all = [];
  const PROGRAM_DEFS = [
    { id:'A', label:'Shoulder & Back', color:'#3b82f6', workouts: WORKOUTS },
    { id:'B', label:'Chest',          color:'#ec4899', workouts: WORKOUTS_B },
    { id:'C', label:'Legs',           color:'#f97316', workouts: WORKOUTS_C },
  ];
  PROGRAM_DEFS.forEach(prog => {
    Object.entries(prog.workouts).forEach(([day, w]) => {
      if (!w || !w.groups) return;
      w.groups.forEach(g => {
        g.exercises.forEach(ex => {
          if (!seen.has(ex.id)) {
            seen.add(ex.id);
            all.push({ ...ex, _prog: prog.id, _progLabel: prog.label, _progColor: prog.color, _day: day, _group: g.name });
          }
        });
      });
    });
  });
  // Add custom exercises from state
  (state.customExercises || []).forEach(ex => {
    if (!seen.has(ex.id)) { seen.add(ex.id); all.push({ ...ex, _custom: true }); }
  });
  return all;
}

function getExerciseWorkouts(exId) {
  // Returns list of {prog, day, group} where this exercise appears
  const appearances = [];
  const PROGRAM_DEFS = [
    { id:'A', label:'Shoulder & Back', workouts: WORKOUTS },
    { id:'B', label:'Chest',           workouts: WORKOUTS_B },
    { id:'C', label:'Legs',            workouts: WORKOUTS_C },
  ];
  PROGRAM_DEFS.forEach(prog => {
    Object.entries(prog.workouts).forEach(([day, w]) => {
      if (!w || !w.groups) return;
      w.groups.forEach(g => {
        if (g.exercises.some(e => e.id === exId)) {
          appearances.push({ prog: prog.id, progLabel: prog.label, day, group: g.name });
        }
      });
    });
  });
  // Check overrides
  const overrides = state.workoutOverrides || {};
  Object.entries(overrides).forEach(([key, exercises]) => {
    const [prog, day] = key.split('::');
    if (exercises.some(e => e.id === exId) && !appearances.some(a => a.prog === prog && a.day === day)) {
      appearances.push({ prog, progLabel: prog, day, group: 'Custom', fromOverride: true });
    }
  });
  return appearances;
}

function getEffectiveWorkoutGroups(prog, day) {
  // Returns groups for a workout, applying any overrides
  const overrideKey = prog + '::' + day;
  const overrides = state.workoutOverrides || {};
  if (overrides[overrideKey]) {
    // Build groups from the override exercise list
    const grouped = {};
    overrides[overrideKey].forEach(ex => {
      const g = ex._group || 'Exercises';
      if (!grouped[g]) grouped[g] = [];
      grouped[g].push(ex);
    });
    return Object.entries(grouped).map(([name, exercises]) => ({ name, exercises }));
  }
  const workouts = getWorkoutsForProgram(prog);
  return (workouts[day] && workouts[day].groups) || [];
}

function saveExerciseEdits(exId) {
  const name = document.getElementById('ex-name').value.trim();
  const sets = document.getElementById('ex-sets').value.trim();
  const cue  = document.getElementById('ex-cue').value.trim();
  if (!name) { alert('Name required'); return; }
  // Update in custom exercises if it's custom
  if (!state.customExercises) state.customExercises = [];
  const ci = state.customExercises.findIndex(e => e.id === exId);
  if (ci >= 0) { state.customExercises[ci] = { ...state.customExercises[ci], name, sets, cue }; }
  // Update in any overrides
  const overrides = state.workoutOverrides || {};
  Object.keys(overrides).forEach(key => {
    const ex = overrides[key].find(e => e.id === exId);
    if (ex) { ex.name = name; ex.sets = sets; ex.cue = cue; }
  });
  saveState(); closeExModal(); render();
}

function addExToWorkout(exId) {
  const prog = document.getElementById('ex-add-prog').value;
  const day  = document.getElementById('ex-add-day').value;
  const overrideKey = prog + '::' + day;
  if (!state.workoutOverrides) state.workoutOverrides = {};
  // Get current exercises for this day (from override or original)
  if (!state.workoutOverrides[overrideKey]) {
    const workouts = getWorkoutsForProgram(prog);
    const w = workouts[day];
    state.workoutOverrides[overrideKey] = w
      ? w.groups.flatMap(g => g.exercises.map(e => ({ ...e, _group: g.name })))
      : [];
  }
  // Don't add if already there
  if (state.workoutOverrides[overrideKey].some(e => e.id === exId)) {
    alert('Already in this workout'); return;
  }
  const allEx = getAllExercises();
  const ex = allEx.find(e => e.id === exId);
  if (!ex) return;
  state.workoutOverrides[overrideKey].push({ ...ex, _group: ex._group || 'Custom' });
  saveState(); closeExModal(); render();
}

function removeExFromWorkout(exId, prog, day) {
  const overrideKey = prog + '::' + day;
  if (!state.workoutOverrides) state.workoutOverrides = {};
  if (!state.workoutOverrides[overrideKey]) {
    const workouts = getWorkoutsForProgram(prog);
    const w = workouts[day];
    state.workoutOverrides[overrideKey] = w
      ? w.groups.flatMap(g => g.exercises.map(e => ({ ...e, _group: g.name })))
      : [];
  }
  state.workoutOverrides[overrideKey] = state.workoutOverrides[overrideKey].filter(e => e.id !== exId);
  saveState(); closeExModal(); render();
}

async function suggestExercisesForWorkout() {
  const focus = (document.getElementById('nw-focus') || {}).value || '';
  const notes = (document.getElementById('nw-notes') || {}).value || '';
  const modal = document.getElementById('new-workout-modal-bg');
  const container = document.getElementById('nw-suggestions');
  const btn = document.getElementById('nw-suggest-btn');
  if (!focus.trim()) { alert('Enter a workout focus first'); return; }

  if (btn) { btn.textContent = '✦ Generating suggestions…'; btn.disabled = true; }
  if (container) container.innerHTML = '<div style="text-align:center;padding:16px;color:var(--text3);font-size:12px">Asking Claude…</div>';

  // Build context from existing exercises
  const allEx = getAllExercises();
  const exNames = [...new Set(allEx.map(e => e.name))].slice(0, 80).join(', ');

  const systemPrompt = `You are a strength and conditioning coach building a workout for an experienced lifter in his mid-50s with these characteristics:
- Part 121 airline captain: long-haul international flights, circadian disruption, shoulder health is critical
- Active left lateral epicondylitis (elbow tendon): avoid direct heavy elbow flexion/extension under load, BFR is fine
- Equipment: full commercial gym, cables, barbells, dumbbells, Iron Neck, BFR cuffs
- Current programs emphasise: shoulder health, cable work, BFR finishers, unilateral work, trap and rear-delt development
- Existing exercises in library: ${exNames}

Return ONLY a JSON array (no markdown, no explanation) of 8-12 exercises matching the focus. Format each as:
{"name":"Exercise Name","sets":"3 × 10–12","group":"Group Name","cue":"Brief coaching cue focusing on form, purpose, and any elbow/shoulder considerations"}

Group names should reflect the logical structure of the workout (e.g. "Warm-up","Compound","Isolation","BFR finisher","Rehab").`;

  const userPrompt = `Workout focus: ${focus}${notes ? '\nAdditional notes: ' + notes : ''}

Suggest 8-12 exercises appropriate for this focus. Consider the athlete's profile above. Return only the JSON array.`;

  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: systemPrompt,
        messages: [{ role: 'user', content: userPrompt }]
      })
    });
    const data = await response.json();
    const raw = (data.content || []).filter(b => b.type === 'text').map(b => b.text).join('');
    const clean = raw.replace(/```json|```/g, '').trim();
    const suggestions = JSON.parse(clean);

    if (!modal) return;
    modal._suggestedExercises = suggestions.map((s, i) => ({
      id: 'sugg_' + Date.now() + '_' + i,
      name: s.name,
      sets: s.sets || '3 × 10',
      cue: s.cue || '',
      _group: s.group || 'Exercises',
      _custom: true
    }));
    modal._selectedSuggestions = new Set(modal._suggestedExercises.map(e => e.id));

    renderSuggestions();
    if (btn) { btn.textContent = '✦ Regenerate Suggestions'; btn.disabled = false; }
  } catch (err) {
    if (container) container.innerHTML = '<div style="color:var(--red);font-size:12px;padding:8px">Error generating suggestions. Try again.</div>';
    if (btn) { btn.textContent = '✦ Suggest Exercises for This Focus'; btn.disabled = false; }
  }
}

function renderSuggestions() {
  const modal = document.getElementById('new-workout-modal-bg');
  const container = document.getElementById('nw-suggestions');
  if (!modal || !container) return;
  const suggestions = modal._suggestedExercises || [];
  if (!suggestions.length) return;

  let html = '<div style="background:var(--surf);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:4px">'
    + '<div style="padding:10px 14px;background:var(--surf2);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between">'
    + '<div style="font-size:12px;font-weight:700;color:var(--purple)">✦ Suggested Exercises</div>'
    + '<div style="font-size:10px;color:var(--text3)">Tap to include / exclude</div>'
    + '</div>';

  const byGroup = {};
  suggestions.forEach(ex => {
    if (!byGroup[ex._group]) byGroup[ex._group] = [];
    byGroup[ex._group].push(ex);
  });

  Object.entries(byGroup).forEach(([group, exes]) => {
    html += `<div style="padding:4px 14px 0;font-size:9px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:0.6px;margin-top:6px">${group}</div>`;
    exes.forEach((ex, i) => {
      const sel = modal._selectedSuggestions.has(ex.id);
      html += `<div onclick="toggleSuggestion('${ex.id}')" id="sugg-row-${ex.id}"
        style="display:flex;align-items:flex-start;gap:10px;padding:10px 14px;cursor:pointer;border-bottom:1px solid var(--border);background:${sel ? 'var(--blue-ll)' : 'transparent'}">
        <div class="task-check ${sel ? 'done' : ''}" id="sugg-chk-${ex.id}" style="flex-shrink:0;margin-top:2px">
          <svg viewBox="0 0 12 12" fill="none" stroke="white" stroke-width="2"><polyline points="2,6 5,9 10,3"/></svg>
        </div>
        <div style="flex:1;min-width:0">
          <div style="font-size:13px;font-weight:600;margin-bottom:2px">${ex.name}</div>
          <div style="font-size:10px;color:var(--blue);font-weight:600;margin-bottom:3px">${ex.sets}</div>
          <div style="font-size:11px;color:var(--text2);line-height:1.4">${ex.cue}</div>
        </div>
      </div>`;
    });
  });

  html += '</div>';
  container.innerHTML = html;
}

function toggleSuggestion(id) {
  const modal = document.getElementById('new-workout-modal-bg');
  if (!modal) return;
  const row = document.getElementById('sugg-row-' + id);
  const chk = document.getElementById('sugg-chk-' + id);
  if (modal._selectedSuggestions.has(id)) {
    modal._selectedSuggestions.delete(id);
    if (row) row.style.background = 'transparent';
    if (chk) chk.className = 'task-check';
  } else {
    modal._selectedSuggestions.add(id);
    if (row) row.style.background = 'var(--blue-ll)';
    if (chk) chk.className = 'task-check done';
  }
}

function closeNewWorkoutModal() { const m = document.getElementById('new-workout-modal-bg'); if (m) m.remove(); }

function saveNewWorkout() {
  const modal = document.getElementById('new-workout-modal-bg');
  const focus = (document.getElementById('nw-focus') || {}).value || '';
  const notes = (document.getElementById('nw-notes') || {}).value || '';
  if (!focus.trim()) { alert('Enter a workout name / focus'); return; }
  if (!modal || !modal._selectedDays.size) { alert('Select at least one day of the week'); return; }

  const selectedExercises = (modal._suggestedExercises || [])
    .filter(ex => modal._selectedSuggestions.has(ex.id));

  // Save each selected exercise to customExercises
  if (!state.customExercises) state.customExercises = [];
  if (!state.workoutOverrides) state.workoutOverrides = {};

  // Derive a short program key — use 'custom' + timestamp
  const progId = 'W' + Date.now().toString().slice(-4);

  modal._selectedDays.forEach(day => {
    const overrideKey = progId + '::' + day;
    state.workoutOverrides[overrideKey] = selectedExercises.map(ex => ({ ...ex }));
    // Also register exercises as custom if not already present
    selectedExercises.forEach(ex => {
      if (!state.customExercises.find(e => e.id === ex.id)) {
        state.customExercises.push(ex);
      }
    });
  });

  // Register this as a custom workout program
  if (!state.customWorkouts) state.customWorkouts = [];
  state.customWorkouts.push({
    id: progId,
    name: focus,
    notes,
    days: [...modal._selectedDays],
    exerciseIds: selectedExercises.map(e => e.id),
    created: localDateISO()
  });

  saveState();
  closeNewWorkoutModal();
  render();
  // Show confirmation
  setTimeout(() => alert(`"${focus}" saved! View it in the Builder under Custom Workouts.`), 100);
}

function deleteCustomWorkout(id) {
  if (!confirm('Delete this workout?')) return;
  state.customWorkouts = (state.customWorkouts || []).filter(w => w.id !== id);
  // Remove overrides for this workout's days
  const w = (state.customWorkouts || []).find(w => w.id === id); // already filtered, use original id
  if (state.workoutOverrides) {
    Object.keys(state.workoutOverrides).filter(k => k.startsWith(id + '::')).forEach(k => {
      delete state.workoutOverrides[k];
    });
  }
  saveState(); render();
}

function saveNewExercise() {
  const name = document.getElementById('new-ex-name').value.trim();
  const sets = document.getElementById('new-ex-sets').value.trim();
  const cue  = document.getElementById('new-ex-cue').value.trim();
  const prog = document.getElementById('new-ex-prog').value;
  const day  = document.getElementById('new-ex-day').value;
  if (!name) { alert('Name required'); return; }
  const id = 'custom_' + Date.now();
  if (!state.customExercises) state.customExercises = [];
  state.customExercises.push({ id, name, sets, cue, _custom: true, _group: 'Custom' });
  if (prog && day) {
    const overrideKey = prog + '::' + day;
    if (!state.workoutOverrides) state.workoutOverrides = {};
    if (!state.workoutOverrides[overrideKey]) {
      const workouts = getWorkoutsForProgram(prog);
      const w = workouts[day];
      state.workoutOverrides[overrideKey] = w
        ? w.groups.flatMap(g => g.exercises.map(e => ({ ...e, _group: g.name })))
        : [];
    }
    state.workoutOverrides[overrideKey].push({ id, name, sets, cue, _group: 'Custom' });

  saveState(); closeNewExModal(); render();
}

function deleteCustomExercise(exId) {

}

function openWorkoutDayEditor(prog, day) {
  const workouts = getWorkoutsForProgram(prog);
  const w = workouts[day];
  const overrideKey = prog + '::' + day;
  const overrides = state.workoutOverrides || {};
  const currentIds = overrides[overrideKey]
    ? new Set(overrides[overrideKey].map(e => e.id))
    : new Set(w ? w.groups.flatMap(g => g.exercises.map(e => e.id)) : []);

  const allEx = getAllExercises();
  const progLabel = prog === 'A' ? 'Shoulder & Back' : prog === 'B' ? 'Chest' : 'Legs';
  const progColor = prog === 'A' ? '#3b82f6' : prog === 'B' ? '#ec4899' : '#f97316';

  const modal = document.createElement('div');
  modal.className = 'cycles-modal-bg'; modal.id = 'day-editor-modal-bg';

  // Build checklist of all exercises
  const rows = allEx.map(ex => {
    const checked = currentIds.has(ex.id);
    const label = ex._custom ? `${ex.name} <span style="font-size:9px;color:var(--amber)">[custom]</span>` : ex.name;
    const origin = ex._custom ? '' : `<div style="font-size:10px;color:var(--text3)">${ex._progLabel} · ${ex._day} · ${ex._group}</div>`;
    return `<div style="display:flex;align-items:flex-start;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)">
      <div class="task-check ${checked?'done':''}" onclick="toggleDayEditorEx('${ex.id}')" id="dechk-${ex.id}" style="margin-top:2px;flex-shrink:0">
        <svg viewBox="0 0 12 12" fill="none" stroke="white" stroke-width="2"><polyline points="2,6 5,9 10,3"/></svg>
      </div>
      <div style="flex:1;min-width:0">
        <div style="font-size:13px;font-weight:600">${label}</div>
        <div style="font-size:10px;color:var(--blue);font-weight:600">${ex.sets||''}</div>
        ${origin}
      </div>
    </div>`;
  }).join('');

  modal.innerHTML = `<div class="cycles-modal" style="max-height:92vh">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px">
      <div>
        <div style="font-size:15px;font-weight:700;color:${progColor}">${progLabel} · ${day}</div>
        <div style="font-size:11px;color:var(--text2)">Check exercises to include in this workout</div>
      </div>
      <button onclick="resetWorkoutDayOverride('${prog}','${day}')" style="font-size:11px;color:var(--text3);background:none;border:none;cursor:pointer;padding:2px">Reset</button>
    </div>
    <div id="day-editor-list" style="margin:12px 0;max-height:60vh;overflow-y:auto">${rows}</div>
    <div style="display:flex;gap:8px;margin-top:4px">
      <button onclick="closeDayEditorModal()" style="flex:1;padding:10px;border-radius:var(--radius-sm);background:var(--surf2);border:none;color:var(--text2);font-size:13px;font-weight:700;cursor:pointer">Cancel</button>
      <button onclick="saveDayEditorModal('${prog}','${day}')" style="flex:1;padding:10px;border-radius:var(--radius-sm);background:var(--blue);border:none;color:#fff;font-size:13px;font-weight:700;cursor:pointer">Save</button>
    </div>
  </div>`;

  // Store temp selection in modal data
  modal._selection = new Set(currentIds);
  document.body.appendChild(modal);
}

function toggleDayEditorEx(exId) {
  const modal = document.getElementById('day-editor-modal-bg');
  if (!modal) return;
  if (!modal._selection) modal._selection = new Set();
  const chk = document.getElementById('dechk-' + exId);
  if (modal._selection.has(exId)) {
    modal._selection.delete(exId);
    if (chk) chk.className = 'task-check';
  } else {
    modal._selection.add(exId);
    if (chk) chk.className = 'task-check done';
  }
}

function closeDayEditorModal() { const m=document.getElementById('day-editor-modal-bg'); if(m)m.remove(); }

function saveDayEditorModal(prog, day) {
  const modal = document.getElementById('day-editor-modal-bg');
  if (!modal || !modal._selection) { closeDayEditorModal(); return; }
  const selectedIds = modal._selection;
  const allEx = getAllExercises();
  const overrideKey = prog + '::' + day;
  if (!state.workoutOverrides) state.workoutOverrides = {};
  // Build ordered list: preserve original order for existing exercises, append new ones at end
  const workouts = getWorkoutsForProgram(prog);
  const w = workouts[day];
  const originalOrder = w ? w.groups.flatMap(g => g.exercises.map(e => ({ ...e, _group: g.name }))) : [];
  const customOrder = allEx.filter(e => e._custom);
  const orderedEx = [...originalOrder, ...customOrder.filter(e => !originalOrder.some(o => o.id === e.id))];
  state.workoutOverrides[overrideKey] = orderedEx.filter(e => selectedIds.has(e.id));
  saveState(); closeDayEditorModal(); render();
}

function resetWorkoutDayOverride(prog, day) {
  if (!confirm('Reset to original workout?')) return;
  const overrideKey = prog + '::' + day;
  if (state.workoutOverrides) delete state.workoutOverrides[overrideKey];
  saveState(); closeDayEditorModal(); render();
}

function pickCycleColor(color) {
  document.getElementById('cy-color').value=color;
  document.querySelectorAll('.cycles-color-swatch').forEach(sw=>sw.classList.toggle('selected',sw.dataset.color===color));
}
function closeCycleModal() { const m=document.getElementById('cycles-modal-bg'); if(m)m.remove(); }
function saveCycleModal(existingId) {
  const compound=document.getElementById('cy-compound').value;
  const startDate=document.getElementById('cy-start').value;
  const endDate=document.getElementById('cy-end').value;
  const dose=document.getElementById('cy-dose').value.trim();
  const timing=document.getElementById('cy-timing').value.trim();
  const notes=document.getElementById('cy-notes').value.trim();
  const color=document.getElementById('cy-color').value||(COMPOUND_DEFAULT_COLORS[compound]||'#3b82f6');
  if(!startDate){alert('Please set a start date.');return;}
  const cycles=getCycles();
  if(existingId){const i=cycles.findIndex(x=>x.id===existingId);if(i>=0)cycles[i]={...cycles[i],compound,startDate,endDate,dose,timing,notes,color};}
  else cycles.push({id:Date.now().toString(),compound,startDate,endDate,dose,timing,notes,color});
  saveCycles(cycles); closeCycleModal(); render();
}
function deleteCycle(id) {
  if(!confirm('Delete this cycle?'))return;
  saveCycles(getCycles().filter(x=>x.id!==id)); closeCycleModal(); render();
}

window.addEventListener('DOMContentLoaded', () => {
  loadState();
  tab = 'today';
  if (!state.todayDate) state.todayDate = localDateISO();
  if (!state.workoutDate) state.workoutDate = localDateISO();
  const modeRow = document.getElementById('mode-row');
  if (modeRow) modeRow.style.display = 'flex';
  ['today','workout','mobility','cycles'].forEach(x => {
    const el = document.getElementById('nav-'+x);
    if (el) el.classList.toggle('active', x === 'today');
  });
  updateClock();
  setInterval(updateClock, 30000);
  render();
  window.addEventListener('online',  () => { const el=document.getElementById('offline-bar'); if(el) el.style.display='none'; });
  window.addEventListener('offline', () => { const el=document.getElementById('offline-bar'); if(el) el.style.display='block'; });
});
</script>
</body>
