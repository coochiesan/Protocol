    %22sizes%22: %22any%22,

<title>Protocol Tracker</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0a0c0f;--surf:#111318;--surf2:#181c22;--surf3:#1e2530;
  --border:#1e2530;--border2:#2a3340;
  --text:#e8eaf0;--text2:#8892a4;--text3:#4a5568;
  --blue:#3b82f6;--blue-l:#1e3a5f;--blue-ll:#0d1f35;
  --green:#10b981;--green-l:#0d3d2e;
  --amber:#f59e0b;--amber-l:#3d2a08;
  --purple:#a855f7;--purple-l:#2d1a4a;
  --red:#ef4444;--red-l:#3d1414;
  --teal:#14b8a6;--teal-l:#0d332f;
  --pink:#ec4899;--pink-l:#3d1229;
  --radius:10px;--radius-sm:6px;
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bot:env(safe-area-inset-bottom,0px);
}
body.light{
  --bg:#F5F4F0;--surf:#FFFFFF;--surf2:#F1EFE8;--surf3:#E8E6DF;
  --border:#E2DFD6;--border2:#D3D0C7;
  --text:#1A1A18;--text2:#5F5E5A;--text3:#9CA39A;
  --blue:#185FA5;--blue-l:#E6F1FB;--blue-ll:#B5D4F4;
  --green:#3B6D11;--green-l:#EAF3DE;
  --amber:#854F0B;--amber-l:#FAEEDA;
  --purple:#534AB7;--purple-l:#EEEDFE;
  --red:#A32D2D;--red-l:#FCEBEB;
  --teal:#0F6E56;--teal-l:#E1F5EE;
  --pink:#993556;--pink-l:#FBEAF0;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text',sans-serif;font-size:14px;overflow:hidden}

/* ── Layout ── */
#app{display:flex;flex-direction:column;height:100%;padding-top:var(--safe-top)}
#header{flex-shrink:0;padding:12px 16px 8px;background:var(--surf);border-bottom:1px solid var(--border)}
#content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:12px 16px 80px}
#nav{flex-shrink:0;display:flex;background:var(--surf);border-top:1px solid var(--border);padding-bottom:var(--safe-bot)}

/* ── Header ── */
.hdr-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.hdr-title{font-size:18px;font-weight:700;letter-spacing:-0.3px}
.hdr-time{font-family:'SF Mono',monospace;font-size:12px;color:var(--text2);text-align:right}
.mode-row{display:flex;gap:6px}
.mode-btn{flex:1;padding:6px 4px;border-radius:var(--radius-sm);border:1px solid var(--border2);background:var(--surf2);color:var(--text2);font-size:11px;font-weight:600;cursor:pointer;text-align:center;transition:all .15s}
.mode-btn.active{background:var(--blue-ll);border-color:var(--blue);color:var(--blue)}

/* ── Nav ── */
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:10px 4px;border:none;background:none;color:var(--text3);font-size:9px;font-weight:600;cursor:pointer;gap:4px;letter-spacing:0.3px;text-transform:uppercase}
.nav-btn svg{width:20px;height:20px}
.nav-btn.active{color:var(--blue)}

/* ── Cards ── */
.card{background:var(--surf);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:8px;overflow:hidden}
.card-hdr{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-bottom:1px solid var(--border)}
.card-hdr-left{display:flex;align-items:center;gap:8px}
.card-dot{width:8px;height:8px;border-radius:2px;flex-shrink:0}
.card-title{font-size:13px;font-weight:600}
.card-time{font-size:11px;color:var(--text2);font-family:'SF Mono',monospace}

/* ── Task rows ── */
.task{display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid var(--border)}
.task:last-child{border-bottom:none}
.task-check{width:20px;height:20px;border-radius:5px;border:1.5px solid var(--border2);flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s}
.task-check.done{background:var(--green);border-color:var(--green)}
.task-check.done svg{display:block}
.task-check svg{display:none;width:12px;height:12px}
.task-body{flex:1;min-width:0}
.task-label{font-size:13px;font-weight:500;line-height:1.3}
.task-label.done{opacity:.4;text-decoration:line-through}
.task-sub{font-size:11px;color:var(--text2);margin-top:2px;line-height:1.4}
.task-badge{font-size:10px;font-weight:700;padding:2px 7px;border-radius:4px;flex-shrink:0;white-space:nowrap}

/* ── Progress bar ── */
.progress-wrap{padding:10px 14px 12px;background:var(--surf2)}
.progress-row{display:flex;justify-content:space-between;margin-bottom:6px}
.progress-label{font-size:11px;color:var(--text2)}
.progress-val{font-size:11px;font-weight:600;color:var(--green)}
.progress-bar{height:4px;background:var(--border2);border-radius:2px;overflow:hidden}
.progress-fill{height:100%;background:var(--green);border-radius:2px;transition:width .3s}

/* ── Workout ── */
.ex-group{margin-bottom:6px}
.ex-group-hdr{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:0.8px;padding:8px 14px 4px}
.ex-row{display:flex;align-items:center;gap:10px;padding:9px 14px;border-bottom:1px solid var(--border)}
.ex-row:last-child{border-bottom:none}
.ex-name{flex:1;font-size:13px;font-weight:500}
.ex-sets{font-size:12px;color:var(--blue);font-weight:600;font-family:'SF Mono',monospace;white-space:nowrap}
.ex-log{display:flex;gap:6px;align-items:center}
.ex-input{width:52px;padding:4px 6px;border-radius:4px;border:1px solid var(--border2);background:var(--surf2);color:var(--text);font-size:12px;text-align:center;font-family:'SF Mono',monospace}
.ex-x{font-size:11px;color:var(--text3)}
.ex-cue{font-size:10px;color:var(--text3);padding:2px 14px 6px;line-height:1.4}

/* ── Layover ── */
.tz-bar{display:flex;gap:1px;margin-bottom:8px}
.tz-block{flex:1;background:var(--surf2);border-radius:var(--radius-sm);padding:10px 12px}
.tz-label{font-size:10px;color:var(--text3);font-weight:600;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:3px}
.tz-time{font-family:'SF Mono',monospace;font-size:18px;font-weight:700}
.tz-body{font-size:10px;color:var(--text2);margin-top:2px}
.tz-bar .tz-block:first-child{border-top-right-radius:0;border-bottom-right-radius:0}
.tz-bar .tz-block:last-child{border-top-left-radius:0;border-bottom-left-radius:0}

.timeline-item{display:flex;gap:12px;padding:8px 0;position:relative}
.tl-time{width:80px;flex-shrink:0;text-align:right}
.tl-local{font-size:13px;font-weight:600;font-family:'SF Mono',monospace}
.tl-pdt{font-size:10px;color:var(--text3);font-family:'SF Mono',monospace}
.tl-dot{width:10px;height:10px;border-radius:3px;flex-shrink:0;margin-top:3px}
.tl-body{flex:1}
.tl-title{font-size:13px;font-weight:600;line-height:1.3}
.tl-sub{font-size:11px;color:var(--text2);margin-top:2px;line-height:1.4}
.tl-line{width:1px;background:var(--border2);position:absolute;left:92px;top:22px;bottom:-8px}
.timeline-item:last-child .tl-line{display:none}
.alert-row{display:flex;align-items:center;gap:8px;padding:6px 0}
.alert-time-input{padding:4px 8px;border-radius:4px;border:1px solid var(--border2);background:var(--surf2);color:var(--text);font-size:12px;font-family:'SF Mono',monospace;width:90px}
.alert-label{font-size:12px;color:var(--text2);flex:1}
.alert-toggle{width:36px;height:20px;border-radius:10px;border:none;cursor:pointer;position:relative;flex-shrink:0;transition:background .15s}
.alert-toggle.on{background:var(--blue)}
.alert-toggle.off{background:var(--border2)}
.alert-toggle::after{content:'';position:absolute;width:16px;height:16px;border-radius:50%;background:#fff;top:2px;transition:left .15s}
.alert-toggle.on::after{left:18px}
.alert-toggle.off::after{left:2px}

/* ── Bloodwork ── */
.bw-row{display:flex;align-items:center;padding:9px 14px;border-bottom:1px solid var(--border)}
.bw-row:last-child{border-bottom:none}
.bw-name{flex:1;font-size:13px;font-weight:500}
.bw-range{font-size:11px;color:var(--text3);margin-right:8px}
.bw-val{font-family:'SF Mono',monospace;font-size:13px;font-weight:600;width:70px;text-align:right}
.bw-status{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-left:6px}
.bw-input{width:70px;padding:3px 6px;border-radius:4px;border:1px solid var(--border2);background:var(--surf2);color:var(--text);font-size:12px;font-family:'SF Mono',monospace;text-align:right}

/* ── Section label ── */
.section-label{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:0.8px;margin:14px 0 6px}

/* ── Macro bar ── */
.macro-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:8px}
.macro-cell{background:var(--surf2);border-radius:var(--radius-sm);padding:8px 10px;text-align:center}
.macro-val{font-size:16px;font-weight:700;font-family:'SF Mono',monospace}
.macro-label{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:0.5px;margin-top:2px}

/* ── Notification banner ── */
#notif-banner{background:var(--blue-ll);border:1px solid var(--blue);border-radius:var(--radius);padding:10px 14px;margin-bottom:8px;display:none}
#notif-banner.show{display:block}
.notif-title{font-size:13px;font-weight:600;color:var(--blue);margin-bottom:2px}
.notif-sub{font-size:11px;color:var(--text2)}

/* ── Empty state ── */
.empty{text-align:center;padding:40px 20px;color:var(--text3)}

/* ── Utilities ── */
.flex-row{display:flex;align-items:center;gap:8px}
.spacer{flex:1}
.pill{display:inline-block;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:700}
.mt8{margin-top:8px}
</style>

<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js')
    .then(reg => {
      reg.addEventListener('updatefound', () => {
        const newWorker = reg.installing;
        newWorker.addEventListener('statechange', () => {
          if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
            console.log('Protocol app updated');
          }
        });
      });
    })
    .catch(err => console.log('SW registration failed:', err));
}
</script>
</head>
<body>
<div id="app">


<div id="offline-bar" style="display:none;background:var(--amber-l);border-bottom:1px solid var(--amber);padding:6px 16px;font-size:11px;color:var(--amber);font-weight:600;text-align:center">
  OFFLINE MODE — all data saved locally
</div>
<div id="header">
  <div class="hdr-top">
    <div>
      <div class="hdr-title">Protocol</div>

    </div>
    <div style="display:flex;align-items:center;gap:10px">
      <button id="theme-toggle" onclick="toggleTheme()" style="background:var(--surf2);border:1px solid var(--border2);border-radius:20px;padding:4px 10px;font-size:11px;font-weight:600;color:var(--text2);cursor:pointer;white-space:nowrap">Light</button>
      <div class="hdr-time">
        <div id="clock-local" style="font-size:16px;font-weight:700;font-family:'SF Mono',monospace"></div>

      </div>
    </div>
  </div>
  <div class="mode-row">
    <div class="mode-btn active" onclick="setMode('home')" id="btn-home">At Home</div>

</div>

<div id="content"></div>

<div id="nav">
  <button class="nav-btn active" id="nav-today" onclick="setTab('today')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>

    Workout
  </button>

    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.07 9.81a19.79 19.79 0 01-3.07-8.63A2 2 0 012 .99h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L6.09 8.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92z"/></svg>
    Flight
  </button>
  <button class="nav-btn" id="nav-layover" onclick="setTab('layover')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 16l-9-9-9 9"/><path d="M12 7v14"/><path d="M5 21h14"/></svg>
    Layover
  </button>

</div>

</div>

<script>
const DAYS = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

let mode = 'home';
let tab = 'today';
let state = {};

function loadState() {
  try { state = JSON.parse(localStorage.getItem('protocol_state') || '{}'); } catch(e) { state = {}; }
  if (!state.checks) state.checks = {};
  if (!state.weights) state.weights = {};
  if (!state.alerts) state.alerts = {};
  if (!state.layover) state.layover = { tz: 'Europe/London', tzName: 'London BST' };
  if (!state.flight) state.flight = {};
  if (state.theme === 'light') applyTheme('light');
}

function toggleTheme() {
  const next = document.body.classList.contains('light') ? 'dark' : 'light';
  applyTheme(next);
  state.theme = next;
  saveState();
}

function applyTheme(t) {
  const btn = document.getElementById('theme-toggle');
  if (t === 'light') {
    document.body.classList.add('light');
    if (btn) btn.textContent = 'Dark';
  } else {
    document.body.classList.remove('light');
    if (btn) btn.textContent = 'Light';
  }
}
function saveState() { localStorage.setItem('protocol_state', JSON.stringify(state)); }

function setMode(m) {
  mode = m;
  ['home','layover','duty'].forEach(x => {
    document.getElementById('btn-'+x).classList.toggle('active', x === m);
  });
  render();
}

function setTab(t) {
  tab = t;
  ['today','workout','layover','flight'].forEach(x => {
    document.getElementById('nav-'+x).classList.toggle('active', x === t);
  });
  render();
}

// ── Clock ──────────────────────────────────────────────────────────────────
function updateClock() {
  const now = new Date();
  const day = DAYS[now.getDay()];
  const mon = MONTHS[now.getMonth()];
  document.getElementById('date-display').textContent = `${day}, ${mon} ${now.getDate()}`;

  const localH = String(now.getHours()).padStart(2,'0');
  const localM = String(now.getMinutes()).padStart(2,'0');
  document.getElementById('clock-local').textContent = `${localH}:${localM}`;

  const pdtOffset = -7 * 60;
  const utc = now.getTime() + now.getTimezoneOffset() * 60000;
  const pdt = new Date(utc + pdtOffset * 60000);
  const pdtH = String(pdt.getHours()).padStart(2,'0');
  const pdtM = String(pdt.getMinutes()).padStart(2,'0');
  const isSameDay = pdt.getDate() === now.getDate();
  document.getElementById('clock-pdt').textContent = `${pdtH}:${pdtM} PDT${isSameDay ? '' : ' (+1)'}`;
}

const DAILY_TASKS = {

    { time:'Morning', id:'mon_coffee', label:'Mushroom coffee + Creatine 5g + MCT oil', sub:'lion’s mane / chaga blend · creatine dissolved in · MCT oil added · cognitive + training primer', color:'#92400e', badge:'' },
    { time:'On waking', id:'mon_ostarine', label:'Ostarine 10mg (1ml)', sub:'take with food · lipophilic · Cycle 1 Wk 1/8', color:'#4f46e5', badge:'cycle 1' },
    { time:'Breakfast', id:'mon_bfast', label:'Breakfast supps', sub:'Fish oil 2g · Curcumin 300mg · Boron 6mg · Cissus 1600mg · Fadogia 600mg · Tongkat 400mg', color:'#14b8a6', badge:'' },

    { time:'Pre-training', id:'mon_klow', label:'KLOW blend subQ', sub:'GHK-Cu 2.5mg · KPV 500mcg · BPC-157 500mcg · TB-500 500mcg · 10 units U-100', color:'#3b82f6', badge:'KLOW' },

    { time:'Post-train', id:'mon_whey', label:'Whey isolate 40–50g', sub:'immediately post-training · highest MPS priority', color:'#6366f1', badge:'' },
    { time:'Mid-Evening', id:'mon_mideve', label:'Casein 30–40g + evening supps', sub:'Creatine 5g · Fish oil 2g · Curcumin 500mg · Cissus 1600mg · Vit C 500mg', color:'#14b8a6', badge:'2–3hr pre-bed' },

    { time:'On waking', id:'tue_nmn', label:'NMN 1g sublingual', sub:'hold under tongue 2–3 min', color:'#f59e0b', badge:'daily' },
    { time:'On waking', id:'tue_ss31', label:'SS-31 1mg subQ', sub:'any time · no fasting · 6-week cycle', color:'#a855f7', badge:'6-wk cycle' },

    { time:'On waking', id:'tue_retrat', label:'Retatrutide 4mg subQ', sub:'weekly dose · every Tuesday · GLP-1/GIP/glucagon', color:'#ef4444', badge:'weekly' },
    { time:'Morning', id:'tue_redlight', label:'Red light vision 3 min', sub:'670nm · eyes open · before cold plunge', color:'#ec4899', badge:'' },
    { time:'Morning', id:'tue_cold', label:'Cold plunge / shower 2–3 min', sub:'morning only · circadian anchor', color:'#3b82f6', badge:'' },
    { time:'Morning', id:'tue_cardio', label:'Light mobility / walk or swim 30 min', sub:'low intensity · active recovery · get outside', color:'#f59e0b', badge:'Zone 2' },

function render() {
  const c = document.getElementById('content');
  if (tab === 'today') renderToday(c);
  else if (tab === 'workout') renderWorkout(c);
  else if (tab === 'layover') renderLayover(c);
  else if (tab === 'flight') { renderFlight(c); setTimeout(updateBreakCountdowns, 50); }
}

function renderToday(c) {
  const now = new Date();
  const realTodayIdx = now.getDay();
  // Allow scrolling days — default to today
  if (state.todayDayIdx === undefined || state.todayDayIdx === null) {
    state.todayDayIdx = realTodayIdx;
  }
  const dayIdx = state.todayDayIdx;
  const dayName = DAYS[dayIdx];
  const isRealToday = dayIdx === realTodayIdx;
  // Use real today's date for the key so checks persist correctly per calendar date
  // For past/future days use a synthetic key based on day offset
  const offsetDays = ((dayIdx - realTodayIdx) + 7) % 7;
  const keyDate = new Date(now); keyDate.setDate(keyDate.getDate() - ((realTodayIdx - dayIdx + 7) % 7));
  const todayKey = `${dayName}_${keyDate.toDateString()}`;
  if (!state.checks[todayKey]) state.checks[todayKey] = {};
  const checks = state.checks[todayKey];

  // Map duty task IDs to their home-day equivalents so completed home items carry over
  const dayPfx = dayName.slice(0,3).toLowerCase();
  const DUTY_HOME_MAP = {
    duty_nmn:      [`${dayPfx}_nmn`],
    duty_ss31:     [`${dayPfx}_ss31`],
    duty_ostarine: [`${dayPfx}_ostarine`],
    duty_bpc:      [`${dayPfx}_bpc_am`, `${dayPfx}_bpc1`],
    duty_creatine: [`${dayPfx}_coffee`],
    duty_protein:  [],
    duty_hydrate:  [],
    duty_sleep:    [],
    duty_mag:      [`${dayPfx}_bed`],
  };

  // isDone check: for duty mode, check duty ID and any mapped home IDs
  const isDoneFor = (taskId) => {
    if (checks[taskId]) return true;
    if (mode === 'duty' && DUTY_HOME_MAP[taskId]) {
      return DUTY_HOME_MAP[taskId].some(id => !!checks[id]);
    }
    return false;
  };

  let tasks;
  if (mode === 'duty') {
    tasks = getDutyTasks();
  } else {
    tasks = DAILY_TASKS[dayName] || [];
  }

  const done = tasks.filter(t => isDoneFor(t.id)).length;
  const pct = tasks.length ? Math.round(done / tasks.length * 100) : 0;

  let html = '';

  html += `<div class="macro-grid">
    <div class="macro-cell"><div class="macro-val" style="color:#6366f1">160–175g</div><div class="macro-label">Protein</div></div>
    <div class="macro-cell"><div class="macro-val" style="color:#f59e0b">200–250g</div><div class="macro-label">Carbs</div></div>
    <div class="macro-cell"><div class="macro-val" style="color:#10b981">70–90g</div><div class="macro-label">Fat</div></div>
    <div class="macro-cell"><div class="macro-val" style="color:#3b82f6">2,800–3,050</div><div class="macro-label">kcal</div></div>
  </div>`;

  const prevDayName = DAYS[((dayIdx - 1) + 7) % 7];
  const nextDayName = DAYS[(dayIdx + 1) % 7];
  html += `<div class="card" style="margin-bottom:8px">
    <div style="display:flex;align-items:center;border-bottom:1px solid var(--border);padding:4px 0">
      <button onclick="shiftToday(-1)" style="background:none;border:none;padding:4px 10px;cursor:pointer;color:var(--text3);font-size:18px;line-height:1;flex-shrink:0">&#8592;</button>
      <div style="flex:1;text-align:center">
        <span style="font-size:13px;font-weight:600;color:var(--text)">${dayName}${isRealToday?' <span style="font-size:10px;color:var(--green);font-weight:700">TODAY</span>':''}</span>
        <div style="font-size:10px;color:var(--text3);margin-top:1px">${prevDayName} ← → ${nextDayName}</div>
      </div>
      <button onclick="shiftToday(1)" style="background:none;border:none;padding:4px 10px;cursor:pointer;color:var(--text3);font-size:18px;line-height:1;flex-shrink:0">&#8594;</button>
    </div>
    <div class="progress-wrap">
      <div class="progress-row">
        <span class="progress-label">${mode !== 'home' ? mode.charAt(0).toUpperCase()+mode.slice(1)+' · ' : ''}${done}/${tasks.length} complete</span>
        <span class="progress-val">${pct}%</span>
      </div>
      <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
    </div>
  </div>`;

  const grouped = groupBy(tasks, 'time');
  for (const [time, items] of Object.entries(grouped)) {
    html += `<div class="section-label">${time}</div><div class="card">`;
    items.forEach(task => {
      const isDone = isDoneFor(task.id);
      const isCarried = mode === 'duty' && !checks[task.id] && isDone;
      html += `<div class="task" onclick="${isCarried ? '' : `toggleCheck('${todayKey}','${task.id}')`}" style="${isCarried?'opacity:0.65;cursor:default':''}">
        <div class="task-check ${isDone?'done':''}" data-id="${task.id}">
          <svg viewBox="0 0 12 12" fill="none" stroke="white" stroke-width="2"><polyline points="2,6 5,9 10,3"/></svg>
        </div>
        <div class="task-body">
          <div class="task-label${isDone?' done':''}">${task.label}${isCarried?' <span style="font-size:9px;color:var(--green);font-weight:600">done at home</span>':''}</div>
          ${task.sub ? `<div class="task-sub">${task.sub}</div>` : ''}
        </div>
        ${task.badge ? `<div class="task-badge" style="background:${task.color}22;color:${task.color}">${task.badge}</div>` : ''}
        <div style="width:10px;height:10px;border-radius:2px;background:${task.color};flex-shrink:0"></div>
      </div>`;
    });
    html += '</div>';
  }

  if (tasks.length === 0) html += '<div class="empty">No protocol data for this day type.</div>';
  c.innerHTML = html;
}

function toggleCheck(dayKey, taskId) {
  if (!state.checks[dayKey]) state.checks[dayKey] = {};
  state.checks[dayKey][taskId] = !state.checks[dayKey][taskId];
  saveState();
  render();
}

              onchange="logWeight('${wKey}','${ex.id}_r',this.value)" style="width:40px">
          </div>
        </div>
      </div>`;
    });
    html += '</div>';
  });

  c.innerHTML = html;
}

function shiftToday(dir) {
  const realIdx = new Date().getDay();
  if (state.todayDayIdx === undefined || state.todayDayIdx === null) state.todayDayIdx = realIdx;
  state.todayDayIdx = ((state.todayDayIdx + dir) % 7 + 7) % 7;
  render();
}

function shiftWorkout(dir) {
  if (state.workoutDayIdx === undefined || state.workoutDayIdx === null) state.workoutDayIdx = 0;
  state.workoutDayIdx = ((state.workoutDayIdx + dir) % 7 + 7) % 7;
  render();
}

function logWeight(wKey, field, val) {
  if (!state.weights[wKey]) state.weights[wKey] = {};
  state.weights[wKey][field] = val;
  saveState();
}

function renderLayover(c) {

  const lay = state.layover || {};
  const localOffsetMin = lay.localOffsetMin !== undefined ? lay.localOffsetMin : 60;

  const displayCity = cityName === 'Other' ? (lay.customCity || 'Other') : cityName;
  const tzLabel   = lay.tzLabel || 'BST';
  const checkinTime = lay.checkinTime || '';
  const checkinDate = lay.checkinDate || '';
  const pickupTime  = lay.pickupTime  || '';
  const pickupDate  = lay.pickupDate  || '';
  const localNow = new Date(utc + localOffsetMin * 60000);
  const fmt  = d => `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
  const fmtD = d => DAYS[d.getDay()];
  const parseHHMM = s => { if (!s) return null; const [h,m] = s.split(':').map(Number); return isNaN(h) ? null : h*60+(m||0); };
  const minToHHMM = m => { const n=((m%1440)+1440)%1440; return `${String(Math.floor(n/60)).padStart(2,'0')}:${String(n%60).padStart(2,'0')}`; };
  const checkinMin = parseHHMM(checkinTime);
  const pickupMin  = parseHHMM(pickupTime);
  const pdtDiff = localOffsetMin - pdtOffsetMin;
  const layoverMins = (checkinMin!==null && pickupMin!==null && checkinDate && pickupDate)
    ? Math.round((new Date(`${pickupDate}T${pickupTime}`) - new Date(`${checkinDate}T${checkinTime}`))/60000)
    : (checkinMin!==null && pickupMin!==null ? ((pickupMin-checkinMin+1440)%1440) : null);
  const layoverHrs = layoverMins!==null ? (layoverMins/60).toFixed(1) : '—';
  const checkinPDT = checkinMin!==null ? minToHHMM(checkinMin-pdtDiff) : '—';
  const pickupPDT  = pickupMin !==null ? minToHHMM(pickupMin -pdtDiff) : '—';
  const pdtOf = lm => lm!==null ? minToHHMM(lm-pdtDiff) : '—';
  // Circadian-correct timing — driven by PDT body clock targets
  const pdtWorkout = 9*60;     // 09:00 PDT = peak cortisol/testosterone
  const pdtSleep   = 12*60+30; // 12:30 PDT = adenosine + melatonin window
  const wkLocal = pdtWorkout + pdtDiff;
  const slLocal = pdtSleep   + pdtDiff;
  // ── Timing: work backwards from pickup ───────────────────────────────────
  // pickupAbs = absolute minutes from midnight of check-in day
  const pickupAbs = (pickupMin !== null && checkinMin !== null)
    ? (() => {
        // If pickup date and checkin date both known, use actual diff
        if (pickupDate && checkinDate) {
          const diff = Math.round((new Date(`${pickupDate}T${pickupTime}`) - new Date(`${checkinDate}T${checkinTime}`))/60000);
          return checkinMin + diff;
        }
        // Otherwise assume pickup is next day if pickupMin < checkinMin
        return pickupMin < checkinMin ? pickupMin + 1440 : pickupMin;

  const wkBase    = 9*60 + pdtDiff;      // PDT 09:00 in local minutes

  // Find sleep slot: anchored to PDT 12:30, must be before wake-60 and after checkin+60
  // Work forward from slBase until it fits after checkin, then check it fits before wake

function setLayover(key, val) {
  if (!state.layover) state.layover = {};
  state.layover[key] = val;

function lookupCityTZ(cityName) {
  if (!cityName || cityName.length < 2) return;
  const statusEl = document.getElementById('tz-lookup-status');
  if (statusEl) statusEl.textContent = 'Looking up ' + cityName + '...';

  // Try to find timezone using the worldtimeapi
  fetch('https://worldtimeapi.org/api/timezone')
    .then(r => r.json())
    .then(zones => {
      // Search for a zone matching the city name
      const q = cityName.toLowerCase().replace(/\s+/g, '_');
      const match = zones.find(z => z.toLowerCase().includes('/' + q)) ||
                    zones.find(z => z.toLowerCase().includes(q));
      if (!match) {
        // Fall back to Intl-based offset detection for the city
        return lookupCityTZFallback(cityName);
      }
      return fetch('https://worldtimeapi.org/api/timezone/' + match)
        .then(r => r.json())
        .then(data => {
          const rawOffset = data.utc_offset || '+00:00';
          const sign = rawOffset[0] === '-' ? -1 : 1;
          const parts = rawOffset.replace(/[+-]/, '').split(':');
          const offsetMin = sign * (parseInt(parts[0]) * 60 + parseInt(parts[1] || 0));
          const abbrev = data.abbreviation || rawOffset;
          setLayover('localOffsetMin', offsetMin);
          setLayover('tzLabel', abbrev);
          setLayover('tzLookupStatus', match + ' · ' + abbrev + ' UTC' + rawOffset);
          saveState(); render();
        });
    })
    .catch(() => lookupCityTZFallback(cityName));
}

function lookupCityTZFallback(cityName) {
  // Use Intl to detect offset — try common IANA zone guesses
  const guesses = [
    'Asia/' + cityName.replace(/ /g,'_'),
    'Europe/' + cityName.replace(/ /g,'_'),
    'America/' + cityName.replace(/ /g,'_'),
    'Pacific/' + cityName.replace(/ /g,'_'),
    'Australia/' + cityName.replace(/ /g,'_'),
    'Africa/' + cityName.replace(/ /g,'_'),
  ];
  for (const tz of guesses) {
    try {
      const now = new Date();
      const fmt = new Intl.DateTimeFormat('en', { timeZone: tz, timeZoneName: 'short', hour: 'numeric', hour12: false });
      const parts = fmt.formatToParts(now);
      const tzName = (parts.find(p => p.type === 'timeZoneName') || {}).value || '';
      const offsetMs = now.getTime() - new Date(now.toLocaleString('en-US', { timeZone: tz })).getTime();
      const offsetMin = -Math.round(offsetMs / 60000);
      setLayover('localOffsetMin', offsetMin);
      setLayover('tzLabel', tzName);
      setLayover('tzLookupStatus', tz + ' · ' + tzName);
      saveState(); render(); return;
    } catch(e) {}
  }
  // Nothing found
  const el = document.getElementById('tz-lookup-status');
  if (el) el.textContent = 'City not found — set TZ and offset manually';
}

function selectCity(cityVal) {
  const presets = {
    'London':   { offset: 60,   tz: 'BST'  },
    'Sydney':   { offset: 600,  tz: 'AEST' },
    'Tokyo':    { offset: 540,  tz: 'JST'  },
    'Incheon':  { offset: 540,  tz: 'KST'  },
    'Auckland': { offset: 720,  tz: 'NZST' },
    'New York': { offset: -240, tz: 'EDT'  },
    'Dallas':   { offset: -300, tz: 'CDT'  },
    'Miami':    { offset: -240, tz: 'EDT'  },
  };
  if (!state.layover) state.layover = {};
  state.layover.city = cityVal;
  if (presets[cityVal]) {
    state.layover.localOffsetMin = presets[cityVal].offset;
    state.layover.tzLabel = presets[cityVal].tz;
  }
  saveState();
  render();
}

function captureLocalTime(prefix) {
  const lay = state.layover || {};
  const localOffsetMin = lay.localOffsetMin !== undefined ? lay.localOffsetMin : 60;
  const now = new Date();
  const utc = now.getTime() + now.getTimezoneOffset() * 60000;
  const ln = new Date(utc + localOffsetMin * 60000);
  const h = String(ln.getHours()).padStart(2,'0');
  const m = String(ln.getMinutes()).padStart(2,'0');
  const yyyy = ln.getFullYear();
  const mm   = String(ln.getMonth()+1).padStart(2,'0');
  const dd   = String(ln.getDate()).padStart(2,'0');
  setLayover(prefix+'Time', `${h}:${m}`);
  setLayover(prefix+'Date', `${yyyy}-${mm}-${dd}`);
}

function toggleAlert(key) {
  state.alerts[key] = state.alerts[key] === false ? true : false;
  saveState();
  scheduleNotifications();
  render();
}
function setAlertTime(key, val) {
  state.alerts[key+'_time'] = val;
  saveState();
  scheduleNotifications();
}

function scheduleNotifications() {
  if (!('Notification' in window)) return;
  if (Notification.permission === 'granted') {
    // Web notifications require service worker for delayed delivery
    // Show a confirmation that alerts are set
    const count = Object.keys(state.alerts).filter(k => !k.endsWith('_time') && state.alerts[k] !== false && state.alerts[k+'_time']).length;
    if (count > 0) {
      const b = document.getElementById('notif-banner');
      if (b) { b.classList.add('show'); b.querySelector('.notif-sub').textContent = `${count} alert${count>1?'s':''} configured · times set in BST`; }
    }
  } else if (Notification.permission !== 'denied') {
    Notification.requestPermission();
  }
}

function groupBy(arr, key) {
  const map = {};
  arr.forEach(item => {
    if (!map[item[key]]) map[item[key]] = [];
    map[item[key]].push(item);
  });
  return map;
}

    const rows = [];
    if (wakeMin   !== null) rows.push({ label:'Break alarm 1', local:minToHHMM(wakeUTC)+' UTC', utc:'', pdt:minToHHMM(wakePDT)+' PDT body clock', color:'#f59e0b' });
    if (break2Min !== null) rows.push({ label:'Break alarm 2', local:minToHHMM(break2UTC)+' UTC', utc:'', pdt:minToHHMM(break2PDT)+' PDT body clock', color:'#ec4899' });
    if (depMin  !== null) rows.push({ label:'Departure', local:`${depTime} ${depCity}`, utc:minToHHMM(depUTC)+' UTC', pdt:minToHHMM(depPDT)+' PDT', color:'#3b82f6' });
    if (arrMin  !== null) rows.push({ label:'Arrival', local:`${arrTime} ${arrCity} ${arrTZ}`, utc:minToHHMM(arrUTC)+' UTC', pdt:minToHHMM(arrPDT)+' PDT body clock', color:'#10b981' });
    if (flightMins !== null) rows.push({ label:'Flight time', local:flightHrs, utc:'', pdt:'', color:'#a855f7' });
    rows.forEach((r,i) => {
      html += `<div class="task" style="${i<rows.length-1?'border-bottom:1px solid var(--border)':'border:none'}">
        <div style="width:8px;height:8px;border-radius:2px;background:${r.color};flex-shrink:0"></div>
        <div class="task-body">
          <div class="task-label">${r.label}</div>
          <div class="task-sub">${r.local}${r.utc?' · '+r.utc:''}${r.pdt?' · '+r.pdt:''}</div>
        </div>
      </div>`;
    });
    html += `</div>`;
  }

  // ── Body clock context (dynamic) ─────────────────────────────────────────
  if (depMin !== null && arrMin !== null) {
    html += `<div class="section-label">Body clock context</div>
    <div class="card"><div class="task" style="border:none"><div class="task-body">
      <div class="task-sub" style="font-size:12px;color:var(--text2);line-height:1.6">
        Departing ${depCity} at ${depTime} local = ${minToHHMM(depUTC)} UTC = ${minToHHMM(depPDT)} PDT body clock.<br>
        Arriving ${arrCity} at ${arrTime} ${arrTZ} = ${minToHHMM(arrUTC)} UTC = ${minToHHMM(arrPDT)} PDT body clock.
        ${crewRest ? `<br>Crew rest target: ${crewRest} — time sleep window to PDT body clock night (22:00–06:00 PDT).` : ''}
      </div>
    </div></div></div>`;
  }

  // ── In-flight tips ────────────────────────────────────────────────────────
  const tips = [
    { cat:'Hydration', color:'#3b82f6', items:[
      'Cabin humidity is 10–20% — you lose 1–2L of water on a 10+ hr flight without noticing · target 250ml per hour minimum',
      'Avoid alcohol entirely — each drink costs 3–4x its volume in hydration and suppresses melatonin for the next sleep window',
      'Avoid caffeine in the 6 hrs before your intended crew rest window to preserve sleep pressure',
    ]},
    { cat:'Crew rest strategy', color:'#7c3aed', items:[
      'Time crew rest to PDT body clock night (22:00–06:00 PDT) for maximum sleep quality — sleep pressure and melatonin align',
      'Before entering rest: Magnesium 400mg + Glycine 3g + L-Theanine 200mg + Apigenin 50mg · give 20 min to take effect',
      '0.5mg melatonin (not 5–10mg) taken 30 min before desired sleep onset — phase-shifting tool, not a sedative',
      'Eye mask + earplugs non-negotiable · even partial light exposure suppresses melatonin 40–70%',
      'Aim for at least one full 90-min sleep cycle — exits before N3 re-entry, minimizes inertia on wake',
    ]},
    { cat:'Circadian protection', color:'#f59e0b', items:[
      'Eastbound (PHX→London): body clock shifts hardest · use melatonin and darkness to advance sleep onset · avoid bright light on arrival until after 10:00 local',
      'Westbound (London→PHX): naturally easier · stay awake on arrival · get afternoon sun at PHX · target normal bedtime PDT',
      'Meal timing matters — eating signals local time to the gut clock independently of the brain · eat at arrival-city meal times if layover >16 hrs',
      'Creatine (5–10g) partially buffers the cognitive and neuromuscular performance decrements from sleep deprivation — take with meals on duty days',
    ]},
    { cat:'Protocol on duty', color:'#a855f7', items:[
      'SS-31 1mg + NMN 1g sublingual on waking — both are non-fasted, take whenever possible',
      'Ostarine 10mg (1ml) with food — do not skip on duty days · consistency through the 8-week cycle matters',
      'BPC-157 250–500mcg subQ when able · local to elbow/forearm if possible · timing flexible on duty days',
      'Retatrutide suppresses appetite — eat deliberately to hit protein target · 160–175g even if not hungry',
      'No NSAIDs — use fish oil + curcumin instead · both are in your Tier 1 stack',
    ]},
    { cat:'Altitude & oxidative stress', color:'#10b981', items:[
      'Cabin altitude equivalent is 6,000–8,000 ft · chronic mild hypoxia elevates oxidative stress — SS-31 mitochondrial protection is directly relevant',
      'Cosmic radiation exposure at cruise altitude adds to occupational oxidative load over a career · the antioxidant stack (NAC off-days, curcumin, fish oil) partially mitigates this',
      'Cosmic radiation is highest on polar routes and at higher latitudes — relevant for London and Tokyo routes specifically',
    ]},
  ];

  tips.forEach(section => {
    html += `<div class="section-label">${section.cat}</div><div class="card">`;
    section.items.forEach((tip, i) => {
      html += `<div class="task" style="${i<section.items.length-1?'border-bottom:1px solid var(--border)':'border:none'}">
        <div style="width:6px;height:6px;border-radius:50%;background:${section.color};flex-shrink:0;margin-top:4px;align-self:flex-start"></div>
        <div class="task-body"><div class="task-sub" style="font-size:12px;line-height:1.55;color:var(--text2)">${tip}</div></div>
      </div>`;
    });
    html += '</div>';
  });

  c.innerHTML = html;
}

function setFlight(key, val) {
  if (!state.flights) state.flights = [{}];
  if (state.flightIdx === undefined) state.flightIdx = 0;
  if (!state.flights[state.flightIdx]) state.flights[state.flightIdx] = {};
  state.flights[state.flightIdx][key] = val;
  state.flight = state.flights[state.flightIdx]; // keep legacy ref in sync
  saveState();
  render();
}

function swapFlightCities() {
  if (!state.flights) state.flights = [state.flight || {}];
  if (state.flightIdx === undefined) state.flightIdx = 0;
  const fl = state.flights[state.flightIdx] || {};
  const curDep = fl.depCity || 'PHX';
  const curArr = fl.arrCity || 'London';
  setFlight('depCity', curArr);
  setFlight('arrCity', curDep);
}

function shiftFlight(dir) {
  if (!state.flights) state.flights = [state.flight || {}];
  if (state.flightIdx === undefined) state.flightIdx = 0;
  const newIdx = state.flightIdx + dir;
  if (newIdx < 0) return; // no wrap backwards past first
  if (newIdx >= state.flights.length) {
    // Add a new blank slot when scrolling forward past last
    state.flights.push({});
  }
  state.flightIdx = newIdx;
  state.flight = state.flights[state.flightIdx] || {};
  saveState();
  render();
  setTimeout(updateBreakCountdowns, 50);
}

function deleteFlightSlot() {
  if (!state.flights || state.flights.length <= 1) {
    state.flights = [{}];
    state.flightIdx = 0;
  } else {
    state.flights.splice(state.flightIdx, 1);
    state.flightIdx = Math.min(state.flightIdx, state.flights.length - 1);
  }
  state.flight = state.flights[state.flightIdx] || {};
  saveState();
  render();
  setTimeout(updateBreakCountdowns, 50);
}

function breakAlarmPlus3(prefix) {
  if (!state.flights) state.flights = [state.flight || {}];
  if (state.flightIdx === undefined) state.flightIdx = 0;
  const fl = state.flights[state.flightIdx] || {};
  const timeKey = prefix === 'wake' ? 'wakeTime'  : 'break2Time';
  const dateKey = prefix === 'wake' ? 'wakeDate'  : 'break2Date';
  const curTime = fl[timeKey] || '';
  const curDate = fl[dateKey] || '';
  // If a valid alarm is already set, add 3hrs to it; otherwise start from UTC now
  let baseMs;
  if (curDate && validTime(curTime)) {
    baseMs = new Date(`${curDate}T${curTime}:00Z`).getTime();
  } else {
    baseMs = Date.now();
  }
  const result = new Date(baseMs + 3 * 60 * 60000);
  const h    = String(result.getUTCHours()).padStart(2,'0');
  const m    = String(result.getUTCMinutes()).padStart(2,'0');
  const yyyy = result.getUTCFullYear();
  const mm   = String(result.getUTCMonth()+1).padStart(2,'0');
  const dd   = String(result.getUTCDate()).padStart(2,'0');
  setFlight(timeKey, `${h}:${m}`);
  setFlight(dateKey, `${yyyy}-${mm}-${dd}`);
}

function clearBreakAlarm(prefix) {
  if (!state.flights) state.flights = [state.flight || {}];
  if (state.flightIdx === undefined) state.flightIdx = 0;
  const timeKey = prefix === 'wake' ? 'wakeTime'  : 'break2Time';
  const dateKey = prefix === 'wake' ? 'wakeDate'  : 'break2Date';
  setFlight(timeKey, '');
  setFlight(dateKey, '');
}

// ── Shortcuts alarm integration ───────────────────────────────────────────
function openShortcutsAlarm() {
  const fl = state.flights ? (state.flights[state.flightIdx] || {}) : (state.flight || {});
  const alarms = [];
  if (fl.wakeDate && validTime(fl.wakeTime))   alarms.push({ label:'Break Alarm 1', date:fl.wakeDate,   time:fl.wakeTime });
  if (fl.break2Date && validTime(fl.break2Time)) alarms.push({ label:'Break Alarm 2', date:fl.break2Date, time:fl.break2Time });
  if (!alarms.length) return;

  const lines = ['PROTOCOL BREAK ALARMS', ''];
  alarms.forEach(a => {
    const ms    = new Date(a.date + 'T' + a.time + ':00Z').getTime();
    const local = new Date(ms);
    const lh    = String(local.getHours()).padStart(2,'0');
    const lm    = String(local.getMinutes()).padStart(2,'0');
    lines.push(a.label + ': ' + a.date + ' at ' + a.time + ' UTC');
    lines.push('Local device time: ' + lh + ':' + lm);
    lines.push('');
  });
  lines.push('Message: WAKE UP — end crew rest now');
  const text = lines.join('\n');

  const copy = () => {
    try {
      const ta = document.createElement('textarea');
      ta.value = text; ta.style.cssText = 'position:fixed;opacity:0';
      document.body.appendChild(ta); ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
    } catch(e) {}
  };

  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).catch(copy);
  } else { copy(); }

  showShortcutsOverlay(alarms);
}

function showShortcutsOverlay(alarms) {
  const existing = document.getElementById('sc-overlay');
  if (existing) existing.remove();

  const isLight = document.body.classList.contains('light');
  const bg    = isLight ? '#ffffff' : '#1a1d23';
  const outer = isLight ? 'rgba(0,0,0,0.5)' : 'rgba(0,0,0,0.88)';
  const t1    = isLight ? '#1a1a18' : '#e8eaf0';
  const t2    = isLight ? '#5f5e5a' : '#8892a4';
  const bdr   = isLight ? '#e2dfd6' : '#2a3340';
  const btnbg = isLight ? '#185FA5' : '#185FA5';

  const rows = alarms.map(a => {
    const ms    = new Date(a.date + 'T' + a.time + ':00Z').getTime();
    const local = new Date(ms);
    const lh    = String(local.getHours()).padStart(2,'0');
    const lm    = String(local.getMinutes()).padStart(2,'0');
    return '<div style="margin:8px 0;padding:10px;border-radius:8px;border:1px solid ' + bdr + '">'
      + '<div style="font-size:11px;font-weight:700;color:#f59e0b;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:4px">' + a.label + '</div>'
      + '<div style="font-size:15px;font-weight:700;font-family:SF Mono,monospace;color:' + t1 + '">' + a.time + ' UTC</div>'
      + '<div style="font-size:12px;color:' + t2 + ';margin-top:2px">' + lh + ':' + lm + ' device local time</div>'
      + '</div>';
  }).join('');

  const ov = document.createElement('div');
  ov.id = 'sc-overlay';
  ov.style.cssText = 'position:fixed;top:0;left:0;right:0;bottom:0;z-index:9999;background:' + outer + ';display:flex;align-items:center;justify-content:center;padding:20px';
  ov.innerHTML = '<div style="background:' + bg + ';border-radius:16px;padding:22px;width:100%;max-width:340px;border:1px solid ' + bdr + '">'
    + '<div style="font-size:17px;font-weight:700;color:' + t1 + ';margin-bottom:3px">Alarm times copied</div>'
    + '<div style="font-size:12px;color:' + t2 + ';margin-bottom:12px">Alarm details are on your clipboard</div>'
    + rows
    + '<div style="border-top:1px solid ' + bdr + ';margin:14px 0"></div>'
    + '<div style="font-size:12px;color:' + t2 + ';line-height:1.65;margin-bottom:14px">'
    + '<strong style="color:' + t1 + '">One-time setup:</strong> In Shortcuts, create a shortcut called "Protocol Alarm" with a Receive Input action, then a Set Timer or Create Reminder action using the clipboard text. After setup, this button does it in one tap.<br><br>'
    + 'Or: open Shortcuts, tap + to add a new automation timed to each alarm time below, and add a notification action saying "WAKE UP — end crew rest".'
    + '</div>'
    + '<a href="shortcuts://" style="display:block;padding:12px;border-radius:10px;background:' + btnbg + ';color:#fff;text-align:center;font-size:14px;font-weight:700;text-decoration:none;margin-bottom:8px">Open Shortcuts</a>'
    + '<button onclick="dismissShortcutsOverlay()" style="width:100%;padding:10px;border-radius:10px;border:1px solid ' + bdr + ';background:transparent;color:' + t2 + ';font-size:13px;cursor:pointer">Dismiss</button>'
    + '</div>';
  document.body.appendChild(ov);
  ov.addEventListener('click', function(e){ if(e.target===ov) dismissShortcutsOverlay(); });
}

function openClockAlarm(hour, min, label) {
  const h = String(hour % 24).padStart(2,'0');
  const m = String(min % 60).padStart(2,'0');
  showClockToast(h, m, label);
}

function openClockAlarmUTC(dateStr, timeStr, label) {
  const alarmMs = new Date(dateStr + 'T' + timeStr + ':00Z').getTime();
  const local = new Date(alarmMs);
  openClockAlarm(local.getHours(), local.getMinutes(), label);
}

function dismissClockToast() { var el=document.getElementById('clock-toast'); if(el) el.remove(); }

function showClockToast(h, m, label) {
  var existing = document.getElementById('clock-toast');
  if (existing) existing.remove();

  var isLight = document.body.classList.contains('light');
  var bg  = isLight ? '#ffffff' : '#1a1d23';
  var t1  = isLight ? '#1a1a18' : '#e8eaf0';
  var t2  = isLight ? '#5f5e5a' : '#8892a4';
  var bdr = isLight ? '#e2dfd6' : '#2a3340';

  var toast = document.createElement('div');
  toast.id = 'clock-toast';
  toast.style.cssText = 'position:fixed;bottom:80px;left:50%;transform:translateX(-50%);z-index:9999;'
    + 'background:' + bg + ';border:1px solid ' + bdr + ';border-radius:14px;padding:20px 24px;'
    + 'min-width:280px;text-align:center;width:calc(100% - 48px);max-width:320px';

  var lbl = document.createElement('div');
  lbl.style.cssText = 'font-size:11px;font-weight:700;color:' + t2 + ';text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px';
  lbl.textContent = label + ' alarm';

  var time = document.createElement('div');
  time.style.cssText = 'font-size:48px;font-weight:700;font-family:SF Mono,monospace;color:' + t1 + ';margin-bottom:4px;letter-spacing:2px';
  time.textContent = h + ':' + m;

  var hint = document.createElement('div');
  hint.style.cssText = 'font-size:11px;color:' + t2 + ';margin-bottom:16px;line-height:1.5';
  hint.textContent = 'device local time — open Clock and add this alarm manually';

  var copyBtn = document.createElement('button');
  copyBtn.style.cssText = 'width:100%;padding:8px;border-radius:10px;border:1px solid ' + bdr + ';background:transparent;color:' + t2 + ';font-size:12px;cursor:pointer;margin-bottom:6px';
  copyBtn.textContent = 'Copy time to clipboard';
  copyBtn.addEventListener('click', function() {
    var txt = h + ':' + m + ' — ' + label + ' alarm';
    if (navigator.clipboard) {
      navigator.clipboard.writeText(txt).then(function() {
        copyBtn.textContent = 'Copied \u2713';
        setTimeout(function() { copyBtn.textContent = 'Copy time to clipboard'; }, 2000);
      });
    }
  });

  var isStandalone = window.navigator.standalone === true;

  // Shortcuts deep link — runs a shortcut by name if one is set up
  // shortcuts://run-shortcut?name=Protocol%20Alarm
  var openLink = document.createElement('a');
  openLink.href = 'shortcuts://run-shortcut?name=Protocol%20Alarm&input=' + encodeURIComponent(h + ':' + m + ' ' + label);
  openLink.style.cssText = 'display:block;width:100%;padding:12px;border-radius:10px;border:none;'
    + 'background:#185FA5;color:#fff;font-size:14px;font-weight:700;cursor:pointer;'
    + 'margin-bottom:8px;text-decoration:none;box-sizing:border-box;text-align:center';
  openLink.textContent = 'Run Protocol Alarm shortcut';

  var dismissBtn = document.createElement('button');
  dismissBtn.style.cssText = 'width:100%;padding:10px;border-radius:10px;border:1px solid ' + bdr + ';background:transparent;color:' + t2 + ';font-size:13px;cursor:pointer';
  dismissBtn.textContent = 'Dismiss';
  dismissBtn.addEventListener('click', dismissClockToast);

  toast.appendChild(lbl);
  toast.appendChild(time);
  toast.appendChild(hint);
  toast.appendChild(openLink);
  toast.appendChild(copyBtn);
  toast.appendChild(dismissBtn);
  document.body.appendChild(toast);

  setTimeout(dismissClockToast, 60000);
}

function dismissShortcutsOverlay() {
  var el = document.getElementById('sc-overlay');
  if (el) el.remove();
}

// ── Break alarm countdowns ──────────────────────────────────────────────────
let alarmFired = { 'cd-break1': false, 'cd-break2': false };

function updateBreakCountdowns() {
  if (tab !== 'flight') return;
  const fl = state.flights ? (state.flights[state.flightIdx] || {}) : (state.flight || {});
  const utcNowMs = Date.now();

  function countdownFor(dateStr, timeStr, elId) {
    const el = document.getElementById(elId);
    if (!el) return;
    if (!dateStr || !timeStr || !validTime(timeStr)) { el.textContent = '—'; alarmFired[elId] = false; return; }
    const alarmMs = new Date(dateStr + 'T' + timeStr + ':00Z').getTime();
    if (isNaN(alarmMs)) { el.textContent = '??'; return; }
    const diffMs = alarmMs - utcNowMs;
    if (diffMs <= 0) {
      if (diffMs < -600000) {
        el.textContent = 'DONE'; el.style.color = 'var(--text3)';
        if (el.parentElement) el.parentElement.style.opacity = '0.5';
        alarmFired[elId] = false;
      } else {
        el.textContent = 'WAKE'; el.style.color = '#ef4444';
        if (el.parentElement) el.parentElement.style.opacity = '1';
      }
      return;
    }
    if (alarmFired[elId] && diffMs > 10000) alarmFired[elId] = false;
    if (el.parentElement) el.parentElement.style.opacity = '1';
    const totalSecs = Math.floor(diffMs / 1000);
    const hrs  = Math.floor(totalSecs / 3600);
    const mins = Math.floor((totalSecs % 3600) / 60);
    const secs = totalSecs % 60;
    el.textContent = String(hrs).padStart(2,'0') + ':' + String(mins).padStart(2,'0') + ':' + String(secs).padStart(2,'0');
    if (elId === 'cd-break1') el.style.color = totalSecs < 1800 ? '#ef4444' : 'var(--amber)';
    if (elId === 'cd-break2') el.style.color = totalSecs < 1800 ? '#ef4444' : '#ec4899';
  }

  countdownFor(fl.wakeDate,   fl.wakeTime,   'cd-break1');
  countdownFor(fl.break2Date, fl.break2Time, 'cd-break2');
}

setInterval(updateBreakCountdowns, 1000);

function captureFlightTime(prefix) {
  if (!state.flights) state.flights = [state.flight || {}];
  if (state.flightIdx === undefined) state.flightIdx = 0;
  const fl = state.flights[state.flightIdx] || {};
  const depOff = {LAX:-420,DFW:-300,JFK:-240,CLT:-240,PHX:-420,MIA:-240}[fl.depCity||'PHX'] || -420;
  const now = new Date();
  const utcMs = now.getTime() + now.getTimezoneOffset() * 60000;
  const isBreak = prefix === 'wake' || prefix === 'break2';
  let h, m, yyyy, mm, dd;
  if (isBreak) {
    // Break alarms are UTC — extract UTC values directly from now
    const nowObj = new Date();
    h    = String(nowObj.getUTCHours()).padStart(2,'0');
    m    = String(nowObj.getUTCMinutes()).padStart(2,'0');
    yyyy = nowObj.getUTCFullYear();
    mm   = String(nowObj.getUTCMonth()+1).padStart(2,'0');
    dd   = String(nowObj.getUTCDate()).padStart(2,'0');
  } else {
    const offset = prefix === 'arr'
      ? ((function(){ const c = (CITY_LIST||[{v:'LHR',off:60}]).find(x=>x.v===(fl.arrCity||'LHR')); return c?c.off:60; })())
      : depOff;
    const ln = new Date(utcMs + offset * 60000);
    h    = String(ln.getHours()).padStart(2,'0');
    m    = String(ln.getMinutes()).padStart(2,'0');
    yyyy = ln.getFullYear();
    mm   = String(ln.getMonth()+1).padStart(2,'0');
    dd   = String(ln.getDate()).padStart(2,'0');
  }
  setFlight(prefix+'Time', `${h}:${m}`);
  setFlight(prefix+'Date', `${yyyy}-${mm}-${dd}`);
}

function pickupPlus24() {
  const lay = state.layover || {};
  const checkinDate = lay.checkinDate || '';
  const checkinTime = lay.checkinTime || '';
  if (!checkinDate || !checkinTime) {
    alert('Enter check-in date and time first');
    return;
  }
  const ci = new Date(`${checkinDate}T${checkinTime}`);
  const pu = new Date(ci.getTime() + 24 * 60 * 60000);
  const h  = String(pu.getHours()).padStart(2,'0');
  const m  = String(pu.getMinutes()).padStart(2,'0');
  const yyyy = pu.getFullYear();
  const mm   = String(pu.getMonth()+1).padStart(2,'0');
  const dd   = String(pu.getDate()).padStart(2,'0');
  setLayover('pickupTime', `${h}:${m}`);
  setLayover('pickupDate', `${yyyy}-${mm}-${dd}`);
}


window.addEventListener('online',  () => { document.getElementById('offline-bar').style.display='none'; });
window.addEventListener('offline', () => { document.getElementById('offline-bar').style.display='block'; });
if (!navigator.onLine) document.getElementById('offline-bar').style.display='block';


function fmtTime(el) {
  let v = el.value.replace(/[^0-9]/g, '');
  if (v.length > 4) v = v.slice(0, 4);
  if (v.length >= 3) v = v.slice(0,2) + ':' + v.slice(2);
  el.value = v;
  // Validate range
  if (v.length === 5) {
    const [h, m] = v.split(':').map(Number);
    el.style.borderColor = (h < 24 && m < 60) ? 'var(--border2)' : 'var(--red)';
  } else {
    el.style.borderColor = 'var(--border2)';
  }
}

function validTime(v) {
  if (!v || v.length !== 5 || v[2] !== ':') return false;
  const [h, m] = v.split(':').map(Number);
  return h >= 0 && h < 24 && m >= 0 && m < 60;
}
