<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Protocol">
<meta name="theme-color" content="#0a0c0f">
<title>Protocol</title>
<style>

*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0a0c0f;--surf:#111318;--surf2:#181c22;--surf3:#1e2530;
  --border:#1e2530;--border2:#2a3340;
  --text:#e8eaf0;--text2:#8892a4;--text3:#4a5568;
  --blue:#3b82f6;--blue-l:#1e3a5f;--blue-ll:#0d1f35;
  --green:#10b981;--green-l:#0d3d2e;
  --amber:#f59e0b;--amber-l:#3d2a08;
  --purple:#a855f7;--purple-l:#2d1a4a;
  --red:#ef4444;--red-l:#3d1414;
  --teal:#14b8a6;--teal-l:#0d332f;
  --pink:#ec4899;--pink-l:#3d1229;
  --radius:10px;--radius-sm:6px;
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bot:env(safe-area-inset-bottom,0px);
}
body.light{
  --bg:#F5F4F0;--surf:#FFFFFF;--surf2:#F1EFE8;--surf3:#E8E6DF;
  --border:#E2DFD6;--border2:#D3D0C7;
  --text:#1A1A18;--text2:#5F5E5A;--text3:#9CA39A;
  --blue:#185FA5;--blue-l:#E6F1FB;--blue-ll:#B5D4F4;
  --green:#3B6D11;--green-l:#EAF3DE;
  --amber:#854F0B;--amber-l:#FAEEDA;
  --purple:#534AB7;--purple-l:#EEEDFE;
  --red:#A32D2D;--red-l:#FCEBEB;
  --teal:#0F6E56;--teal-l:#E1F5EE;
  --pink:#993556;--pink-l:#FBEAF0;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text',sans-serif;font-size:14px;overflow:hidden}

/* ── Layout ── */
#app{display:flex;flex-direction:column;height:100%;padding-top:var(--safe-top)}
#header{flex-shrink:0;padding:6px 14px 5px;background:var(--surf);border-bottom:1px solid var(--border)}
#content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:8px 14px 8px}
#nav{flex-shrink:0;display:flex;background:var(--surf);border-top:1px solid var(--border);padding-bottom:var(--safe-bot)}

/* ── Header ── */
.hdr-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:5px}
.hdr-title{font-size:16px;font-weight:700;letter-spacing:-0.3px}
.hdr-time{font-family:'SF Mono',monospace;font-size:12px;color:var(--text2);text-align:right}
.mode-row{display:flex;gap:5px;margin-top:5px}
.mode-btn{flex:1;padding:5px 4px;border-radius:var(--radius-sm);border:1px solid var(--border2);background:var(--surf2);color:var(--text2);font-size:11px;font-weight:600;cursor:pointer;text-align:center;transition:all .15s}
.mode-btn.active{background:var(--blue-ll);border-color:var(--blue);color:var(--blue)}

/* ── Nav ── */
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:6px 4px;border:none;background:none;color:var(--text3);font-size:9px;font-weight:600;cursor:pointer;gap:3px;letter-spacing:0.3px;text-transform:uppercase}
.nav-btn svg{width:18px;height:18px}
.nav-btn.active{color:var(--blue)}

/* ── Cards ── */
.card{background:var(--surf);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:8px;overflow:hidden}
.card-hdr{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-bottom:1px solid var(--border)}
.card-hdr-left{display:flex;align-items:center;gap:8px}
.card-dot{width:8px;height:8px;border-radius:2px;flex-shrink:0}
.card-title{font-size:13px;font-weight:600}
.card-time{font-size:11px;color:var(--text2);font-family:'SF Mono',monospace}

/* ── Task rows ── */
.task{display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid var(--border)}
.task:last-child{border-bottom:none}
.task-check{width:20px;height:20px;border-radius:5px;border:1.5px solid var(--border2);flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s}
.task-check.done{background:var(--green);border-color:var(--green)}
.task-check.done svg{display:block}
.task-check svg{display:none;width:12px;height:12px}
.task-body{flex:1;min-width:0}
.task-label{font-size:13px;font-weight:500;line-height:1.3}
.task-label.done{opacity:.4;text-decoration:line-through}
.task-sub{font-size:11px;color:var(--text2);margin-top:2px;line-height:1.4}
.task-badge{font-size:10px;font-weight:700;padding:2px 7px;border-radius:4px;flex-shrink:0;white-space:nowrap}

/* ── Progress bar ── */
.progress-wrap{padding:10px 14px 12px;background:var(--surf2)}
.progress-row{display:flex;justify-content:space-between;margin-bottom:6px}
.progress-label{font-size:11px;color:var(--text2)}
.progress-val{font-size:11px;font-weight:600;color:var(--green)}
.progress-bar{height:4px;background:var(--border2);border-radius:2px;overflow:hidden}
.progress-fill{height:100%;background:var(--green);border-radius:2px;transition:width .3s}

/* ── Workout ── */
.ex-group{margin-bottom:6px}
.ex-group-hdr{font-size:10px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:0.8px;padding:8px 14px 4px}
.ex-row{display:flex;align-items:center;gap:10px;padding:9px 14px;border-bottom:1px solid var(--border)}
.ex-row:last-child{border-bottom:none}
.ex-name{flex:1;font-size:15px;font-weight:500}
.ex-sets{font-size:14px;color:var(--blue);font-weight:600;font-family:'SF Mono',monospace;white-space:nowrap}
.ex-log{display:flex;gap:6px;align-items:center}
.ex-input{width:52px;padding:4px 6px;border-radius:4px;border:1px solid var(--border2);background:var(--surf2);color:var(--text);font-size:14px;text-align:center;font-family:'SF Mono',monospace}
.ex-x{font-size:13px;color:var(--text2)}
.ex-cue{font-size:12px;color:var(--text2);padding:2px 14px 6px;line-height:1.4}

/* ── Layover ── */
.tz-bar{display:flex;gap:1px;margin-bottom:8px}
.tz-block{flex:1;background:var(--surf2);border-radius:var(--radius-sm);padding:10px 12px}
.tz-label{font-size:10px;color:var(--text3);font-weight:600;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:3px}
.tz-time{font-family:'SF Mono',monospace;font-size:18px;font-weight:700}
.tz-body{font-size:10px;color:var(--text2);margin-top:2px}
.tz-bar .tz-block:first-child{border-top-right-radius:0;border-bottom-right-radius:0}
.tz-bar .tz-block:last-child{border-top-left-radius:0;border-bottom-left-radius:0}

.timeline-item{display:flex;gap:12px;padding:8px 0;position:relative}
.tl-time{width:80px;flex-shrink:0;text-align:right}
.tl-local{font-size:13px;font-weight:600;font-family:'SF Mono',monospace}
.tl-pdt{font-size:10px;color:var(--text3);font-family:'SF Mono',monospace}
.tl-dot{width:10px;height:10px;border-radius:3px;flex-shrink:0;margin-top:3px}
.tl-body{flex:1}
.tl-title{font-size:13px;font-weight:600;line-height:1.3}
.tl-sub{font-size:11px;color:var(--text2);margin-top:2px;line-height:1.4}
.tl-line{width:1px;background:var(--border2);position:absolute;left:92px;top:22px;bottom:-8px}
.timeline-item:last-child .tl-line{display:none}
.alert-row{display:flex;align-items:center;gap:8px;padding:6px 0}
.alert-time-input{padding:4px 8px;border-radius:4px;border:1px solid var(--border2);background:var(--surf2);color:var(--text);font-size:12px;font-family:'SF Mono',monospace;width:90px}
.alert-label{font-size:12px;color:var(--text2);flex:1}
.alert-toggle{width:36px;height:20px;border-radius:10px;border:none;cursor:pointer;position:relative;flex-shrink:0;transition:background .15s}
.alert-toggle.on{background:var(--blue)}
.alert-toggle.off{background:var(--border2)}
.alert-toggle::after{content:'';position:absolute;width:16px;height:16px;border-radius:50%;background:#fff;top:2px;transition:left .15s}
.alert-toggle.on::after{left:18px}
.alert-toggle.off::after{left:2px}

/* ── Bloodwork ── */
.bw-row{display:flex;align-items:center;padding:9px 14px;border-bottom:1px solid var(--border)}
.bw-row:last-child{border-bottom:none}
.bw-name{flex:1;font-size:13px;font-weight:500}
.bw-range{font-size:11px;color:var(--text3);margin-right:8px}
.bw-val{font-family:'SF Mono',monospace;font-size:13px;font-weight:600;width:70px;text-align:right}
.bw-status{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-left:6px}
.bw-input{width:70px;padding:3px 6px;border-radius:4px;border:1px solid var(--border2);background:var(--surf2);color:var(--text);font-size:12px;font-family:'SF Mono',monospace;text-align:right}

/* ── Section label ── */
.section-label{font-size:10px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:0.8px;margin:14px 0 6px}

/* ── Macro bar ── */
.macro-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:8px}
.macro-cell{background:var(--surf2);border-radius:var(--radius-sm);padding:8px 10px;text-align:center}
.macro-val{font-size:16px;font-weight:700;font-family:'SF Mono',monospace}
.macro-label{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:0.5px;margin-top:2px}

/* ── Notification banner ── */
#notif-banner{background:var(--blue-ll);border:1px solid var(--blue);border-radius:var(--radius);padding:10px 14px;margin-bottom:8px;display:none}
#notif-banner.show{display:block}
.notif-title{font-size:13px;font-weight:600;color:var(--blue);margin-bottom:2px}
.notif-sub{font-size:11px;color:var(--text2)}

/* ── Empty state ── */
.empty{text-align:center;padding:40px 20px;color:var(--text3)}

/* ── Utilities ── */
.flex-row{display:flex;align-items:center;gap:8px}
.spacer{flex:1}
.pill{display:inline-block;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:700}
.mt8{margin-top:8px}

</style>
<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js')
    .then(reg => {
      reg.addEventListener('updatefound', () => {
        const newWorker = reg.installing;
        newWorker.addEventListener('statechange', () => {
          if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
            console.log('Protocol app updated');
          }
        });
      });
    })
    .catch(err => console.log('SW registration failed:', err));
}
</script>

<body>
<div id="app">
<div id="offline-bar" style="display:none;background:var(--amber-l);border-bottom:1px solid var(--amber);padding:6px 16px;font-size:11px;color:var(--amber);font-weight:600;text-align:center">

    </div>
    <div style="display:flex;align-items:center;gap:8px">
      <button id="today-jump" onclick="goToToday()" style="display:none;background:var(--blue);border:none;border-radius:20px;padding:4px 12px;font-size:11px;font-weight:700;color:#fff;cursor:pointer;white-space:nowrap">Today</button>
      <button id="theme-toggle" onclick="toggleTheme()" style="background:var(--surf2);border:1px solid var(--border2);border-radius:20px;padding:4px 10px;font-size:11px;font-weight:600;color:var(--text2);cursor:pointer;white-space:nowrap">Light</button>

<script>

const DAYS = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

let mode = 'home';
let tab = 'today';
let state = {};

function loadState() {
  try { state = JSON.parse(localStorage.getItem('protocol_state') || '{}'); } catch(e) { state = {}; }
  if (!state.checks) state.checks = {};
  if (!state.weights) state.weights = {};
  if (!state.alerts) state.alerts = {};
  if (!state.layover) state.layover = { tz: 'Europe/London', tzName: 'London BST' };
  if (!state.flight) state.flight = {};
  if (state.theme === 'light') applyTheme('light');
}

function toggleTheme() {
  const next = document.body.classList.contains('light') ? 'dark' : 'light';
  applyTheme(next);
  state.theme = next;
  saveState();
}

function applyTheme(t) {
  const btn = document.getElementById('theme-toggle');
  if (t === 'light') {
    document.body.classList.add('light');
    if (btn) btn.textContent = 'Dark';
  } else {
    document.body.classList.remove('light');
    if (btn) btn.textContent = 'Light';
  }
}
function saveState() { localStorage.setItem('protocol_state', JSON.stringify(state)); }

function setMode(m) {
  mode = m;
  ['home','layover','duty'].forEach(x => {
    document.getElementById('btn-'+x).classList.toggle('active', x === m);
  });
  render();
}

function setTab(t) {
  tab = t;
  ['today', 'workout'].forEach(x => {
    const el = document.getElementById('nav-'+x); if(el) el.classList.toggle('active', x===t);
  });
  // Hide mode row on workout tab
  const modeRow = document.querySelector('.mode-row');
  if (modeRow) modeRow.style.display = t === 'workout' ? 'none' : 'flex';
  render();
}

// ── Clock ──────────────────────────────────────────────────────────────────
function updateClock() {
  const now = new Date();
  const day = DAYS[now.getDay()];
  const mon = MONTHS[now.getMonth()];
  document.getElementById('date-display').textContent = `${day}, ${mon} ${now.getDate()}`;
  const localH = String(now.getHours()).padStart(2,'0');
  const localM = String(now.getMinutes()).padStart(2,'0');
  document.getElementById('clock-local').textContent = `${localH}:${localM}`;
}

// ── Sunrise / Sunset ───────────────────────────────────────────────────────
function calcSunTimes(lat, lng, date) {
  // Accurate sunrise/sunset using NOAA algorithm
  const rad = Math.PI / 180;
  const deg = 180 / Math.PI;
  const JD = date.getTime() / 86400000 + 2440587.5;
  const n  = JD - 2451545.0;
  const L  = (280.46 + 0.9856474 * n) % 360;
  const g  = (357.528 + 0.9856003 * n) % 360;
  const lam = L + 1.915 * Math.sin(g * rad) + 0.020 * Math.sin(2 * g * rad);
  const sinDec = Math.sin(23.439 * rad) * Math.sin(lam * rad);
  const cosDec = Math.cos(Math.asin(sinDec));
  const cosH   = (Math.cos(90.833 * rad) - sinDec * Math.sin(lat * rad)) / (cosDec * Math.cos(lat * rad));
  if (cosH < -1 || cosH > 1) return null; // polar day/night
  const H = Math.acos(cosH) * deg;
  const RA = Math.atan2(Math.cos(23.439 * rad) * Math.sin(lam * rad), Math.cos(lam * rad)) * deg / 15;
  const noon = 12 + (- lng / 15) - (RA - (L / 15));
  const rise = noon - H / 15;
  const set  = noon + H / 15;
  const fmt  = h => {
    let hh = ((h % 24) + 24) % 24;
    const mm = Math.round((hh % 1) * 60);
    hh = Math.floor(hh);
    return String(hh).padStart(2,'0') + ':' + String(mm % 60).padStart(2,'0');
  };
  return { rise: fmt(rise), set: fmt(set) };
}

function updateSunTimes(lat, lng) {
  const times = calcSunTimes(lat, lng, new Date());
  const el = document.getElementById('sun-times');
  if (el && times) {
    el.innerHTML = '&#9728; ' + times.rise + ' &nbsp; &#9790; ' + times.set;
  }
}

function initSunTimes() {
  const el = document.getElementById('sun-times');
  if (!el) return;
  if (!navigator.geolocation) {
    el.textContent = 'location unavailable';
    return;
  }
  // Try cached coords first for instant display
  const cached = localStorage.getItem('sun_coords');
  if (cached) {
    try {
      const {lat, lng} = JSON.parse(cached);
      updateSunTimes(lat, lng);
    } catch(e) {}
  }
  navigator.geolocation.getCurrentPosition(
    pos => {
      const lat = pos.coords.latitude;
      const lng = pos.coords.longitude;
      localStorage.setItem('sun_coords', JSON.stringify({lat, lng}));
      updateSunTimes(lat, lng);
    },
    err => {
      if (!cached) { if(el) el.textContent = 'allow location'; }
    },
    { enableHighAccuracy: false, timeout: 8000, maximumAge: 3600000 }
  );
}

function goToToday() {
  const realIdx = new Date().getDay();
  state.todayDayIdx = realIdx;
  state.workoutDayIdx = realIdx;
  state.workoutViewHistory = null;
  render();
}

function isOffToday() {
  const realIdx = new Date().getDay();
  if (tab === 'today') {
    return state.todayDayIdx !== undefined && state.todayDayIdx !== null && state.todayDayIdx !== realIdx;
  } else if (tab === 'workout') {
    return (state.workoutDayIdx !== undefined && state.workoutDayIdx !== null && state.workoutDayIdx !== realIdx)
        || !!state.workoutViewHistory;
  }
  return false;
}

function render() {
  const c = document.getElementById('content');
  // Show/hide Today jump button
  const btn = document.getElementById('today-jump');
  if (btn) btn.style.display = isOffToday() ? 'block' : 'none';
  if (tab === 'today') renderToday(c);
  else if (tab === 'workout') renderWorkout(c);
}

function renderToday(c) {
  const now = new Date();
  const realTodayIdx = now.getDay();
  // Allow scrolling days — default to today
  if (state.todayDayIdx === undefined || state.todayDayIdx === null) {
    state.todayDayIdx = realTodayIdx;
  }
  const dayIdx = state.todayDayIdx;
  const dayName = DAYS[dayIdx];
  const isRealToday = dayIdx === realTodayIdx;
  // Use real today's date for the key so checks persist correctly per calendar date
  // For past/future days use a synthetic key based on day offset
  const offsetDays = ((dayIdx - realTodayIdx) + 7) % 7;
  const keyDate = new Date(now); keyDate.setDate(keyDate.getDate() - ((realTodayIdx - dayIdx + 7) % 7));
  const todayKey = `${dayName}_${keyDate.toDateString()}`;
  if (!state.checks[todayKey]) state.checks[todayKey] = {};
  const checks = state.checks[todayKey];

  // Map duty task IDs to their home-day equivalents so completed home items carry over
  const dayPfx = dayName.slice(0,3).toLowerCase();
  const DUTY_HOME_MAP = {
    duty_nmn:      [`${dayPfx}_nmn`],
    duty_ss31:     [`${dayPfx}_ss31`],
    duty_ostarine: [`${dayPfx}_ostarine`],
    duty_bpc:      [`${dayPfx}_bpc_am`, `${dayPfx}_bpc1`],
    duty_creatine: [`${dayPfx}_coffee`],
    duty_protein:  [],
    duty_hydrate:  [],
    duty_sleep:    [],
    duty_mag:      [`${dayPfx}_bed`],
  };

  // isDone check: for duty mode, check duty ID and any mapped home IDs
  const isDoneFor = (taskId) => {
    if (checks[taskId]) return true;
    if (mode === 'duty' && DUTY_HOME_MAP[taskId]) {
      return DUTY_HOME_MAP[taskId].some(id => !!checks[id]);
    }
    return false;
  };

  let tasks;
  if (mode === 'duty') {
    tasks = getDutyTasks();
  } else if (mode === 'layover') {
    // Layover: use home tasks but filter out items not available away from home
    const homeTasks = DAILY_TASKS[dayName] || [];
    tasks = homeTasks
      .filter(t => !t.id.includes('redlight') && !t.id.includes('sauna'))
      .map(t => {
        // Replace casein with Frog Fuel
        if (t.label && t.label.startsWith('Casein')) {
          return Object.assign({}, t, {
            label: 'Frog Fuel x2 + evening supps',
            sub: t.sub ? t.sub.replace('Creatine 5g · Fish oil 2g · ', 'Creatine 5g · Fish oil 2g · ') : t.sub
          });
        }
        return t;
      });
  } else {
    tasks = DAILY_TASKS[dayName] || [];
  }

  const done = tasks.filter(t => isDoneFor(t.id)).length;
  const pct = tasks.length ? Math.round(done / tasks.length * 100) : 0;

  let html = '';

  html += `<div class="macro-grid">
    <div class="macro-cell"><div class="macro-val" style="color:#6366f1">160–175g</div><div class="macro-label">Protein</div></div>
    <div class="macro-cell"><div class="macro-val" style="color:#f59e0b">200–250g</div><div class="macro-label">Carbs</div></div>
    <div class="macro-cell"><div class="macro-val" style="color:#10b981">70–90g</div><div class="macro-label">Fat</div></div>
    <div class="macro-cell"><div class="macro-val" style="color:#3b82f6">2,800–3,050</div><div class="macro-label">kcal</div></div>
  </div>`;

  const prevDayName = DAYS[((dayIdx - 1) + 7) % 7];
  const nextDayName = DAYS[(dayIdx + 1) % 7];
  html += `<div class="card" style="margin-bottom:8px">
    <div style="display:flex;align-items:center;border-bottom:1px solid var(--border);padding:4px 0">
      <button onclick="shiftToday(-1)" style="background:none;border:none;padding:4px 10px;cursor:pointer;color:var(--text3);font-size:18px;line-height:1;flex-shrink:0">&#8592;</button>
      <div style="flex:1;text-align:center">
        <span style="font-size:13px;font-weight:600;color:var(--text)">${dayName}${isRealToday?' <span style="font-size:10px;color:var(--green);font-weight:700">TODAY</span>':''}</span>
        <div style="font-size:10px;color:var(--text3);margin-top:1px">${prevDayName} ← → ${nextDayName}</div>
      </div>
      <button onclick="shiftToday(1)" style="background:none;border:none;padding:4px 10px;cursor:pointer;color:var(--text3);font-size:18px;line-height:1;flex-shrink:0">&#8594;</button>
    </div>
    <div class="progress-wrap">
      <div class="progress-row">
        <span class="progress-label">${mode !== 'home' ? mode.charAt(0).toUpperCase()+mode.slice(1)+' · ' : ''}${done}/${tasks.length} complete</span>
        <span class="progress-val">${pct}%</span>
      </div>
      <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
    </div>
  </div>`;

  const grouped = groupBy(tasks, 'time');
  for (const [time, items] of Object.entries(grouped)) {
    html += `<div class="section-label">${time}</div><div class="card">`;
    items.forEach(task => {
      const isDone = isDoneFor(task.id);
      const isCarried = mode === 'duty' && !checks[task.id] && isDone;
      html += `<div class="task" onclick="${isCarried ? '' : `toggleCheck('${todayKey}','${task.id}')`}" style="${isCarried?'opacity:0.65;cursor:default':''}">
        <div class="task-check ${isDone?'done':''}" data-id="${task.id}">
          <svg viewBox="0 0 12 12" fill="none" stroke="white" stroke-width="2"><polyline points="2,6 5,9 10,3"/></svg>
        </div>
        <div class="task-body">
          <div class="task-label${isDone?' done':''}">${task.label}${isCarried?' <span style="font-size:9px;color:var(--green);font-weight:600">done at home</span>':''}</div>
          ${task.sub ? `<div class="task-sub">${task.sub}</div>` : ''}
        </div>
        ${task.badge ? `<div class="task-badge" style="background:${task.color}22;color:${task.color}">${task.badge}</div>` : ''}
        <div style="width:10px;height:10px;border-radius:2px;background:${task.color};flex-shrink:0"></div>
      </div>`;
    });
    html += '</div>';
  }

  if (tasks.length === 0) html += '<div class="empty">No protocol data for this day type.</div>';
  html += '<div style="flex:1"></div>';
  c.innerHTML = html;
}

function toggleCheck(dayKey, taskId) {
  if (!state.checks[dayKey]) state.checks[dayKey] = {};
  state.checks[dayKey][taskId] = !state.checks[dayKey][taskId];
  saveState();
  render();
}

  const WDAYS = ['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];
  // Default to today if it's a training day, else Monday
  if (state.workoutDayIdx === undefined || state.workoutDayIdx === null) {
    const todayName = DAYS[new Date().getDay()];
    state.workoutDayIdx = DAYS.indexOf(todayName) !== -1 ? DAYS.indexOf(todayName) : 1;
  }
  const dayName = DAYS[state.workoutDayIdx];
  const workout = WORKOUTS[dayName];
  const restDay = REST_DAYS[dayName];
  const wKey = `workout_${dayName}_${new Date().toDateString()}`;

  const prevDay = DAYS[((state.workoutDayIdx - 1) + 7) % 7];
  const nextDay = DAYS[(state.workoutDayIdx + 1) % 7];
  const isToday = dayName === DAYS[new Date().getDay()];

  if (!workout) {
    const rd = restDay || { tag: 'Rest Day', color: '#6b7280', notes: [] };
    let rhtml = `<div class="card" style="margin-bottom:8px;border-color:${rd.color}44">
      <div class="card-hdr" style="border-bottom-color:${rd.color}33">
        <button onclick="shiftWorkout(-1)" style="background:none;border:none;padding:4px 8px;cursor:pointer;color:var(--text3);font-size:18px;line-height:1;flex-shrink:0">&#8592;</button>
        <div style="flex:1;text-align:center">
          <div class="card-title" style="color:${rd.color}">${dayName}${isToday?' <span style="font-size:10px;color:var(--green);font-weight:700">TODAY</span>':''}</div>
          <div style="font-size:10px;color:var(--text3);margin-top:1px">${prevDay} ← → ${nextDay}</div>
        </div>
        <button onclick="shiftWorkout(1)" style="background:none;border:none;padding:4px 8px;cursor:pointer;color:var(--text3);font-size:18px;line-height:1;flex-shrink:0">&#8594;</button>
      </div>
      <div style="font-size:11px;color:${rd.color};font-weight:600;text-align:center;padding:6px 14px">${rd.tag}</div>
    </div>`;
    (rd.notes || []).forEach(section => {
      rhtml += `<div class="section-label">${section.cat}</div><div class="card">`;
      section.items.forEach((tip, i) => {
        rhtml += `<div class="task" style="${i<section.items.length-1?'border-bottom:1px solid var(--border)':'border:none'}">
          <div style="width:6px;height:6px;border-radius:50%;background:${section.color};flex-shrink:0;margin-top:4px;align-self:flex-start"></div>
          <div class="task-body"><div class="task-sub" style="font-size:12px;line-height:1.55;color:var(--text2)">${tip}</div></div>
        </div>`;
      });
      rhtml += '</div>';
    });
    c.innerHTML = rhtml;
    return;
  }

  if (!state.weights[wKey]) state.weights[wKey] = {};

  // ── History mode ─────────────────────────────────────────────────────────
  const prevSessionKey = getPrevSessionKey(dayName);
  const prevSessionDate = prevSessionKey ? prevSessionKey.replace(`workout_${dayName}_`,'') : null;
  const isViewingHistory = state.workoutViewHistory === dayName && !!prevSessionKey;
  const displayData = isViewingHistory ? (state.weights[prevSessionKey] || {}) : (state.weights[wKey] || {});

  let historyBanner = '';
  if (isViewingHistory) {
    historyBanner = `<div style="background:var(--amber-l);border-bottom:1px solid var(--amber);padding:6px 14px;font-size:11px;color:var(--amber);font-weight:600;display:flex;justify-content:space-between;align-items:center">
      <span>&#9664; PREV SESSION · ${prevSessionDate}</span>
      <button onclick="exitHistoryView()" style="background:var(--amber);border:none;border-radius:4px;padding:2px 8px;font-size:10px;font-weight:700;color:#000;cursor:pointer">TODAY</button>
    </div>`;
  } else if (prevSessionDate) {
    historyBanner = `<div style="padding:3px 14px 0;font-size:10px;color:var(--text3);text-align:right">← swipe left for ${prevSessionDate}</div>`;
  }

  // ── Build flat input ID list for sequencing ───────────────────────────────
  const allInputIds = [];
  if (!isViewingHistory) {
    workout.groups.forEach(group => {
      group.exercises.forEach(ex => {
        let n = 3;
        const mm = (ex.sets||'').match(/^(\d+)\s*[×x]/);
        const sl = (ex.sets||'').split('/');
        if (mm) n = parseInt(mm[1]); else if (sl.length > 1) n = sl.length;
        n = Math.min(Math.max(n,1),6);
        for (let s = 0; s < n; s++) {
          allInputIds.push(`inp_${ex.id}_w${s}`);
          allInputIds.push(`inp_${ex.id}_r${s}`);
        }
      });
    });
  }

  let html = `<div class="card" style="margin-bottom:8px;border-color:${workout.color}44">
    <div class="card-hdr" style="border-bottom-color:${workout.color}33">
      <button onclick="shiftWorkout(-1)" style="background:none;border:none;padding:4px 8px;cursor:pointer;color:var(--text3);font-size:18px;line-height:1;flex-shrink:0">&#8592;</button>
      <div class="card-hdr-left" style="flex:1;justify-content:center;flex-direction:column;align-items:center;text-align:center">
        <div class="card-title" style="color:${workout.color}">${dayName}${isToday&&!isViewingHistory?' <span style="font-size:10px;color:var(--green);font-weight:700">TODAY</span>':''}</div>
        <div style="font-size:10px;color:var(--text3);margin-top:1px">${prevDay} ← → ${nextDay}</div>
      </div>
      <button onclick="shiftWorkout(1)" style="background:none;border:none;padding:4px 8px;cursor:pointer;color:var(--text3);font-size:18px;line-height:1;flex-shrink:0">&#8594;</button>
    </div>
    ${historyBanner}
    <div style="font-size:11px;color:${workout.color};font-weight:600;text-align:center;padding:4px 14px">${workout.tag}</div>
    <div style="padding:4px 14px 8px;font-size:11px;color:var(--text3)">
      BFR cuff: upper arm (arms/shoulders) · upper thigh (legs) · 7/10 tightness · venous occlusion only · feel pressure but retain distal pulse
    </div>
  </div>`;

  workout.groups.forEach(group => {
    html += `<div class="section-label">${group.name}</div><div class="card ex-group">`;
    group.exercises.forEach((ex, i) => {
      const shaded = i % 2 === 1;
      let numSets = 3;
      const mm = (ex.sets||'').match(/^(\d+)\s*[×x]/);
      const sl = (ex.sets||'').split('/');
      if (mm) numSets = parseInt(mm[1]); else if (sl.length > 1) numSets = sl.length;
      numSets = Math.min(Math.max(numSets,1),6);

      let setInputs = '';
      for (let s = 0; s < numSets; s++) {
        const wId = `inp_${ex.id}_w${s}`;
        const rId = `inp_${ex.id}_r${s}`;
        const wVal = displayData[ex.id+'_w'+s] || '';
        const rVal = displayData[ex.id+'_r'+s] || '';

        if (isViewingHistory) {
          setInputs += `<div style="display:flex;align-items:center;gap:3px;margin-bottom:${s<numSets-1?'3':'0'}px">
            <span style="font-size:9px;color:var(--text2);width:10px;text-align:right;flex-shrink:0">${s+1}</span>
            <div style="width:42px;padding:4px 6px;border-radius:4px;border:1px solid var(--amber);background:var(--amber-l);color:var(--amber);font-size:12px;text-align:center;font-family:'SF Mono',monospace">${wVal||'—'}</div>
            <span class="ex-x">×</span>
            <div style="width:38px;padding:4px 6px;border-radius:4px;border:1px solid var(--amber);background:var(--amber-l);color:var(--amber);font-size:12px;text-align:center;font-family:'SF Mono',monospace">${rVal||'—'}</div>
          </div>`;
        } else {
          setInputs += `<div style="display:flex;align-items:center;gap:3px;margin-bottom:${s<numSets-1?'3':'0'}px">
            <span style="font-size:11px;color:var(--text2);width:12px;text-align:right;flex-shrink:0">${s+1}</span>
            <input id="${wId}" class="ex-input" type="number" inputmode="decimal" placeholder="wt" value="${wVal}"
              onchange="logWeight('${wKey}','${ex.id}_w${s}',this.value)"
              onkeydown="seqInput(event,'${wId}')" style="width:46px">
            <span class="ex-x">×</span>
            <input id="${rId}" class="ex-input" type="number" inputmode="numeric" placeholder="reps" value="${rVal}"
              onchange="logWeight('${wKey}','${ex.id}_r${s}',this.value)"
              onkeydown="seqInput(event,'${rId}')" style="width:42px">
          </div>`;
        }
      }

      html += `<div class="ex-row" style="${shaded?'background:var(--surf2)':''}">
        <div style="flex:1;min-width:0">
          <div class="ex-name">${ex.name}</div>
          <div class="ex-cue" style="padding:2px 0 0">${ex.cue}</div>
        </div>
        <div style="display:flex;flex-direction:column;align-items:flex-end;flex-shrink:0;margin-left:8px">
          <div class="ex-sets" style="margin-bottom:4px">${ex.sets}</div>
          ${setInputs}
        </div>
      </div>`;
    });
    html += '</div>';
  });

  c.innerHTML = html;
  c._workoutInputIds = allInputIds;

  // ── Swipe detection (attach once per render cycle) ───────────────────────
  if (c._swipeHandler) {
    c.removeEventListener('touchstart', c._swipeTouchStart, { passive: true });
    c.removeEventListener('touchend', c._swipeHandler, { passive: true });
  }
  let _tx = 0, _ty = 0;
  c._swipeTouchStart = e => { _tx = e.touches[0].clientX; _ty = e.touches[0].clientY; };
  c._swipeHandler = e => {
    if (tab !== 'workout') return;
    const dx = e.changedTouches[0].clientX - _tx;
    const dy = e.changedTouches[0].clientY - _ty;
    if (Math.abs(dx) < 40 || Math.abs(dy) > Math.abs(dx) * 0.8) return;
    const dn = DAYS[state.workoutDayIdx];
    if (dx < 0) {
      // swipe left → history
      const pk = getPrevSessionKey(dn);
      if (pk) { state.workoutViewHistory = dn; render(); }
    } else {
      // swipe right → today
      if (state.workoutViewHistory) { state.workoutViewHistory = null; render(); }
    }
  };
  c.addEventListener('touchstart', c._swipeTouchStart, { passive: true });
  c.addEventListener('touchend', c._swipeHandler, { passive: true });
}

function shiftToday(dir) {
  const realIdx = new Date().getDay();
  if (state.todayDayIdx === undefined || state.todayDayIdx === null) state.todayDayIdx = realIdx;
  state.todayDayIdx = ((state.todayDayIdx + dir) % 7 + 7) % 7;
  render();
}

function shiftWorkout(dir) {
  if (state.workoutDayIdx === undefined || state.workoutDayIdx === null) state.workoutDayIdx = 0;
  state.workoutDayIdx = ((state.workoutDayIdx + dir) % 7 + 7) % 7;
  render();
}

function logWeight(wKey, field, val) {
  if (!state.weights[wKey]) state.weights[wKey] = {};
  state.weights[wKey][field] = val;
  saveState();
}

// ── Input tab sequencing ────────────────────────────────────────────────────
function seqInput(e, currentId) {
  if (e.key !== 'Enter' && e.key !== 'Tab') return;
  e.preventDefault();
  const c = document.getElementById('content');
  const ids = c._workoutInputIds || [];
  const idx = ids.indexOf(currentId);
  if (idx === -1) return;
  // Save current value immediately on Enter
  const cur = document.getElementById(currentId);
  if (cur) cur.dispatchEvent(new Event('change', { bubbles: true }));
  // Focus next
  const nextId = ids[idx + 1];
  if (nextId) {
    const next = document.getElementById(nextId);
    if (next) { next.focus(); next.select(); }
  }
}

// ── History view toggle ─────────────────────────────────────────────────────
function exitHistoryView() {
  state.workoutViewHistory = null;
  render();
}

function getPrevSessionKey(dayName) {
  const prefix = `workout_${dayName}_`;
  const todayStr = new Date().toDateString();
  const keys = Object.keys(state.weights)
    .filter(k => k.startsWith(prefix) && k !== `${prefix}${todayStr}` && Object.keys(state.weights[k]).length > 0)
    .sort((a, b) => new Date(a.replace(prefix,'')) - new Date(b.replace(prefix,'')));
  return keys.length ? keys[keys.length - 1] : null;
}

function groupBy(arr, key) {
  const map = {};
  arr.forEach(item => {
    if (!map[item[key]]) map[item[key]] = [];
    map[item[key]].push(item);
  });
  return map;
}

// ── Init ────────────────────────────────────────────────────────────────────

loadState();
updateClock();
setInterval(updateClock, 30000);
initSunTimes();
render();
window.addEventListener('online',  () => { document.getElementById('offline-bar').style.display='none'; });
window.addEventListener('offline', () => { document.getElementById('offline-bar').style.display='block'; });
if (!navigator.onLine) document.getElementById('offline-bar').style.display='block';
const todayNameHL = DAYS[new Date().getDay()];
if (['Monday','Wednesday','Friday','Saturday'].includes(todayNameHL)) {
  setTimeout(() => { const el = document.getElementById('nav-workout'); if(el) el.style.color='var(--amber)'; }, 100);
}
</script>
